<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dugout — Season Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#3d5f3f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dugout">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1419;--panel:#171f2b;--panel-2:#1e2938;--line:#2a3547;--cream:#f5ecd3;--cream-dim:#d6c9a8;--muted:#8a9ab5;--red:#c8432c;--red-dim:#8a3024;--dirt:#a68b5b;--field:#3d5f3f;--field-line:#e8e2cb;--ok:#5a9b6b}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:radial-gradient(ellipse 80% 50% at 50% 0%,#1a2332 0%,transparent 70%),linear-gradient(180deg,var(--bg) 0%,#0a0d12 100%);min-height:100vh;color:var(--cream);font-family:'Fraunces',Georgia,serif;font-size:15px;line-height:1.5}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(rgba(255,255,255,0.015) 1px,transparent 1px);background-size:3px 3px}
.wrap{max-width:1400px;margin:0 auto;padding:22px 20px 80px;position:relative;z-index:1}
.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding-bottom:14px;border-bottom:2px solid var(--red);margin-bottom:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.ball{display:inline-block;width:34px;height:34px;border-radius:50%;background:var(--cream);position:relative;box-shadow:inset -4px -6px 10px rgba(0,0,0,0.2);flex-shrink:0}
.ball::before,.ball::after{content:"";position:absolute;top:4px;bottom:4px;width:2px;border-left:2px dashed var(--red)}
.ball::before{left:10px;transform:rotate(-25deg)}
.ball::after{right:10px;transform:rotate(25deg)}
.brand h1{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:38px;letter-spacing:0.02em;margin:0;text-transform:uppercase;line-height:0.9}
.brand h1 .accent{color:var(--red)}
.brand .meta{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.teamname,.seasonname{background:transparent;border:none;color:var(--cream-dim);font-family:'Fraunces',serif;font-style:italic;font-size:14px;border-bottom:1px dashed var(--line);padding:1px 4px;outline:none;min-width:140px}
.seasonname{font-size:11px;color:var(--dirt);font-family:'Big Shoulders Display',sans-serif;font-style:normal;letter-spacing:0.2em;text-transform:uppercase;font-weight:600}
.teamname:focus,.seasonname:focus{border-bottom-color:var(--dirt);color:var(--cream)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{font-family:'Big Shoulders Display',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;background:transparent;color:var(--cream);border:1px solid var(--line);padding:7px 12px;border-radius:2px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{border-color:var(--dirt);color:var(--dirt)}
.btn.primary{background:var(--red);border-color:var(--red);color:var(--cream)}
.btn.primary:hover{background:var(--red-dim);border-color:var(--red-dim);color:var(--cream)}
.btn.ghost{border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--cream);border-color:var(--line)}
.btn.small{padding:4px 8px;font-size:10px}
.btn.danger{color:#e27664;border-color:var(--red-dim)}
.btn.danger:hover{background:var(--red);color:var(--cream)}
.tabbar{display:flex;gap:2px;margin-bottom:20px;flex-wrap:wrap;align-items:stretch;padding-bottom:1px;border-bottom:1px solid var(--line);overflow-x:auto}
.tab{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;background:transparent;color:var(--muted);border:none;border-bottom:3px solid transparent;padding:9px 13px;cursor:pointer;transition:all 0.1s;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--cream-dim)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab .rd-num{font-size:16px;font-weight:900;display:block;line-height:1}
.tab .rd-sub{font-size:9px;color:var(--muted);letter-spacing:0.15em;margin-top:2px;font-weight:600}
.tab.active .rd-sub{color:var(--dirt)}
.tab.add{color:var(--dirt);font-size:18px;padding:9px 12px;letter-spacing:0}
.panel{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--line);border-radius:4px;padding:18px;margin-bottom:18px;position:relative}
.panel h2{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:18px;letter-spacing:0.15em;text-transform:uppercase;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.panel h2 .count{font-size:11px;color:var(--dirt);font-weight:600;letter-spacing:0.2em}
.panel h2 .actions{display:flex;gap:6px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:980px){.grid{grid-template-columns:1.05fr 0.95fr}}
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.card{background:#0f1620;border:1px solid var(--line);border-radius:3px;padding:12px 14px;cursor:pointer;position:relative;transition:all 0.15s}
.card:hover{border-color:var(--dirt);transform:translateY(-1px)}
.card .name{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:18px;letter-spacing:0.04em;text-transform:uppercase;line-height:1.1}
.card .first{color:var(--cream-dim);font-weight:600;font-size:14px}
.card .stats,.card .season-stats{display:flex;gap:12px;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex-wrap:wrap}
.card .season-stats{margin-top:4px;color:var(--dirt)}
.card .stats b,.card .season-stats b{color:var(--cream);font-weight:600}
.card .pos-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.pos-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 6px;border-radius:2px;background:rgba(166,139,91,0.15);color:var(--dirt);border:1px solid rgba(166,139,91,0.25)}
.pos-tag.strong{background:rgba(200,67,44,0.15);color:#e27664;border-color:rgba(200,67,44,0.3)}
.pos-tag.season{background:rgba(90,155,107,0.15);color:#7cb38a;border-color:rgba(90,155,107,0.3)}
.card .remove{position:absolute;top:6px;right:8px;background:transparent;border:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:4px}
.card .remove:hover{color:var(--red)}
.card.ghost{border-style:dashed;color:var(--muted);display:flex;align-items:center;justify-content:center;min-height:80px}
.card.ghost:hover{color:var(--dirt)}
.lineup{display:flex;flex-direction:column;gap:6px}
.slot{display:grid;grid-template-columns:40px 1fr auto;gap:12px;align-items:center;padding:10px 12px;background:#0f1620;border:1px solid var(--line);border-radius:3px;cursor:pointer;transition:all 0.15s}
.slot:hover{border-color:var(--dirt)}
.slot .num{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:28px;color:var(--red);text-align:center;line-height:1}
.slot .num .role{display:block;font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:8px;color:var(--dirt);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px;line-height:1}
.slot .who{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:16px;letter-spacing:0.03em;text-transform:uppercase}
.slot .who .first{color:var(--cream-dim);font-weight:600}
.slot .mini{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px}
.slot .mini b{color:var(--cream)}
.slot.empty .who{color:var(--muted);font-style:italic;font-family:'Fraunces',serif;text-transform:none;font-size:14px;letter-spacing:0}
.slot .pos-chip{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;border-radius:2px;background:var(--field);color:var(--field-line);min-width:36px;text-align:center}
.slot .pos-chip.unset{background:transparent;border:1px dashed var(--line);color:var(--muted)}
.diamond-wrap{position:relative;width:100%;aspect-ratio:1/0.92;max-width:520px;margin:8px auto 0}
.diamond-wrap svg{width:100%;height:100%;display:block}
.pos-dot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.pos-dot .bubble{background:var(--panel-2);border:2px solid var(--dirt);border-radius:50%;width:58px;height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.15s;padding:4px}
.pos-dot:hover .bubble{border-color:var(--red);background:#1f2b3d}
.pos-dot .pos-label{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:10px;color:var(--dirt);letter-spacing:0.1em}
.pos-dot .pos-last{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:11px;color:var(--cream);text-transform:uppercase;line-height:1}
.pos-dot.filled .bubble{border-color:var(--ok);background:#1a2e20}
.pos-dot.filled .pos-label{color:var(--ok)}
.dh-slot{margin-top:14px;padding:10px 14px;background:#0f1620;border:1px solid var(--line);border-radius:3px;display:flex;align-items:center;gap:12px;cursor:pointer}
.dh-slot:hover{border-color:var(--dirt)}
.dh-slot .pos-chip{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;background:var(--dirt);color:var(--bg);letter-spacing:0.1em}
.dh-slot .who{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.03em;text-transform:uppercase;flex:1}
.dh-slot.empty .who{color:var(--muted);font-style:italic;font-family:'Fraunces',serif;text-transform:none;letter-spacing:0}
.conflicts{margin-top:14px;font-size:13px;color:var(--red);font-style:italic}
.conflicts.ok{color:var(--ok);font-style:normal}
.source-pill{display:inline-block;font-family:'Big Shoulders Display',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:3px 8px;border-radius:2px;background:rgba(166,139,91,0.15);color:var(--dirt);border:1px solid rgba(166,139,91,0.3);margin-left:8px}
.source-pill.season{background:rgba(90,155,107,0.15);color:#7cb38a;border-color:rgba(90,155,107,0.3)}
.round-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;align-items:end}
.round-meta label{display:flex;flex-direction:column;gap:4px;font-family:'Big Shoulders Display',sans-serif;font-size:10px;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;font-weight:600}
.round-meta input,.round-meta select{background:#0f1620;border:1px solid var(--line);color:var(--cream);font-family:'Fraunces',serif;font-size:14px;padding:7px 10px;border-radius:2px;outline:none}
.round-meta input:focus,.round-meta select:focus{border-color:var(--dirt)}
.round-meta .result-chip{padding:7px 12px;border:1px solid var(--line);font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:14px;text-align:center;letter-spacing:0.15em;border-radius:2px}
.round-meta .result-chip.W{background:rgba(90,155,107,0.2);color:#7cb38a;border-color:#5a9b6b}
.round-meta .result-chip.L{background:rgba(200,67,44,0.2);color:#e27664;border-color:var(--red)}
.round-meta .result-chip.T{background:rgba(166,139,91,0.2);color:var(--dirt);border-color:var(--dirt)}
.table-wrap{overflow-x:auto;margin:0 -4px}
table.stat-table{border-collapse:collapse;width:100%;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:720px}
table.stat-table th{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--dirt);padding:8px 5px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
table.stat-table th.first-col{text-align:left;min-width:140px;padding-left:6px}
table.stat-table th.act-col{min-width:30px}
table.stat-table td{padding:3px 2px;border-bottom:1px solid rgba(42,53,71,0.4);text-align:right;color:var(--cream-dim)}
table.stat-table td.first-col{text-align:left;padding-left:6px;font-family:'Big Shoulders Display',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;color:var(--cream);min-width:140px}
table.stat-table td.first-col .first{color:var(--cream-dim);font-weight:600;font-size:12px}
table.stat-table tr:hover td{background:rgba(166,139,91,0.05)}
table.stat-table .derived{color:var(--dirt);font-weight:600}
table.stat-table tr.total-row td{border-top:2px solid var(--red);color:var(--cream);font-weight:600;padding-top:7px;background:rgba(200,67,44,0.05)}
table.stat-table tr.total-row td.first-col{color:var(--red);letter-spacing:0.1em}
table.stat-table input.num{width:42px;text-align:right;background:transparent;border:1px solid transparent;color:var(--cream);font-family:'JetBrains Mono',monospace;font-size:12px;padding:3px 5px;border-radius:2px;outline:none;-moz-appearance:textfield}
table.stat-table input.num:hover{border-color:var(--line)}
table.stat-table input.num:focus{border-color:var(--dirt);background:rgba(0,0,0,0.3)}
table.stat-table input.num::-webkit-inner-spin-button,table.stat-table input.num::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
table.stat-table select.pos-select{background:#0f1620;border:1px solid var(--line);color:var(--cream);font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 5px;border-radius:2px;outline:none;min-width:60px}
table.stat-table td .row-x{background:transparent;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px}
table.stat-table td .row-x:hover{color:var(--red)}
.fb-section{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:720px){.fb-section{grid-template-columns:1fr 1fr}}
.fb-field{display:flex;flex-direction:column;gap:6px}
.fb-field label{font-family:'Big Shoulders Display',sans-serif;font-size:10px;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;font-weight:600}
.fb-notes{width:100%;min-height:100px;background:#0f1620;border:1px solid var(--line);color:var(--cream);font-family:'Fraunces',serif;font-size:14px;padding:10px 12px;border-radius:3px;outline:none;line-height:1.5;resize:vertical}
.fb-notes:focus{border-color:var(--dirt)}
.fb-post-area{width:100%;min-height:260px;background:#0c1018;border:1px solid var(--line);color:var(--cream);font-family:'JetBrains Mono',monospace;font-size:13px;padding:12px 14px;border-radius:3px;outline:none;line-height:1.6;resize:vertical}
.fb-post-area:focus{border-color:var(--dirt)}
.fb-hint{font-size:12px;color:var(--muted);font-style:italic;margin-top:6px}
.modal-bg{position:fixed;inset:0;background:rgba(8,12,18,0.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:4px;max-width:560px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
.modal .m-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal .m-head h3{margin:0;font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:20px;letter-spacing:0.1em;text-transform:uppercase}
.m-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
.m-close:hover{color:var(--cream)}
.m-body{padding:16px 20px;overflow:auto}
.m-sub{color:var(--dirt);font-size:12px;font-family:'Big Shoulders Display',sans-serif;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px}
.option-list{display:flex;flex-direction:column;gap:4px}
.option{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:10px 12px;background:#0f1620;border:1px solid var(--line);border-radius:3px;cursor:pointer;transition:all 0.1s}
.option:hover{border-color:var(--dirt);background:#131c27}
.option .nm{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.03em;text-transform:uppercase}
.option .nm .first{color:var(--cream-dim);font-weight:600}
.option .fit{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.option .fit b{color:var(--cream)}
.option .fit.good{color:var(--ok)}
.option .fit.strong b{color:var(--red);font-size:13px}
.option-add-input{width:100%;padding:10px 12px;background:#0f1620;border:1px solid var(--line);color:var(--cream);font-family:inherit;font-size:14px;border-radius:3px;outline:none}
.option-add-input:focus{border-color:var(--dirt)}
.detail-hero{display:grid;grid-template-columns:1fr auto;gap:16px;padding:16px;background:linear-gradient(135deg,#131c27 0%,#0f1620 100%);border:1px solid var(--line);border-radius:3px;margin-bottom:14px}
.detail-hero .nm{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:28px;letter-spacing:0.04em;text-transform:uppercase;line-height:1}
.detail-hero .nm .first{color:var(--cream-dim);font-weight:600;font-size:20px;display:block}
.detail-hero .key{display:flex;gap:16px;align-items:flex-end}
.detail-hero .key .big{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:22px;color:var(--red);line-height:1}
.detail-hero .key .lbl{font-family:'Big Shoulders Display',sans-serif;font-weight:600;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--dirt)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;margin-bottom:14px}
.stat-box{background:#0f1620;border:1px solid var(--line);padding:7px 9px;border-radius:2px}
.stat-box .lbl{font-family:'Big Shoulders Display',sans-serif;font-weight:600;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--dirt)}
.stat-box .val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;color:var(--cream)}
.stat-box .sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
.detail-pos{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.pos-cell{background:#0f1620;border:1px solid var(--line);padding:7px;border-radius:2px;text-align:center}
.pos-cell.has{border-color:var(--dirt)}
.pos-cell.main{border-color:var(--red);background:rgba(200,67,44,0.1)}
.pos-cell .p{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:10px;color:var(--dirt);letter-spacing:0.1em}
.pos-cell .g{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:16px;color:var(--cream)}
.pos-cell .gl{font-family:'Big Shoulders Display',sans-serif;font-size:9px;color:var(--muted);letter-spacing:0.1em}
.season-snap{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.snap-box{background:#0f1620;border:1px solid var(--line);padding:10px 14px;border-radius:3px}
.snap-box .lbl{font-family:'Big Shoulders Display',sans-serif;font-size:10px;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.snap-box .val{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:22px;color:var(--cream);line-height:1}
.snap-box .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px}
.source-banner{padding:10px 14px;background:rgba(166,139,91,0.08);border:1px solid rgba(166,139,91,0.2);border-radius:3px;margin-bottom:14px;font-size:13px;color:var(--cream-dim);font-style:italic}
.source-banner.season{background:rgba(90,155,107,0.08);border-color:rgba(90,155,107,0.25)}
.source-banner b{color:var(--cream);font-style:normal;font-family:'Big Shoulders Display',sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;font-size:12px}
.empty-state{padding:40px 20px;text-align:center;color:var(--muted);font-style:italic}
footer{margin-top:30px;text-align:center;color:var(--muted);font-size:12px;font-style:italic}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
  <div class="brand">
    <span class="ball" aria-hidden="true"></span>
    <div>
      <h1>Dug<span class="accent">ou</span>t</h1>

// Get round.positions for a player, accounting for substitutions.
// substitutions is an array of { name, position, innings } — innings optional.
// If substitutions present, a player "plays" their starting position AND any sub positions
// (counted as full games at each — simpler than prorating, more generous to bench players).
function getPlayerPositionsInRound(round, name){
  const positions = [];
  // Starter
  for (const [pos, nm] of Object.entries(round.positions || {})){
    if (nm === name) positions.push(pos);
  }
  // Substitutions during game
  (round.substitutions || []).forEach(sub => {
    if (sub.name === name && sub.position && !positions.includes(sub.position)){
      positions.push(sub.position);
    }
  });
  return positions;
}

  for (const r of state.rounds){
    const b = (r.batting||{})[name];
    if (b && (b.PA||0) > 0){
      G++;
      for (const c of BAT_COLS) agg[c] = (agg[c]||0) + (Number(b[c])||0);
    }
  }
  return { G, ...agg };
}

function seasonPitchingFor(name){
  const agg = blankPitch();
  let G = 0;
  for (const r of state.rounds){
    const p = (r.pitching||{})[name];
    if (p && (p.IP||0) > 0){
      G++;
      for (const c of PITCH_COLS) agg[c] = (agg[c]||0) + (Number(p[c])||0);
    }
  }
  return { G, ...agg };
}

function seasonPositionsFor(name){
  const pos = blankPos();
  for (const r of state.rounds){
    for (const p of getPlayerPositionsInRound(r, name)){
      if (pos.hasOwnProperty(p)) pos[p]++;
    }
    // Legacy fallback: round.fielding = {name: pos}
    const legacy = (r.fielding||{})[name];
    if (legacy && pos.hasOwnProperty(legacy) && !Object.values(r.positions||{}).includes(name)){
      pos[legacy]++;
    }
  }
  return pos;
}

// Recent-form stats: last N rounds where player had PA
function recentBattingFor(name, windowN = RECENT_WINDOW){
  const agg = blankBat();
  let G = 0;
  // Iterate rounds in reverse chronological order
  const rounds = [...state.rounds].filter(r => {
    const b = (r.batting||{})[name];
    return b && (b.PA||0) > 0;
  }).sort((a,b) => b.num - a.num).slice(0, windowN);
  for (const r of rounds){
    const b = r.batting[name];
    G++;
    for (const c of BAT_COLS) agg[c] = (agg[c]||0) + (Number(b[c])||0);
  }
  return { G, rounds: rounds.length, ...agg };
}

// "Before round N" variants — used when suggesting a lineup for an upcoming round
// so the suggestion uses only prior-round data (not the round itself).
function completedRoundsBefore(num){
  return state.rounds.filter(r =>
    r.num < num && (
      Object.values(r.batting||{}).some(b => (b.PA||0) > 0) ||
      Object.values(r.pitching||{}).some(p => (p.IP||0) > 0)
    )
  ).length;
}

function seasonBattingBefore(name, num){
  const agg = blankBat();
  let G = 0;
  for (const r of state.rounds){
    if (r.num >= num) continue;
    const b = (r.batting||{})[name];
    if (b && (b.PA||0) > 0){
      G++;
      for (const c of BAT_COLS) agg[c] = (agg[c]||0) + (Number(b[c])||0);
    }
  }
  return { G, ...agg };
}

function seasonPositionsBefore(name, num){
  const pos = blankPos();
  for (const r of state.rounds){
    if (r.num >= num) continue;
    for (const p of getPlayerPositionsInRound(r, name)){
      if (pos.hasOwnProperty(p)) pos[p]++;
    }
    const legacy = (r.fielding||{})[name];
    if (legacy && pos.hasOwnProperty(legacy) && !Object.values(r.positions||{}).includes(name)){
      pos[legacy]++;
    }
  }
  return pos;
}

// Blended stats scoped to a specific round (uses only prior rounds' data)
function getBlendedStatsForRound(name, roundNum){
  const hist = byName[name];
  const seasonBat = seasonBattingBefore(name, roundNum);
  const seasonPos = seasonPositionsBefore(name, roundNum);
  const rc = completedRoundsBefore(roundNum);
  const useSeasonOnly = rc >= BLEND_THRESHOLD;
  if (useSeasonOnly){
    const rates = computeRates(seasonBat);
    return {
      name, _source:'season', _rounds:rc,
      G: seasonBat.G, PA: seasonBat.PA, AB: seasonBat.AB, H: seasonBat.H,
      '1B': seasonBat.H - (seasonBat['2B']||0) - (seasonBat['3B']||0) - (seasonBat.HR||0),
      '2B': seasonBat['2B']||0, '3B': seasonBat['3B']||0, HR: seasonBat.HR||0,
      R: seasonBat.R, RBI: seasonBat.RBI, BB: seasonBat.BB, K: seasonBat.K,
      HBP: seasonBat.HBP, SB: seasonBat.SB, CS: seasonBat.CS,
      ...rates, pos: seasonPos
    };
  }
  const h = hist || {};
  const histPos = (hist && hist.pos) || {};
  const merged = {
    G: (h.G||0) + seasonBat.G,
    PA: (h.PA||0) + seasonBat.PA,
    AB: (h.AB||0) + seasonBat.AB,
    H: (h.H||0) + seasonBat.H,
    '2B': (h['2B']||0) + (seasonBat['2B']||0),
    '3B': (h['3B']||0) + (seasonBat['3B']||0),
    HR: (h.HR||0) + seasonBat.HR,
    R: (h.R||0) + seasonBat.R,
    RBI: (h.RBI||0) + seasonBat.RBI,
    BB: (h.BB||0) + seasonBat.BB,
    K: (h.K||0) + seasonBat.K,
    HBP: (h.HPB||0) + seasonBat.HBP,
    SB: (h.SB||0) + seasonBat.SB,
    CS: (h.CS||0) + seasonBat.CS
  };
  merged['1B'] = merged.H - merged['2B'] - merged['3B'] - merged.HR;
  const rates = computeRates(merged);
  const pos = {};
  for (const p of POSITIONS) pos[p] = (histPos[p]||0) + (seasonPos[p]||0);
  return { name, _source:'blend', _rounds:rc, ...merged, ...rates, pos };
}

function computeRates(s){
  const ab = s.AB||0, h = s.H||0, bb = s.BB||0, hbp = s.HBP||s.HPB||0;
  const doubles = s['2B']||0, triples = s['3B']||0, hr = s.HR||0;
  const singles = h - doubles - triples - hr;
  const tb = singles + 2*doubles + 3*triples + 4*hr;
  const ave = ab > 0 ? h/ab : 0;
  const obp = (ab+bb+hbp) > 0 ? (h+bb+hbp)/(ab+bb+hbp) : 0;
  const slg = ab > 0 ? tb/ab : 0;
  return { Ave:ave, OBP:obp, SLG:slg, OPS:obp+slg, TB:tb };
}

// Blended stats: historical + season for first BLEND_THRESHOLD rounds, then season-only
function getBlendedStats(name){
  const hist = byName[name];

    return {

      '1B': seasonBat.H - (seasonBat['2B']||0) - (seasonBat['3B']||0) - (seasonBat.HR||0),
      '2B': seasonBat['2B']||0, '3B': seasonBat['3B']||0, HR: seasonBat.HR||0,
      R: seasonBat.R, RBI: seasonBat.RBI, BB: seasonBat.BB, K: seasonBat.K,
      HBP: seasonBat.HBP, SB: seasonBat.SB, CS: seasonBat.CS,
      ...rates, pos: seasonPos
    };
  }
  
  // Blend
  const h = hist || {};
  const histPos = (hist && hist.pos) || {};
  const merged = {
    G: (h.G||0) + seasonBat.G,
    PA: (h.PA||0) + seasonBat.PA,
    AB: (h.AB||0) + seasonBat.AB,
    H: (h.H||0) + seasonBat.H,
    '2B': (h['2B']||0) + (seasonBat['2B']||0),

    HR: (h.HR||0) + seasonBat.HR,
    R: (h.R||0) + seasonBat.R,
    RBI: (h.RBI||0) + seasonBat.RBI,
    BB: (h.BB||0) + seasonBat.BB,
    K: (h.K||0) + seasonBat.K,
    HBP: (h.HPB||0) + seasonBat.HBP,
    SB: (h.SB||0) + seasonBat.SB,
    CS: (h.CS||0) + seasonBat.CS
  };
  merged['1B'] = merged.H - merged['2B'] - merged['3B'] - merged.HR;
  const rates = computeRates(merged);
  const pos = {};
  for (const p of POSITIONS) pos[p] = (histPos[p]||0) + (seasonPos[p]||0);
  return { name, _source:'blend', _rounds:rc, ...merged, ...rates, pos };
}

// For player detail: show both historical and season separately
function getHistoricalStats(name){

function topPositions(p, n=3){

// ============================================================================
// PERSISTENCE — IndexedDB (durable, works offline)
// ============================================================================
const IDB_NAME = 'dugout';
const IDB_STORE = 'saves';
const IDB_VERSION = 1;
const IDB_AUTOSAVE_KEY = '__autosave';

function idbOpen(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)){
        db.createObjectStore(IDB_STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch(e){ return null; }
}
async function idbPut(key, value){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(value, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  } catch(e){ console.error('idb put failed', e); return false; }
}
async function idbDelete(key){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  } catch(e){ return false; }
}
async function idbKeys(){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAllKeys();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  } catch(e){ return []; }
}

async function saveAll(slotName){
  const snap = {...state, _t: Date.now()};
  return await idbPut(slotName, snap);
}
async function loadAll(slotName){
  return await idbGet(slotName);
}
async function listSaves(){
  const keys = await idbKeys();
  return keys.filter(k => k !== IDB_AUTOSAVE_KEY);
}

// Autosave: writes current state to a dedicated slot after any mutation. Debounced.
let _autosaveTimer = null;
function autosave(){
  clearTimeout(_autosaveTimer);
  _autosaveTimer = setTimeout(() => { idbPut(IDB_AUTOSAVE_KEY, {...state, _t: Date.now()}); }, 400);
}
async function loadAutosave(){
  return await idbGet(IDB_AUTOSAVE_KEY);
}

function getRound(id){ return state.rounds.find(r => r.id === id); }
function ensureRoundShape(r){
  r.batting = r.batting || {};
  r.pitching = r.pitching || {};
  r.positions = r.positions || {};
  r.battingOrder = r.battingOrder || Array(9).fill(null);
  r.substitutions = r.substitutions || [];  // [{name, position, innings?, note?}]
  // availablePlayers: subset of roster actually playing this round. null = "not yet chosen" (treat as whole roster).
  if (r.availablePlayers === undefined) r.availablePlayers = null;
  // Migrate legacy round.fielding (name->position) to positions (position->name)
  if (r.fielding && Object.keys(r.fielding).length){
    Object.entries(r.fielding).forEach(([name, pos]) => {
      if (pos && !r.positions[pos]) r.positions[pos] = name;
    });
    delete r.fielding;
  }
  r.notes = r.notes || '';
  r.fbPost = r.fbPost || '';
  return r;
}

// Returns the effective pool of players for a round — either the availablePlayers
// list (if the user has chosen one) or the full roster (fallback).
function getRoundPool(round){
  if (Array.isArray(round.availablePlayers) && round.availablePlayers.length > 0){
    return round.availablePlayers.slice();
  }
  return state.roster.slice();
}

function addRound(num){
  const n = num || (state.rounds.length ? Math.max(...state.rounds.map(r=>r.num))+1 : 1);
  // Find previous round (highest num less than n) to copy lineup from
  const prev = state.rounds.filter(r => r.num < n).sort((a,b)=>b.num-a.num)[0];
  const r = {
    id: uid(), num: n, date: '', opponent: '',
    ourScore: null, theirScore: null, venue: 'Home',
    notes: '', fbPost: '',
    batting: {}, pitching: {},
    battingOrder: prev && prev.battingOrder ? [...prev.battingOrder] : Array(9).fill(null),
    positions: prev && prev.positions ? {...prev.positions} : {},
    substitutions: [],
    availablePlayers: prev && prev.availablePlayers ? [...prev.availablePlayers] : null
  };
  // Pre-seed batting with current roster
  state.roster.forEach(name => { r.batting[name] = blankBat(); });
  state.rounds.push(r);
  state.rounds.sort((a,b)=>a.num-b.num);
  return r;
}
function deleteRound(id){
  if (!confirm('Delete this round? All its stats will be lost.')) return;
  state.rounds = state.rounds.filter(r => r.id !== id);
  if (state.activeTab === 'round:'+id) state.activeTab = 'lineup';
  render();
}

        <span>${hist ? 'CAREER' : 'NO HIST'} ${hist ? `<b>${fmtRate(hist.Ave)}</b> / <b>${fmtOps(hist.OPS)}</b> <span style="color:var(--muted)">(${hist.PA} PA)</span>` : ''}</span>
      </div>
      ${hasSeasonStats ? `
      <div class="season-stats">
        <span style="color:var(--ok)">SEASON <b>${fmtRate(season.Ave)}</b> / <b>${fmtOps(season.OPS)}</b> <span style="color:var(--muted)">(${season.PA} PA)</span></span>
      </div>` : ''}
      ${hasRecent ? `
      <div class="season-stats">
        <span style="color:#c8aa5c">LAST ${recent.rounds} <b>${fmtRate(recentRates.Ave)}</b> / <b>${fmtOps(recentRates.OPS)}</b> <span style="color:var(--muted)">(${recent.PA} PA)</span></span>
      </div>` : ''}
      <div class="pos-tags">${posHtml}</div>
    `;
    c.querySelector('[data-remove]').onclick = (e) => {
      e.stopPropagation();
      if (!confirm('Remove ' + name + ' from roster?')) return;
      state.roster = state.roster.filter(n => n !== name);
      state.battingOrder = state.battingOrder.map(n => n === name ? null : n);
      Object.keys(state.positions).forEach(k => { if (state.positions[k] === name) delete state.positions[k]; });
      render(); autosave();
    };
    c.onclick = () => showPlayerDetail(name);
    el.appendChild(c);
  });
  const g = document.createElement('div');
  g.className = 'card ghost';
  g.innerHTML = '＋ Add player';
  g.onclick = openAddPlayerModal;
  el.appendChild(g);
}

function renderLineup(){
  const el = document.getElementById('lineup');
  if (!el) return;
  el.innerHTML = '';
  for (let i = 0; i < 9; i++){
    const name = state.battingOrder[i];
    const roleLbl = SLOT_ROLE_LABELS[i] ? `<span class="role">${SLOT_ROLE_LABELS[i]}</span>` : '';
    const slot = document.createElement('div');
    slot.className = 'slot' + (name ? '' : ' empty');
    slot.onclick = () => openBattingSlotModal(i);
    if (name){
      const p = getBlendedStats(name);
      const {last, first} = splitName(name);
      const assignedPos = Object.entries(state.positions).find(([,v]) => v === name)?.[0];
      slot.innerHTML = `
        <div class="num">${i+1}${roleLbl}</div>
        <div>
          <div class="who">${last}<span class="first"> ${first}</span></div>
          <div class="mini">AVG <b>${fmtRate(p.Ave)}</b> · OBP <b>${fmtRate(p.OBP)}</b> · OPS <b>${fmtOps(p.OPS)}</b> · PA <b>${p.PA}</b></div>
        </div>
        <div class="pos-chip ${assignedPos ? '' : 'unset'}">${assignedPos || '—'}</div>
      `;
    } else {
      slot.innerHTML = `<div class="num">${i+1}${roleLbl}</div><div class="who">click to assign…</div><div class="pos-chip unset">—</div>`;
    }
    el.appendChild(slot);
  }
  updateBatNote();
}

function renderField(){
  const dots = document.querySelectorAll('.pos-dot');
  dots.forEach(dot => {
    const pos = dot.dataset.pos;
    const name = state.positions[pos];
    dot.classList.toggle('filled', !!name);
    const lastEl = dot.querySelector('[data-last]');
    if (name){
      lastEl.textContent = splitName(name).last.toUpperCase();
      lastEl.style.fontSize = name.length > 20 ? '9px' : '11px';
    } else lastEl.textContent = '';
    dot.onclick = () => openFieldPosModal(pos);
  });
  const dh = document.getElementById('dhSlot');
  if (dh){
    const dhName = state.positions['DH'];
    dh.classList.toggle('empty', !dhName);
    const whoEl = dh.querySelector('.who');
    if (dhName){
      const {last, first} = splitName(dhName);
      whoEl.innerHTML = `${last} <span style="color:var(--cream-dim);font-weight:600"> ${first}</span>`;
    } else whoEl.textContent = '— unassigned —';
    dh.onclick = () => openFieldPosModal('DH');
    updateFieldNote();
  }
}

function updateBatNote(){
  const n = document.getElementById('batNote');
  if (!n) return;
  const filled = state.battingOrder.filter(x => x).length;
  const dups = state.battingOrder.filter(x => x).reduce((a,b)=>(a[b]=(a[b]||0)+1,a),{});
  const dupNames = Object.entries(dups).filter(([,v])=>v>1).map(([k])=>splitName(k).last);
  if (dupNames.length){ n.className='conflicts'; n.textContent='Duplicate in batting order: '+dupNames.join(', '); }
  else if (filled === 9){ n.className='conflicts ok'; n.textContent='✓ Batting order complete (9/9)'; }
  else { n.className='conflicts ok'; n.textContent = filled+'/9 slots filled'; }
}

function updateFieldNote(){
  const n = document.getElementById('fieldNote');
  if (!n) return;
  const filled = FIELD_POSITIONS.filter(p => state.positions[p]).length;
  const dh = state.positions['DH'];
  let msg;
  if (filled === 9){ msg = '✓ All 9 fielding positions assigned'; if (dh) msg += ' · DH: ' + splitName(dh).last; }
  else { msg = filled + '/9 fielding positions assigned' + (dh ? ' · DH: ' + splitName(dh).last : ''); }
  n.className = 'conflicts ok'; n.textContent = msg;
}

function openBattingSlotModal(slotIdx){
  const current = state.battingOrder[slotIdx];
  const cands = state.roster.map(name => {
    const p = getBlendedStats(name);
    const rel = Math.min(1, p.PA/20);
    const score = p.OPS * rel + (1-rel) * 0.6;
    return { name, p, score };
  }).sort((a,b)=>b.score-a.score);
  let body = `<div class="m-sub">Best fits by OPS · Slot #${slotIdx+1}</div>`;
  body += current ? `<div style="margin-bottom:10px"><button class="btn ghost" onclick="clearBattingSlot(${slotIdx})">Clear this slot</button></div>` : '';
  body += '<div class="option-list">';
  cands.forEach(({name, p}) => {
    const {last, first} = splitName(name);
    const isInOrder = state.battingOrder.includes(name);
    const fitClass = p.OPS >= 1.0 ? 'strong' : p.OPS >= 0.85 ? 'good' : '';
    const src = p._source === 'season' ? '<span style="color:#7cb38a">●</span>' : '<span style="color:var(--dirt)">●</span>';
    body += `<div class="option" onclick="assignToBattingSlot(${slotIdx}, ${JSON.stringify(name).replace(/"/g,'&quot;')})">
      <div class="nm">${last} <span class="first">${first}</span>${isInOrder && name !== current ? ' <span style="font-size:10px;color:#c8432c">(already in order)</span>' : ''}</div>
      <div class="fit ${fitClass}">${src} AVG ${fmtRate(p.Ave)} · OBP ${fmtRate(p.OBP)} · <b>OPS ${fmtOps(p.OPS)}</b> <span style="color:var(--muted)">(${p.PA} PA)</span></div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Batting Slot #' + (slotIdx+1), body);
}

function openFieldPosModal(pos){
  const current = state.positions[pos];
  const cands = state.roster.map(name => {
    const p = getBlendedStats(name);
    const g = (p.pos && p.pos[pos]) || 0;
    return { name, p, g };
  }).sort((a,b)=>b.g-a.g || b.p.OPS-a.p.OPS);
  let body = `<div class="m-sub">Sorted by games at ${pos} (blended)</div>`;
  body += current ? `<div style="margin-bottom:10px"><button class="btn ghost" onclick="clearFieldPos('${pos}')">Clear this position</button></div>` : '';
  body += '<div class="option-list">';
  cands.forEach(({name, p, g}) => {
    const {last, first} = splitName(name);
    const usedElsewhere = Object.entries(state.positions).find(([k,v]) => v === name && k !== pos)?.[0];
    const fitClass = g >= 10 ? 'strong' : g >= 3 ? 'good' : '';
    body += `<div class="option" onclick="assignToFieldPos('${pos}', ${JSON.stringify(name).replace(/"/g,'&quot;')})">

  openModal('Field Position: ' + pos, body);

      closeModal();

    };

      document.querySelectorAll('[data-hk]').forEach(inp => {
        batting[inp.dataset.hk] = parseInt(inp.value) || 0;
      });
      const pos = blankPos();
      document.querySelectorAll('[data-hpos]').forEach(inp => {
        pos[inp.dataset.hpos] = parseInt(inp.value) || 0;
      });
      // Compute derived rate stats
      const H = batting.H || 0;
      const AB = batting.AB || 0;
      const BB = batting.BB || 0;
      const HPB = batting.HPB || 0;
      const doubles = batting['2B'] || 0;
      const triples = batting['3B'] || 0;
      const hr = batting.HR || 0;
      const singles = Math.max(0, H - doubles - triples - hr);
      const tb = singles + 2*doubles + 3*triples + 4*hr;
      const ave = AB > 0 ? H/AB : 0;
      const obpDen = AB + BB + HPB;
      const obp = obpDen > 0 ? (H + BB + HPB)/obpDen : 0;
      const slg = AB > 0 ? tb/AB : 0;
      const PA = AB + BB + HPB;
      
      state.historicalOverrides[name] = {
        ...batting,
        '1B': singles,
        PA, TB: tb,
        Ave: Math.round(ave*1000)/1000,
        OBP: Math.round(obp*1000)/1000,
        SLG: Math.round(slg*1000)/1000,
        OPS: Math.round((obp+slg)*1000)/1000,
        pos
      };
      rebuildByName();
      closeModal();
      render();
      autosave();
      showPlayerDetail(name);
    };
  });
}

// ============================================================================
// Shared helper: builds a 9-slot batting order using role-based scoring.
// Follows a traditional approach:
//   #1 Leadoff  — high OBP + speed
//   #2          — OBP + contact (low K rate)
//   #3          — consistent contact hitter with power
//   #4 Cleanup  — best pure power (SLG + ISO)
//   #5          — run producer protecting cleanup
//   #6-#7       — descending ability (OPS)
//   #8-#9       — faster players as second leadoff, if meaningful speed exists
function buildBattingOrder(pool, statsFor){
  const players = pool.map(name => {
    const p = statsFor(name);
    // Regress rate stats toward league-avg-ish when sample is small (<20 PA)
    const rel = Math.min(1, (p.PA||0) / 20);
    const obp = (p.OBP||0) * rel + (1-rel) * 0.30;
    const slg = (p.SLG||0) * rel + (1-rel) * 0.35;
    const ave = (p.Ave||0) * rel + (1-rel) * 0.25;
    const ops = obp + slg;
    const kRate = (p.PA||0) > 0 ? (p.K||0) / p.PA : 0.25;
    const contact = Math.max(0, 1 - kRate);
    // Speed: net stolen bases per game, normalized (0.5/G = top speed, 0 = slow)
    const netSB = (p.SB||0) - (p.CS||0);
    const sbPerG = (p.G||0) > 0 ? Math.max(0, netSB) / p.G : 0;
    const speed = Math.min(1, sbPerG / 0.5);
    const iso = Math.max(0, slg - ave);
    return { name, obp, slg, ave, ops, contact, speed, iso };
  });

  const order = new Array(9).fill(null);
  const used = new Set();
  const pickBy = (scoreFn) => {
    const avail = players.filter(x => !used.has(x.name));
    if (!avail.length) return null;
    return avail.map(x => ({ x, s: scoreFn(x) })).sort((a,b) => b.s - a.s)[0].x;
  };
  const assign = (slot, p) => { if (p){ order[slot] = p.name; used.add(p.name); } };

  // High-leverage roles first
  assign(3, pickBy(x => x.slg*0.60 + x.iso*0.30 + x.ops*0.10));         // #4 cleanup: pure power
  assign(2, pickBy(x => x.ave*0.35 + x.slg*0.35 + x.obp*0.30));         // #3: consistent + power
  assign(0, pickBy(x => x.obp*0.70 + x.speed*0.30));                    // #1 leadoff: OBP + speed
  assign(1, pickBy(x => x.obp*0.55 + x.contact*0.25 + x.ave*0.20));     // #2: OBP + contact
  assign(4, pickBy(x => x.ops*0.50 + x.slg*0.30 + x.ave*0.20));         // #5: protects cleanup

  // #6-#9:
  //   #6-#7 get the best remaining hitters by OPS (they're still meaningful offensive spots)
  //   #8-#9 go to the two with the best combined speed + OBP — the "second leadoff" idea.
  //   If nobody has meaningful speed, this collapses gracefully to OPS descending.
  const remaining = players.filter(x => !used.has(x.name));
  const byOPS = [...remaining].sort((a,b) => b.ops - a.ops);
  if (byOPS[0]) assign(5, byOPS[0]); // #6
  if (byOPS[1]) assign(6, byOPS[1]); // #7
  const rest = players.filter(x => !used.has(x.name));
  const secondLeadoff = (x) => x.speed * 0.55 + x.obp * 0.45;
  const byRest = [...rest].sort((a,b) => secondLeadoff(b) - secondLeadoff(a));
  if (byRest[0]) assign(8, byRest[0]); // #9 — closest to leadoff
  if (byRest[1]) assign(7, byRest[1]); // #8
  // Any stragglers (roster > 9) get dropped — we only fill 9 slots.
  return order;
}

// ============================================================================
// AUTO-SUGGEST
// ============================================================================
function suggestBattingOrder(){
  state.battingOrder = buildBattingOrder(state.roster, getBlendedStats);
  renderLineup();
}

function suggestFieldPositions(){
  const scores = {};
  FIELD_POSITIONS.forEach(pos => {
    scores[pos] = state.roster.map(name => {
      const p = getBlendedStats(name);
      const g = (p.pos && p.pos[pos]) || 0;
      return { name, score: g * 10 + p.OPS, g, ops: p.OPS };
    }).sort((a,b)=>b.score-a.score);
  });
  const posOrder = [...FIELD_POSITIONS].sort((a,b) => {
    const ta = scores[a][0]?.g || 0, tb = scores[b][0]?.g || 0;
    return tb - ta;
  });
  const newPositions = {};
  const used = new Set();
  for (const pos of posOrder){
    const pick = scores[pos].find(c => !used.has(c.name));
    if (pick){ newPositions[pos] = pick.name; used.add(pick.name); }
  }
  const leftover = state.roster.filter(n => !used.has(n));
  if (leftover.length > 0){
    const dh = leftover.map(n => ({n, ops: getBlendedStats(n).OPS})).sort((a,b)=>b.ops-a.ops)[0];
    newPositions['DH'] = dh.n;
  }
  state.positions = newPositions;
  renderField(); renderLineup();
}

function renderRoundLineup(round){
  const el = document.getElementById('r-lineup');
  if (!el) return;
  el.innerHTML = '';
  for (let i = 0; i < 9; i++){
    const name = round.battingOrder[i];
    const roleLbl = SLOT_ROLE_LABELS[i] ? `<span class="role">${SLOT_ROLE_LABELS[i]}</span>` : '';
    const slot = document.createElement('div');
    slot.className = 'slot' + (name ? '' : ' empty');
    slot.onclick = () => openRoundBattingSlotModal(round, i);
    if (name){
      const p = getBlendedStatsForRound(name, round.num);
      const {last, first} = splitName(name);
      const assignedPos = Object.entries(round.positions).find(([,v]) => v === name)?.[0];
      slot.innerHTML = `
        <div class="num">${i+1}${roleLbl}</div>
        <div>
          <div class="who">${last}<span class="first"> ${first}</span></div>
          <div class="mini">AVG <b>${fmtRate(p.Ave)}</b> · OBP <b>${fmtRate(p.OBP)}</b> · OPS <b>${fmtOps(p.OPS)}</b> · PA <b>${p.PA}</b></div>
        </div>
        <div class="pos-chip ${assignedPos ? '' : 'unset'}">${assignedPos || '—'}</div>
      `;
    } else {
      slot.innerHTML = `<div class="num">${i+1}${roleLbl}</div><div class="who">click to assign…</div><div class="pos-chip unset">—</div>`;
    }
    el.appendChild(slot);
  }
  // Note
  const n = document.getElementById('r-batNote');
  const filled = round.battingOrder.filter(x => x).length;
  const dups = round.battingOrder.filter(x => x).reduce((a,b)=>(a[b]=(a[b]||0)+1,a),{});
  const dupNames = Object.entries(dups).filter(([,v])=>v>1).map(([k])=>splitName(k).last);
  if (dupNames.length){ n.className='conflicts'; n.textContent='Duplicate: '+dupNames.join(', '); }
  else if (filled === 9){ n.className='conflicts ok'; n.textContent='✓ Batting order locked in (9/9)'; }
  else { n.className='conflicts ok'; n.textContent = filled+'/9 slots filled'; }
}

function renderRoundField(round){
  const dots = document.querySelectorAll('#r-diamond .pos-dot');
  dots.forEach(dot => {
    const pos = dot.dataset.pos;
    const name = round.positions[pos];
    dot.classList.toggle('filled', !!name);
    const lastEl = dot.querySelector('[data-last]');
    if (name){
      lastEl.textContent = splitName(name).last.toUpperCase();
      lastEl.style.fontSize = name.length > 20 ? '9px' : '11px';
    } else lastEl.textContent = '';
    dot.onclick = () => openRoundFieldPosModal(round, pos);
  });
  const dh = document.getElementById('r-dhSlot');
  if (dh){
    const dhName = round.positions['DH'];
    dh.classList.toggle('empty', !dhName);
    const whoEl = dh.querySelector('.who');
    if (dhName){
      const {last, first} = splitName(dhName);
      whoEl.innerHTML = `${last} <span style="color:var(--cream-dim);font-weight:600"> ${first}</span>`;
    } else whoEl.textContent = '— unassigned —';
    dh.onclick = () => openRoundFieldPosModal(round, 'DH');
  }
  const note = document.getElementById('r-fieldNote');
  if (note){
    const filled = FIELD_POSITIONS.filter(p => round.positions[p]).length;
    const dhName = round.positions['DH'];
    let msg;
    if (filled === 9){ msg = '✓ All 9 positions locked in'; if (dhName) msg += ' · DH: ' + splitName(dhName).last; }
    else { msg = filled + '/9 fielding positions assigned' + (dhName ? ' · DH: ' + splitName(dhName).last : ''); }
    note.className = 'conflicts ok'; note.textContent = msg;
  }
}

function openRoundBattingSlotModal(round, slotIdx){
  // Build candidate pool: only players available for this round
  const poolSet = new Set(getRoundPool(round));
  Object.keys(round.batting || {}).forEach(n => poolSet.add(n));
  const pool = [...poolSet];
  const current = round.battingOrder[slotIdx];
  const cands = pool.map(name => {
    const p = getBlendedStatsForRound(name, round.num);
    const rel = Math.min(1, p.PA/20);
    const score = p.OPS * rel + (1-rel) * 0.6;
    return { name, p, score };
  }).sort((a,b)=>b.score-a.score);
  let body = `<div class="m-sub">Best fits by OPS (using pre-round stats) · Round ${round.num} Slot #${slotIdx+1}</div>`;
  body += current ? `<div style="margin-bottom:10px"><button class="btn ghost" onclick="clearRoundBattingSlot('${round.id}',${slotIdx})">Clear this slot</button></div>` : '';
  body += '<div class="option-list">';
  cands.forEach(({name, p}) => {
    const {last, first} = splitName(name);
    const isInOrder = round.battingOrder.includes(name);
    const fitClass = p.OPS >= 1.0 ? 'strong' : p.OPS >= 0.85 ? 'good' : '';
    const src = p._source === 'season' ? '<span style="color:#7cb38a">●</span>' : '<span style="color:var(--dirt)">●</span>';
    body += `<div class="option" onclick="assignToRoundBattingSlot('${round.id}', ${slotIdx}, ${JSON.stringify(name).replace(/"/g,'&quot;')})">
      <div class="nm">${last} <span class="first">${first}</span>${isInOrder && name !== current ? ' <span style="font-size:10px;color:#c8432c">(already in order)</span>' : ''}</div>
      <div class="fit ${fitClass}">${src} AVG ${fmtRate(p.Ave)} · OBP ${fmtRate(p.OBP)} · <b>OPS ${fmtOps(p.OPS)}</b> <span style="color:var(--muted)">(${p.PA} PA)</span></div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Round ' + round.num + ' · Batting #' + (slotIdx+1), body);
}

function openRoundFieldPosModal(round, pos){
  const poolSet = new Set(getRoundPool(round));
  Object.keys(round.batting || {}).forEach(n => poolSet.add(n));
  const pool = [...poolSet];
  const current = round.positions[pos];
  const cands = pool.map(name => {
    const p = getBlendedStatsForRound(name, round.num);
    const g = (p.pos && p.pos[pos]) || 0;
    return { name, p, g };
  }).sort((a,b)=>b.g-a.g || b.p.OPS-a.p.OPS);
  let body = `<div class="m-sub">Sorted by games at ${pos} (pre-round)</div>`;
  body += current ? `<div style="margin-bottom:10px"><button class="btn ghost" onclick="clearRoundFieldPos('${round.id}','${pos}')">Clear this position</button></div>` : '';
  body += '<div class="option-list">';
  cands.forEach(({name, p, g}) => {
    const {last, first} = splitName(name);
    const usedElsewhere = Object.entries(round.positions).find(([k,v]) => v === name && k !== pos)?.[0];
    const fitClass = g >= 10 ? 'strong' : g >= 3 ? 'good' : '';
    body += `<div class="option" onclick="assignToRoundFieldPos('${round.id}','${pos}', ${JSON.stringify(name).replace(/"/g,'&quot;')})">
      <div class="nm">${last} <span class="first">${first}</span>${usedElsewhere ? ` <span style="font-size:10px;color:#c8432c">(currently ${usedElsewhere})</span>` : ''}</div>
      <div class="fit ${fitClass}"><b>${g}g</b> at ${pos} · OPS ${fmtOps(p.OPS)}</div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Round ' + round.num + ' · ' + pos, body);
}

function assignToRoundBattingSlot(roundId, slotIdx, name){
  const r = getRound(roundId); if (!r) return;
  r.battingOrder[slotIdx] = name; closeModal(); renderRoundLineup(r); autosave();
}
function clearRoundBattingSlot(roundId, slotIdx){
  const r = getRound(roundId); if (!r) return;
  r.battingOrder[slotIdx] = null; closeModal(); renderRoundLineup(r); autosave();
}
function assignToRoundFieldPos(roundId, pos, name){
  const r = getRound(roundId); if (!r) return;
  Object.keys(r.positions).forEach(k => { if (r.positions[k] === name) delete r.positions[k]; });
  r.positions[pos] = name;
  closeModal(); renderRoundField(r); renderRoundLineup(r); autosave();
}
function clearRoundFieldPos(roundId, pos){
  const r = getRound(roundId); if (!r) return;
  delete r.positions[pos]; closeModal(); renderRoundField(r); renderRoundLineup(r); autosave();
}

function suggestRoundBattingOrder(round){
  // Candidate pool: available players this round + anyone with batting already entered
  const poolSet = new Set(getRoundPool(round));
  Object.keys(round.batting || {}).forEach(n => poolSet.add(n));
  const pool = [...poolSet];
  round.battingOrder = buildBattingOrder(pool, name => getBlendedStatsForRound(name, round.num));
}

function suggestRoundField(round){
  const poolSet = new Set(getRoundPool(round));
  Object.keys(round.batting || {}).forEach(n => poolSet.add(n));
  const pool = [...poolSet];
  const scores = {};
  FIELD_POSITIONS.forEach(pos => {
    scores[pos] = pool.map(name => {
      const p = getBlendedStatsForRound(name, round.num);
      const g = (p.pos && p.pos[pos]) || 0;
      return { name, score: g * 10 + p.OPS, g, ops: p.OPS };
    }).sort((a,b)=>b.score-a.score);
  });
  const posOrder = [...FIELD_POSITIONS].sort((a,b) => {
    const ta = scores[a][0]?.g || 0, tb = scores[b][0]?.g || 0;
    return tb - ta;
  });
  const newPositions = {};
  const used = new Set();
  for (const pos of posOrder){
    const pick = scores[pos].find(c => !used.has(c.name));
    if (pick){ newPositions[pos] = pick.name; used.add(pick.name); }
  }
  const leftover = pool.filter(n => !used.has(n));
  if (leftover.length > 0){
    const dh = leftover.map(n => ({n, ops: getBlendedStatsForRound(n, round.num).OPS})).sort((a,b)=>b.ops-a.ops)[0];
    newPositions['DH'] = dh.n;
  }
  round.positions = newPositions;
}

function updateResultChip(round){
  // Just re-render meta panel to update chip
  const panel = document.querySelector('[data-round-id="'+round.id+'"]');
  if (panel){
    const existing = panel.querySelector('.result-chip');
    let result = '';
    if (round.ourScore != null && round.theirScore != null){
      if (+round.ourScore > +round.theirScore) result = 'W';
      else if (+round.ourScore < +round.theirScore) result = 'L';
      else result = 'T';
    }
    if (existing) existing.remove();
    if (result){
      const chip = document.createElement('div');
      chip.className = 'result-chip ' + result;
      chip.textContent = result==='W'?'WIN':result==='L'?'LOSS':'TIE';
      // Insert before the delete button wrapper (last child)
      const metaGrid = panel.querySelector('.round-meta');
      metaGrid.insertBefore(chip, metaGrid.lastElementChild);
    }
  }
}

function renderBattingTable(round){
  const body = document.getElementById('batting-body');
  const totalsRow = document.getElementById('batting-totals');
  if (!body) return;
  
  const players = Object.keys(round.batting).sort((a,b) => {
    const rA = state.roster.indexOf(a), rB = state.roster.indexOf(b);
    if (rA !== -1 && rB !== -1) return rA - rB;
    if (rA !== -1) return -1;
    if (rB !== -1) return 1;
    return a.localeCompare(b);
  });
  
  body.innerHTML = '';
  players.forEach(name => {
    const b = round.batting[name];
    const {last, first} = splitName(name);
    const tr = document.createElement('tr');
    tr.dataset.name = name;
    let h = `<td class="first-col">${last} <span class="first">${first}</span></td>`;
    BAT_COLS.forEach(c => {
      h += `<td><input type="number" class="num bat-in" data-col="${c}" value="${b[c]||0}" min="0" step="1"></td>`;
    });
    h += `<td class="derived" data-d="Ave">.000</td><td class="derived" data-d="OBP">.000</td><td class="derived" data-d="SLG">.000</td><td class="derived" data-d="OPS">.000</td>`;
    h += `<td><button class="row-x" data-remove>×</button></td>`;
    tr.innerHTML = h;
    body.appendChild(tr);
    updateBattingRowDerived(tr, b);
    
    tr.querySelectorAll('input.bat-in').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const col = e.target.dataset.col;
        b[col] = parseInt(e.target.value) || 0;
        updateBattingRowDerived(tr, b);
        updateBattingTotals(round);
      });
    });
    tr.querySelector('[data-remove]').onclick = () => {
      if (!confirm('Remove '+name+' from this round\'s batting?')) return;
      delete round.batting[name];
      renderBattingTable(round);
    };
  });
  
  if (!players.length){
    body.innerHTML = '<tr><td colspan="'+(BAT_COLS.length+6)+'" class="empty-state">No batters yet. Click "Pre-fill roster" to add your lineup.</td></tr>';
  }
  updateBattingTotals(round);
}

function updateBattingRowDerived(tr, b){
  const rates = computeRates(b);
  tr.querySelector('[data-d="Ave"]').textContent = fmtRate(rates.Ave);
  tr.querySelector('[data-d="OBP"]').textContent = fmtRate(rates.OBP);
  tr.querySelector('[data-d="SLG"]').textContent = fmtRate(rates.SLG);
  tr.querySelector('[data-d="OPS"]').textContent = fmtOps(rates.OPS);
}

function updateBattingTotals(round){
  const tr = document.getElementById('batting-totals');
  if (!tr) return;
  const tot = blankBat();
  Object.values(round.batting || {}).forEach(b => {
    BAT_COLS.forEach(c => tot[c] += (b[c]||0));
  });
  const rates = computeRates(tot);
  let h = `<td class="first-col">TEAM</td>`;
  BAT_COLS.forEach(c => h += `<td>${tot[c]||0}</td>`);
  h += `<td>${fmtRate(rates.Ave)}</td><td>${fmtRate(rates.OBP)}</td><td>${fmtRate(rates.SLG)}</td><td>${fmtOps(rates.OPS)}</td><td></td>`;
  tr.innerHTML = h;
}

function renderPitchingTable(round){
  const body = document.getElementById('pitching-body');
  if (!body) return;
  const players = Object.keys(round.pitching);
  body.innerHTML = '';
  players.forEach(name => {
    const p = round.pitching[name];
    const {last, first} = splitName(name);
    const tr = document.createElement('tr');
    tr.dataset.name = name;
    let h = `<td class="first-col">${last} <span class="first">${first}</span></td>`;
    PITCH_COLS.forEach(c => {
      const step = c === 'IP' ? '0.01' : '1';
      h += `<td><input type="number" class="num pitch-in" data-col="${c}" value="${p[c]||0}" min="0" step="${step}"></td>`;
    });
    h += `<td class="derived" data-d="ERA">-</td><td class="derived" data-d="WHIP">-</td><td class="derived" data-d="K9">-</td>`;
    h += `<td><button class="row-x" data-remove>×</button></td>`;
    tr.innerHTML = h;
    body.appendChild(tr);
    updatePitchingRowDerived(tr, p);
    tr.querySelectorAll('input.pitch-in').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const col = e.target.dataset.col;
        p[col] = parseFloat(e.target.value) || 0;
        updatePitchingRowDerived(tr, p);
        updatePitchingTotals(round);
      });
    });
    tr.querySelector('[data-remove]').onclick = () => {
      if (!confirm('Remove '+name+' from this round\'s pitching?')) return;
      delete round.pitching[name];
      renderPitchingTable(round);
    };
  });
  if (!players.length){
    body.innerHTML = '<tr><td colspan="'+(PITCH_COLS.length+5)+'" class="empty-state">No pitchers yet. Click "＋ Add pitcher" to enter pitching stats.</td></tr>';
  }
  updatePitchingTotals(round);
}

function updatePitchingRowDerived(tr, p){
  const ip = p.IP || 0;
  const era = ip > 0 ? (9 * (p.ER||0) / ip) : 0;
  const whip = ip > 0 ? ((p.H||0) + (p.BB||0)) / ip : 0;
  const k9 = ip > 0 ? 9 * (p.K||0) / ip : 0;
  tr.querySelector('[data-d="ERA"]').textContent = ip > 0 ? era.toFixed(2) : '-';
  tr.querySelector('[data-d="WHIP"]').textContent = ip > 0 ? whip.toFixed(2) : '-';
  tr.querySelector('[data-d="K9"]').textContent = ip > 0 ? k9.toFixed(1) : '-';
}

function updatePitchingTotals(round){
  const tr = document.getElementById('pitching-totals');
  if (!tr) return;
  const tot = blankPitch();
  Object.values(round.pitching || {}).forEach(p => {
    PITCH_COLS.forEach(c => tot[c] += (p[c]||0));
  });
  const ip = tot.IP||0;
  const era = ip > 0 ? (9 * tot.ER / ip).toFixed(2) : '-';
  const whip = ip > 0 ? ((tot.H + tot.BB) / ip).toFixed(2) : '-';
  const k9 = ip > 0 ? (9 * tot.K / ip).toFixed(1) : '-';
  let h = `<td class="first-col">TEAM</td>`;
  PITCH_COLS.forEach(c => h += `<td>${c==='IP'?tot[c].toFixed(2):tot[c]}</td>`);
  h += `<td>${era}</td><td>${whip}</td><td>${k9}</td><td></td>`;
  tr.innerHTML = h;
}

function prefillBatting(round){
  let added = 0;
  state.roster.forEach(name => {
    if (!round.batting[name]){ round.batting[name] = blankBat(); added++; }
  });
  renderBattingTable(round);
}

function openAddToRoundModal(round, kind){
  // Show current roster + "custom name" option
  const taken = Object.keys(round[kind]);
  let body = `
    <div class="m-sub">Add to ${kind} · Round ${round.num}</div>
    <input class="option-add-input" id="addR" placeholder="Type a player name or pick below">
    <div class="option-list" id="addList" style="margin-top:10px;max-height:400px;overflow:auto"></div>
  `;
  openModal('Add ' + (kind==='batting'?'batter':'pitcher'), body, () => {
    const inp = document.getElementById('addR');
    const list = document.getElementById('addList');
    const all = [...state.roster, ...PLAYER_DB.map(p=>p.name).filter(n => !state.roster.includes(n))];
    const fill = (q) => {
      const qn = (q||'').toLowerCase();
      const cands = all.filter(n => !taken.includes(n) && n.toLowerCase().includes(qn)).slice(0, 50);
      let h = '';
      cands.forEach(name => {
        const {last, first} = splitName(name);
        const inRoster = state.roster.includes(name);
        h += `<div class="option" onclick="addToRound('${round.id}','${kind}',${JSON.stringify(name).replace(/"/g,'&quot;')})">
          <div class="nm">${last} <span class="first">${first}</span>${inRoster?' <span style="font-size:10px;color:var(--ok)">(roster)</span>':''}</div>
          <div class="fit"></div><div></div>
        </div>`;
      });
      if (q && q.trim()){
        h = `<div class="option" style="border-color:var(--red)" onclick="addToRound('${round.id}','${kind}',${JSON.stringify(q.trim()).replace(/"/g,'&quot;')})">
          <div class="nm" style="color:var(--red)">＋ Add "${q.trim()}" as new player</div>
          <div class="fit">format: Lastname,Firstname</div><div></div>
        </div>` + h;
      }
      list.innerHTML = h;
    };
    fill(''); inp.oninput = (e) => fill(e.target.value); inp.focus();
  });
}
function addToRound(roundId, kind, rawName){
  const round = getRound(roundId);
  if (!round) return;
  let name = rawName.trim();
  if (!name.includes(',')){ const parts = name.split(/\s+/); if (parts.length >= 2) name = parts[parts.length-1]+','+parts.slice(0,-1).join(' '); }
  if (kind === 'batting') round.batting[name] = round.batting[name] || blankBat();
  else round.pitching[name] = round.pitching[name] || blankPitch();
  closeModal();
  if (kind === 'batting') renderBattingTable(round);
  else renderPitchingTable(round);
}

  }).join('');

    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">

    </div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto">${items}</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--line)">
      <button class="btn small" id="btn-avail-cancel">Cancel</button>
      <button class="btn primary small" id="btn-avail-save">Save</button>
    </div>
  `;
  openModal('Round ' + round.num + ' — Available Players', body, () => {
    const setAll = (val) => document.querySelectorAll('[data-avail]').forEach(cb => cb.checked = val);
    document.getElementById('btn-avail-all').onclick = () => setAll(true);
    document.getElementById('btn-avail-none').onclick = () => setAll(false);
    document.getElementById('btn-avail-prev').onclick = () => {
      const prev = state.rounds.filter(r => r.num < round.num && Array.isArray(r.availablePlayers)).sort((a,b)=>b.num-a.num)[0];
      if (!prev){ alert('No previous round with an available-players selection.'); return; }
      const prevSet = new Set(prev.availablePlayers);
      document.querySelectorAll('[data-avail]').forEach(cb => cb.checked = prevSet.has(cb.dataset.avail));
    };
    document.getElementById('btn-avail-cancel').onclick = closeModal;
    document.getElementById('btn-avail-save').onclick = () => {
      const picked = [];
      document.querySelectorAll('[data-avail]').forEach(cb => { if (cb.checked) picked.push(cb.dataset.avail); });
      round.availablePlayers = picked.length === state.roster.length ? null : picked;
      // Pre-fill batting stats rows for any newly-available players so they show up in the table
      picked.forEach(name => { if (!round.batting[name]) round.batting[name] = blankBat(); });
      closeModal();
      render();
      autosave();
    };
  });
}

    el.innerHTML = '<div class="empty-state" style="padding:20px">No substitutions recorded. Click ＋ Add substitution to track a mid-game position change.</div>';

  let html = '<div class="table-wrap"><table class="stat-table"><thead><tr><th class="first-col">Player</th><th>New Position</th><th>Innings</th><th>Note</th><th class="act-col"></th></tr></thead><tbody>';

      <td>${sub.position || '—'}</td>

      </label>
      <label style="display:flex;flex-direction:column;gap:4px">

function deleteSub(roundId, idx){
  const r = getRound(roundId); if (!r || !r.substitutions) return;
  if (!confirm('Remove this substitution?')) return;
  r.substitutions.splice(idx, 1);
  render(); autosave();
}
