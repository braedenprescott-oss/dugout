// ============================================================================
// QUICK STATS ENTRY MODE (single-player card, big inputs)
// ============================================================================
function openQuickEntryMode(round){
  // Build the ordered pool: batting order first (slot #1 through #9), then any extras with stats, then available players
  const order = [];
  const seen = new Set();
  round.battingOrder.forEach(n => { if (n && !seen.has(n)){ order.push(n); seen.add(n); } });
  const pool = getRoundPool(round);
  pool.forEach(n => { if (!seen.has(n)){ order.push(n); seen.add(n); } });
  Object.keys(round.batting || {}).forEach(n => { if (!seen.has(n) && round.batting[n] && (round.batting[n].PA||0) > 0){ order.push(n); seen.add(n); } });
  
  if (order.length === 0){
    alert('No players to enter stats for. Pick available players first.');
    return;
  }
  
  let idx = 0;
  
  const renderCard = () => {
    const name = order[idx];
    if (!round.batting[name]) round.batting[name] = blankBat();
    const b = round.batting[name];
    const {last, first} = splitName(name);
    const slotNum = round.battingOrder.indexOf(name) + 1;
    const slotLabel = slotNum > 0 ? '#' + slotNum : '—';
    
    const bigInput = (key, label) => `
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-family:'Big Shoulders Display',sans-serif;font-size:11px;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;font-weight:700">${label}</div>
        <input type="number" min="0" step="1" data-qk="${key}" value="${b[key]||0}"
          style="width:70px;height:54px;font-size:28px;font-family:'JetBrains Mono',monospace;font-weight:700;text-align:center;background:rgba(245,236,211,0.05);color:var(--cream);border:2px solid var(--line);border-radius:8px">
      </div>`;
    
    const body = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)">
        <div>
          <div style="font-family:'Big Shoulders Display',sans-serif;font-size:12px;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;font-weight:700">Player ${idx+1} of ${order.length} · Slot ${slotLabel}</div>
          <div style="font-family:'Big Shoulders Display',sans-serif;font-size:28px;font-weight:900;color:var(--cream)">${last}<span style="color:var(--dirt);font-weight:600">, ${first}</span></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;margin-bottom:20px">
        ${bigInput('PA','PA')}${bigInput('AB','AB')}${bigInput('H','H')}${bigInput('2B','2B')}${bigInput('3B','3B')}${bigInput('HR','HR')}
        ${bigInput('R','R')}${bigInput('RBI','RBI')}${bigInput('BB','BB')}${bigInput('K','K')}${bigInput('HBP','HBP')}${bigInput('SB','SB')}${bigInput('CS','CS')}
      </div>
      <div style="display:flex;gap:8px;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--line)">
        <button class="btn ghost small" id="btn-qe-prev" ${idx===0?'disabled':''}>← Previous</button>
        <div style="font-size:12px;color:var(--muted)">Changes save as you type</div>
        <button class="btn primary small" id="btn-qe-next">${idx === order.length - 1 ? 'Done' : 'Next →'}</button>
      </div>
      <div style="display:flex;justify-content:center;margin-top:12px">
        <button class="btn ghost small" id="btn-qe-close">Close quick entry</button>
      </div>
    `;
    
    openModal('Quick Stats Entry', body, () => {
      // Save on every keystroke to the current player's batting record
      document.querySelectorAll('[data-qk]').forEach(inp => {
        inp.oninput = (e) => {
          b[e.target.dataset.qk] = parseInt(e.target.value) || 0;
          autosave();
        };
      });
      document.getElementById('btn-qe-prev').onclick = () => { if (idx > 0){ idx--; renderCard(); } };
      document.getElementById('btn-qe-next').onclick = () => {
        if (idx < order.length - 1){ idx++; renderCard(); }
        else { closeModal(); render(); }
      };
      document.getElementById('btn-qe-close').onclick = () => { closeModal(); render(); };
    });
  };
  
  renderCard();
}

// ============================================================================
// FACEBOOK POST GENERATOR
// ============================================================================
function generateFBPost(round){
  const lines = [];
  const tm = state.teamName || 'Our Team';
  
  // Header line — team, score, result, opponent
  let header = `⚾ ${tm}`;
  if (round.ourScore != null && round.theirScore != null && round.opponent){
    const us = +round.ourScore, them = +round.theirScore;
    const res = us > them ? '' : (us < them ? '' : '');  // score alone implies result
    header += ` ${us}, ${round.opponent} ${them}`;
  } else if (round.opponent){
    header += ` ${round.venue==='Away'?'@':'vs'} ${round.opponent}`;
  }
  header += ` — Round ${round.num}`;
  if (round.date){
    try {
      const d = new Date(round.date + 'T00:00:00');
      const fmt = d.toLocaleDateString(undefined, {weekday:'short', day:'numeric', month:'short'});
      header += ` · ${fmt}`;
    } catch(e){}
  }
  lines.push(header);
  
  // Blank line, then user's game summary (if any)
  lines.push('');
  if (round.notes && round.notes.trim()){
    lines.push(round.notes.trim());
    lines.push('');
  }
  
  // Gather batters — anyone who contributed in any meaningful way
  const batters = Object.entries(round.batting || {})
    .map(([name, s]) => ({ name, s }))
    .filter(({s}) => (s.PA||0) > 0);
  const hiBat = batters.filter(({s}) => batHits(s) >= 1 || (s.RBI||0) >= 1 || (s.BB||0) >= 2 || (s.R||0) >= 2 || (s.SB||0) >= 2)
    .sort((a,b) => {
      // Performance score — weighted by linear-weights-style values:
      //   total bases (HR=4, 3B=3, 2B=2, 1B=1) heavily, then RBI, R, BB, HBP, SB.
      //   Subtract a small amount for K and CS so a 1-for-4 with 3K ranks below a 1-for-4 with no Ks.
      const score = ({s}) => {
        const tb = (s['1B']||0) + 2*(s['2B']||0) + 3*(s['3B']||0) + 4*(s.HR||0);
        return tb * 1.5
             + (s.RBI||0) * 1.2
             + (s.R||0) * 1.0
             + (s.BB||0) * 0.8
             + (s.HBP||0) * 0.7
             + (s.SB||0) * 0.4
             - (s.K||0) * 0.1
             - (s.CS||0) * 0.3;
      };
      const scoreA = score(a), scoreB = score(b);
      if (scoreB !== scoreA) return scoreB - scoreA;
      // Tie-break: better OBP
      const obpFn = (s) => {
        const denom = (s.AB||0) + (s.BB||0) + (s.HBP||0);
        return denom > 0 ? (batHits(s) + (s.BB||0) + (s.HBP||0)) / denom : 0;
      };
      return obpFn(b.s) - obpFn(a.s);
    });
  
  // Compact batter stat line. Style chosen by user: 1B-2B-3B-HR-style explicit hit breakdown.
  // Format: "Last  AB-1B-2B-3B-HR  R, RBI, BB, K"
  // The hit breakdown includes the line "x-y-z-w" only if the player got any hits, otherwise just "AB" alone.
  const n = (count, label) => count === 1 ? label : `${count}${label}`;
  const batLine = (s) => {
    const parts = [];
    const ab = s.AB||0;
    const h = batHits(s);
    if (h > 0){
      // 1B-2B-3B-HR with AB shown to the left, e.g. "AB:4 1-1-0-1"
      parts.push(`${h}-${ab} (${s['1B']||0}/${s['2B']||0}/${s['3B']||0}/${s.HR||0})`);
    } else if (ab > 0){
      parts.push(`0-${ab}`);
    }
    if (s.R) parts.push(n(s.R, 'R'));
    if (s.RBI) parts.push(n(s.RBI, 'RBI'));
    if (s.BB) parts.push(n(s.BB, 'BB'));
    if (s.SB) parts.push(n(s.SB, 'SB'));
    return parts.join(', ');
  };
  
  if (hiBat.length){
    lines.push('━━━ BATTING ━━━');
    // Find longest name for alignment (FB mostly ignores spacing but looks better in monospace if anyone pastes)
    const maxLen = Math.max(...hiBat.map(({name}) => displayNameShort(name).length));
    hiBat.forEach(({name, s}) => {
      const nm = displayNameShort(name).padEnd(Math.min(maxLen, 15));
      lines.push(`${nm}  ${batLine(s)}`);
    });
    lines.push('');
  }
  
  // Pitchers — anyone with IP > 0
  const pitchers = Object.entries(round.pitching || {})
    .filter(([, s]) => (s.IP||0) > 0)
    .sort((a,b) => (b[1].IP||0) - (a[1].IP||0));
  
  const pitchLine = (s) => {
    const parts = [`${s.IP||0} IP`];
    if (s.H != null && s.H !== '') parts.push(`${s.H||0}H`);
    if (s.ER != null && s.ER !== '') parts.push(`${s.ER||0}ER`);
    if (s.BB) parts.push(n(s.BB, 'BB'));
    if (s.K) parts.push(`${s.K}K`);
    // Include pitch count + strike% if the user entered them
    if ((s.Pit||0) > 0){
      const strPct = Math.round(100 * (s.Str||0) / s.Pit);
      parts.push(`${s.Pit} pitches (${strPct}% strikes)`);
    }
    return parts.join(', ');
  };
  
  if (pitchers.length){
    lines.push('━━━ PITCHING ━━━');
    const maxLen = Math.max(...pitchers.map(([name]) => displayNameShort(name).length));
    pitchers.forEach(([name, s]) => {
      const nm = displayNameShort(name).padEnd(Math.min(maxLen, 15));
      lines.push(`${nm}  ${pitchLine(s)}`);
    });
    lines.push('');
  }
  
  // Team totals fallback — if there's stats but nothing individually notable
  if (!hiBat.length && !pitchers.length && batters.length){
    const team = blankBat();
    batters.forEach(({s}) => BAT_COLS.forEach(c => team[c] += (s[c]||0)));
    if (team.H || team.R){
      lines.push('━━━ TEAM ━━━');
      lines.push(`${team.H}H, ${team.R}R, ${team.RBI}RBI, ${team.BB}BB`);
      lines.push('');
    }
  }
  
  // Hashtags
  const tmTag = (tm.replace(/[^a-zA-Z0-9]/g,'') || 'baseball');
  const se = state.season || '';
  const seTag = (se.replace(/\s+/g,'') || 'winterball');
  lines.push(`#${tmTag} #${seTag}`);
  
  return lines.join('\n').trim();
}

// ============================================================================
// ROUND IMAGE EXPORT
// ----------------------------------------------------------------------------
// Builds a PNG of the round summary suitable for posting to Facebook/Insta.
// Layout: dark "scorecard" header (team, score, opponent, round, date),
// then a batting table sorted by performance score, then a pitching mini-table.
// Auto-sizes height based on content; width is fixed at 1200px (retina ~2.5x).
// ============================================================================
async function generateRoundImage(round){
  // Always use the dark palette for the image — looks more "broadcast graphic" and
  // posts well on both light and dark FB feeds. Hardcoded so it's independent of the user's theme toggle.
  const C = {
    bg: '#0f1419',
    bgAlt: '#1a2330',
    panel: '#1e2938',
    line: '#334056',
    cream: '#f5ecd3',
    creamDim: '#dccfac',
    muted: '#9fadc7',
    red: '#d4533b',
    dirt: '#c2a572',
    field: '#3d5f3f',
    up: '#7cb38a',
    down: '#e27664',
    gold: '#e6c76b',
    rowAlt: '#141b25'
  };

  // Gather data
  const tm = state.teamName || 'Our Team';
  const opp = round.opponent || '—';
  const us = round.ourScore, them = round.theirScore;
  const hasScore = us != null && them != null && !isNaN(+us) && !isNaN(+them);
  const won = hasScore && +us > +them;
  const lost = hasScore && +us < +them;
  const tied = hasScore && +us === +them;
  const dateTxt = (() => {
    if (!round.date) return '';
    try {
      const d = new Date(round.date + 'T00:00:00');
      return d.toLocaleDateString(undefined, {weekday:'long', day:'numeric', month:'short', year:'numeric'});
    } catch(e){ return round.date; }
  })();

  // Performance-sorted batters (same scoring as FB post)
  const battersAll = Object.entries(round.batting || {})
    .map(([name, s]) => ({ name, s }))
    .filter(({s}) => (s.PA||0) > 0);
  const score = ({s}) => {
    const tb = (s['1B']||0) + 2*(s['2B']||0) + 3*(s['3B']||0) + 4*(s.HR||0);
    return tb*1.5 + (s.RBI||0)*1.2 + (s.R||0)*1.0 + (s.BB||0)*0.8 + (s.HBP||0)*0.7 + (s.SB||0)*0.4 - (s.K||0)*0.1 - (s.CS||0)*0.3;
  };
  const obpFn = (s) => {
    const denom = (s.AB||0) + (s.BB||0) + (s.HBP||0);
    return denom > 0 ? (batHits(s) + (s.BB||0) + (s.HBP||0)) / denom : 0;
  };
  const batters = [...battersAll].sort((a,b) => {
    const sa = score(a), sb = score(b);
    if (sb !== sa) return sb - sa;
    return obpFn(b.s) - obpFn(a.s);
  });
  // Pitchers: by IP desc
  const pitchers = Object.entries(round.pitching || {})
    .filter(([,s]) => (s.IP||0) > 0)
    .map(([name, s]) => ({name, s}))
    .sort((a,b) => (b.s.IP||0) - (a.s.IP||0));

  // ---- Canvas sizing ----
  // Base width = 1200, retina = 2x for crispness, height computed from content
  const W = 1200;
  const SCALE = 2;
  const PAD = 56;
  const HEADER_H = 280;
  const SECTION_GAP = 36;
  const ROW_H = 56;
  const SECTION_LABEL_H = 70;
  const FOOTER_H = 70;

  const showBatting = batters.length > 0;
  const showPitching = pitchers.length > 0;
  // Player of the Round hero card — only shown if a nomination has been made
  // and the nominated player has stats this round.
  const por = round.playerOfRound;
  const porPlayer = por && por.name ? por.name : null;
  const showPOR = !!porPlayer;
  // Hero card height — 240px top section (photo + name + 2 stat lines), plus caption block below.
  // Caption is full-width, ~95 chars per line at italic 22px Fraunces. 32px line height.
  const HERO_TOP = 240;
  const CAPTION_LINE_H = 32;
  const CAPTION_GAP = 24;
  const CAPTION_BOTTOM_PAD = 28;
  let HERO_H = HERO_TOP;
  if (showPOR){
    const caption = (por && por.caption) ? por.caption.trim() : '';
    if (caption){
      // Full-width estimate: ~95 chars per line. Round up.
      const charsPerLine = 95;
      const lines = Math.max(1, Math.ceil(caption.length / charsPerLine));
      HERO_H += CAPTION_GAP + lines * CAPTION_LINE_H + CAPTION_BOTTOM_PAD;
    } else {
      // No caption — just a bit of bottom padding so the card isn't right against the footer
      HERO_H += 16;
    }
  }

  // Preload the hero player's photo (if any) so it's available synchronously when we draw.
  // Without this, the first call would draw initials and only the second would show the photo.
  if (showPOR){
    const photoUrl = getPlayerPhoto(porPlayer);
    if (photoUrl){
      drawHeroCard._imgCache = drawHeroCard._imgCache || {};
      const cached = drawHeroCard._imgCache[porPlayer];
      // Re-load if missing or if the data URL has changed
      if (!cached || cached.src !== photoUrl){
        await new Promise((resolve) => {
          const im = new Image();
          im.onload = () => { drawHeroCard._imgCache[porPlayer] = im; resolve(); };
          im.onerror = () => resolve();  // fall back to initials silently
          im.src = photoUrl;
        });
      }
    }
  }
  let H = HEADER_H;
  if (showBatting) H += SECTION_LABEL_H + ROW_H /*header row*/ + ROW_H * batters.length + ROW_H /*team totals*/ + SECTION_GAP;
  if (showPitching) H += SECTION_LABEL_H + ROW_H + ROW_H * pitchers.length + ROW_H /*team totals*/ + SECTION_GAP;
  if (showPOR) H += HERO_H;
  // Notes are intentionally omitted from the image — the image is a pure stats graphic.
  H += FOOTER_H;
  // If nothing to show, still produce a valid card with just the header
  H = Math.max(H, 480);

  const canvas = document.createElement('canvas');
  canvas.width = W * SCALE;
  canvas.height = H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);
  // Crisp text
  ctx.textBaseline = 'middle';

  // Background — dark base + subtle radial highlight at top center (matches the app)
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);
  const grad = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, W*0.5);
  grad.addColorStop(0, '#1a2332');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, HEADER_H + 60);

  // ---- Header ----
  // Baseball logo (left) — cream circle with two angled red dashed seams (matches in-app brand mark)
  const logoX = PAD + 50, logoY = 100, logoR = 50;
  // Drop shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 16;
  ctx.shadowOffsetY = 4;
  ctx.fillStyle = C.cream;
  ctx.beginPath(); ctx.arc(logoX, logoY, logoR, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Two seams at ±25° from vertical, dashed
  const drawSeam = (angleDeg) => {
    ctx.save();
    ctx.translate(logoX, logoY);
    ctx.rotate(angleDeg * Math.PI/180);
    ctx.strokeStyle = C.red;
    ctx.lineWidth = 4.5;
    ctx.setLineDash([7, 5]);
    ctx.beginPath();
    ctx.moveTo(-logoR*0.55, -logoR*0.78);
    ctx.lineTo(-logoR*0.55,  logoR*0.78);
    ctx.stroke();
    ctx.restore();
  };
  drawSeam(-25);
  drawSeam(25);

  // Team name + meta (to the right of the logo)
  const titleX = logoX + logoR + 26;
  ctx.fillStyle = C.cream;
  ctx.font = '900 56px "Big Shoulders Display", Impact, "Arial Black", sans-serif';
  ctx.textBaseline = 'alphabetic';
  // Draw with red accent on "DUGOUT"-style — but here we draw the team name in cream and the season in dirt
  ctx.fillText(tm.toUpperCase(), titleX, 92);
  // Season + round + date
  const subBits = [];
  if (state.season) subBits.push(state.season);
  subBits.push(`Round ${round.num}`);
  if (round.venue) subBits.push(round.venue);
  if (dateTxt) subBits.push(dateTxt);
  ctx.fillStyle = C.dirt;
  ctx.font = '700 22px "Big Shoulders Display", Impact, "Arial Black", sans-serif';
  ctx.fillText(subBits.join(' · ').toUpperCase(), titleX, 130);

  // Score / result block — right side of header
  const scoreRight = W - PAD;
  if (hasScore){
    // "vs OPPONENT" line above the score
    ctx.textAlign = 'right';
    ctx.fillStyle = C.muted;
    ctx.font = '600 20px "Big Shoulders Display", Impact, sans-serif';
    ctx.fillText(`${(round.venue==='Away'?'@ ':'vs ')}${opp.toUpperCase()}`, scoreRight, 70);
    // Big score
    const ourClr = won ? C.up : (lost ? C.cream : C.dirt);
    const theirClr = lost ? C.up : (won ? C.creamDim : C.dirt);
    ctx.font = '900 88px "Big Shoulders Display", Impact, sans-serif';
    // Draw "11 — 7" right-aligned
    ctx.fillStyle = theirClr;
    const themTxt = String(them);
    ctx.fillText(themTxt, scoreRight, 145);
    const themW = ctx.measureText(themTxt).width;
    ctx.fillStyle = C.muted;
    const dashTxt = '–';
    ctx.fillText(dashTxt, scoreRight - themW - 22, 145);
    const dashW = ctx.measureText(dashTxt).width;
    ctx.fillStyle = ourClr;
    ctx.fillText(String(us), scoreRight - themW - dashW - 44, 145);
    // W/L/T pill
    const resTxt = won ? 'WIN' : (lost ? 'LOSS' : 'TIE');
    const resBg = won ? C.up : (lost ? C.down : C.dirt);
    ctx.font = '900 18px "Big Shoulders Display", Impact, sans-serif';
    const pillW = ctx.measureText(resTxt).width + 26;
    const pillH = 32;
    const pillX = scoreRight - pillW;
    const pillY = 175;
    ctx.fillStyle = resBg;
    roundRect(ctx, pillX, pillY, pillW, pillH, 4); ctx.fill();
    ctx.fillStyle = C.bg;
    ctx.textAlign = 'center';
    ctx.fillText(resTxt, pillX + pillW/2, pillY + pillH/2 + 6);
    ctx.textAlign = 'left';
  } else if (opp){
    ctx.textAlign = 'right';
    ctx.fillStyle = C.cream;
    ctx.font = '900 56px "Big Shoulders Display", Impact, sans-serif';
    ctx.fillText(`${(round.venue==='Away'?'@ ':'vs ')}${opp.toUpperCase()}`, scoreRight, 130);
    ctx.textAlign = 'left';
  }

  // Header bottom rule
  ctx.fillStyle = C.line;
  ctx.fillRect(PAD, HEADER_H - 30, W - PAD*2, 1);

  // ---- Body sections ----
  let y = HEADER_H;

  // Section label helper
  const drawSectionLabel = (txt, count) => {
    // Red accent square on the left, then label
    ctx.fillStyle = C.red;
    ctx.fillRect(PAD, y + 18, 6, 32);
    ctx.fillStyle = C.cream;
    ctx.font = '900 32px "Big Shoulders Display", Impact, sans-serif';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    // Measure the label width while the title font is active — this is the bug-fix:
    // previously the label width was measured AFTER switching to the smaller count font,
    // which gave a width based on the wrong font and made the count overlap the title.
    const labelW = ctx.measureText(txt).width;
    ctx.fillText(txt, PAD + 18, y + 36);
    if (count != null){
      ctx.fillStyle = C.dirt;
      ctx.font = '700 16px "Big Shoulders Display", Impact, sans-serif';
      ctx.fillText(count, PAD + 18 + labelW + 14, y + 38);
    }
    y += SECTION_LABEL_H;
  };

  // Table-row helper
  // cols: array of {text, w, align?, color?, font?}
  const drawRow = (cols, opts) => {
    opts = opts || {};
    if (opts.bg){
      ctx.fillStyle = opts.bg;
      ctx.fillRect(PAD, y, W - PAD*2, ROW_H);
    }
    let x = PAD + 18;
    ctx.textBaseline = 'middle';
    cols.forEach(c => {
      const align = c.align || 'left';
      ctx.textAlign = align;
      ctx.fillStyle = c.color || C.cream;
      ctx.font = c.font || '600 24px "Big Shoulders Display", Impact, sans-serif';
      let drawX = x;
      if (align === 'right') drawX = x + c.w - 12;
      else if (align === 'center') drawX = x + c.w/2;
      else drawX = x + 8;
      ctx.fillText(c.text, drawX, y + ROW_H/2 + 1);
      x += c.w;
    });
    y += ROW_H;
  };

  // Determine column widths for batting table
  if (showBatting){
    drawSectionLabel('BATTING', batters.length + ' BATTER' + (batters.length===1?'':'S'));
    // Columns: PLAYER, PA, AB, 1B, 2B, 3B, HR, R, RBI, BB, K, HBP, SB, AVG, OPS
    const tableW = W - PAD*2;
    const nameW = Math.floor(tableW * 0.24);
    const tailW = 80; // for derived rates (AVG, OPS)
    const remaining = tableW - nameW - tailW*2;
    const numCols = 12; // PA, AB, 1B, 2B, 3B, HR, R, RBI, BB, K, HBP, SB
    const eachW = Math.floor(remaining / numCols);
    const hdrFont = '700 15px "Big Shoulders Display", Impact, sans-serif';
    const dataFont = '600 22px "Big Shoulders Display", Impact, sans-serif';
    drawRow([
      {text:'PLAYER', w:nameW, align:'left', color:C.dirt, font:hdrFont},
      {text:'PA', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'AB', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'1B', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'2B', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'3B', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'HR', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'R', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'RBI', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'BB', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'K', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'HBP', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'SB', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'AVG', w:tailW, align:'center', color:C.dirt, font:hdrFont},
      {text:'OPS', w:tailW, align:'center', color:C.dirt, font:hdrFont}
    ], {bg: C.bgAlt});

    // Running totals for the team row
    const team = blankBat();
    batters.forEach((b, i) => {
      const s = b.s;
      const ab = s.AB||0;
      const h = batHits(s);
      const avg = ab > 0 ? (h/ab) : 0;
      const obpVal = (() => {
        const denom = ab + (s.BB||0) + (s.HBP||0);
        return denom > 0 ? (h + (s.BB||0) + (s.HBP||0))/denom : 0;
      })();
      const slg = (() => {
        if (ab === 0) return 0;
        const tb = (s['1B']||0) + 2*(s['2B']||0) + 3*(s['3B']||0) + 4*(s.HR||0);
        return tb / ab;
      })();
      const ops = obpVal + slg;
      const isLeader = i === 0 && batters.length > 1;
      const hasHR = (s.HR||0) > 0;
      const rowBg = i % 2 === 0 ? C.rowAlt : C.bg;
      const nameTxt = (isLeader ? '★ ' : '') + displayName(b.name);
      const nameColor = isLeader ? C.gold : C.cream;
      const hrColor = hasHR ? C.gold : C.cream;
      // Tally team totals
      BAT_COLS.forEach(c => team[c] = (team[c]||0) + (s[c]||0));
      drawRow([
        {text: nameTxt, w:nameW, align:'left', color:nameColor, font: dataFont},
        {text: String(s.PA||0), w:eachW, align:'center', font: dataFont},
        {text: String(ab), w:eachW, align:'center', font: dataFont},
        {text: String(s['1B']||0), w:eachW, align:'center', font: dataFont},
        {text: String(s['2B']||0), w:eachW, align:'center', font: dataFont},
        {text: String(s['3B']||0), w:eachW, align:'center', font: dataFont},
        {text: String(s.HR||0), w:eachW, align:'center', color: hrColor, font: hasHR ? '900 22px "Big Shoulders Display", Impact, sans-serif' : dataFont},
        {text: String(s.R||0), w:eachW, align:'center', font: dataFont},
        {text: String(s.RBI||0), w:eachW, align:'center', font: dataFont},
        {text: String(s.BB||0), w:eachW, align:'center', font: dataFont},
        {text: String(s.K||0), w:eachW, align:'center', color: C.muted, font: dataFont},
        {text: String(s.HBP||0), w:eachW, align:'center', font: dataFont},
        {text: String(s.SB||0), w:eachW, align:'center', font: dataFont},
        {text: ab > 0 ? fmtRate(avg) : '—', w:tailW, align:'center', color: C.creamDim, font:'600 21px "JetBrains Mono", "Courier New", monospace'},
        {text: ab > 0 ? fmtOps(ops) : '—', w:tailW, align:'center', color: ops >= 1.0 ? C.up : C.creamDim, font:'600 21px "JetBrains Mono", "Courier New", monospace'}
      ], {bg: rowBg});
    });
    // Team totals row
    const tAB = team.AB||0;
    const tH = batHits(team);
    const tAvg = tAB > 0 ? tH/tAB : 0;
    const tDenom = tAB + (team.BB||0) + (team.HBP||0);
    const tOBP = tDenom > 0 ? (tH + (team.BB||0) + (team.HBP||0))/tDenom : 0;
    const tTB = (team['1B']||0) + 2*(team['2B']||0) + 3*(team['3B']||0) + 4*(team.HR||0);
    const tSLG = tAB > 0 ? tTB/tAB : 0;
    const totalsFont = '900 22px "Big Shoulders Display", Impact, sans-serif';
    const totalsRateFont = '700 21px "JetBrains Mono", "Courier New", monospace';
    drawRow([
      {text:'TEAM', w:nameW, align:'left', color:C.red, font:totalsFont},
      {text: String(team.PA||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(tAB), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team['1B']||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team['2B']||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team['3B']||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team.HR||0), w:eachW, align:'center', color:(team.HR||0)>0?C.gold:C.cream, font: totalsFont},
      {text: String(team.R||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team.RBI||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team.BB||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team.K||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team.HBP||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: String(team.SB||0), w:eachW, align:'center', color:C.cream, font: totalsFont},
      {text: tAB > 0 ? fmtRate(tAvg) : '—', w:tailW, align:'center', color:C.dirt, font: totalsRateFont},
      {text: tAB > 0 ? fmtOps(tOBP+tSLG) : '—', w:tailW, align:'center', color:C.dirt, font: totalsRateFont}
    ], {bg: C.bgAlt});
    y += SECTION_GAP;
  }

  // Pitching mini-table — full stat set: IP BF H ER BB K HBP Pit Str Bal | ERA WHIP K/9 Str%
  if (showPitching){
    drawSectionLabel('PITCHING', pitchers.length + ' PITCHER' + (pitchers.length===1?'':'S'));
    const tableW = W - PAD*2;
    const nameW = Math.floor(tableW * 0.22);
    // Derived rates take more room (4 cols: ERA, WHIP, K/9, Str%)
    const tailW = 70;
    const numCols = 10; // IP, BF, H, ER, BB, K, HBP, Pit, Str, Bal
    const numTailCols = 4; // ERA, WHIP, K/9, Str%
    const eachW = Math.floor((tableW - nameW - tailW*numTailCols) / numCols);
    const hdrFont = '700 14px "Big Shoulders Display", Impact, sans-serif';
    const dataFont = '600 21px "Big Shoulders Display", Impact, sans-serif';
    const rateFont = '600 19px "JetBrains Mono", "Courier New", monospace';
    drawRow([
      {text:'PITCHER', w:nameW, align:'left', color:C.dirt, font:hdrFont},
      {text:'IP', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'BF', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'H', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'ER', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'BB', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'K', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'HBP', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'PIT', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'STR', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'BAL', w:eachW, align:'center', color:C.dirt, font:hdrFont},
      {text:'ERA', w:tailW, align:'center', color:C.dirt, font:hdrFont},
      {text:'WHIP', w:tailW, align:'center', color:C.dirt, font:hdrFont},
      {text:'K/9', w:tailW, align:'center', color:C.dirt, font:hdrFont},
      {text:'STR%', w:tailW, align:'center', color:C.dirt, font:hdrFont}
    ], {bg: C.bgAlt});
    
    // Running totals
    const teamP = blankPitch();
    pitchers.forEach((pp, i) => {
      const s = pp.s;
      const ip = s.IP||0;
      const era = ip > 0 ? (9*(s.ER||0)/ip).toFixed(2) : '—';
      const whip = ip > 0 ? (((s.H||0)+(s.BB||0))/ip).toFixed(2) : '—';
      const k9 = ip > 0 ? (9*(s.K||0)/ip).toFixed(1) : '—';
      const pit = s.Pit||0;
      const strPct = pit > 0 ? Math.round(100*(s.Str||0)/pit) + '%' : '—';
      const rowBg = i % 2 === 0 ? C.rowAlt : C.bg;
      // Tally team totals
      PITCH_COLS.forEach(c => teamP[c] = (teamP[c]||0) + (s[c]||0));
      drawRow([
        {text: displayName(pp.name), w:nameW, align:'left', color:C.cream, font:dataFont},
        {text: ip.toFixed(2), w:eachW, align:'center', font:dataFont},
        {text: String(s.BF||0), w:eachW, align:'center', font:dataFont},
        {text: String(s.H||0), w:eachW, align:'center', font:dataFont},
        {text: String(s.ER||0), w:eachW, align:'center', font:dataFont},
        {text: String(s.BB||0), w:eachW, align:'center', font:dataFont},
        {text: String(s.K||0), w:eachW, align:'center', font:dataFont},
        {text: String(s.HBP||0), w:eachW, align:'center', font:dataFont},
        {text: String(pit), w:eachW, align:'center', font:dataFont},
        {text: String(s.Str||0), w:eachW, align:'center', font:dataFont},
        {text: String(s.Bal||0), w:eachW, align:'center', font:dataFont},
        {text: era, w:tailW, align:'center', color:C.creamDim, font:rateFont},
        {text: whip, w:tailW, align:'center', color:C.creamDim, font:rateFont},
        {text: k9, w:tailW, align:'center', color:C.creamDim, font:rateFont},
        {text: strPct, w:tailW, align:'center', color:C.creamDim, font:rateFont}
      ], {bg: rowBg});
    });
    
    // Team totals row
    const tIp = teamP.IP||0;
    const tEra = tIp > 0 ? (9*(teamP.ER||0)/tIp).toFixed(2) : '—';
    const tWhip = tIp > 0 ? (((teamP.H||0)+(teamP.BB||0))/tIp).toFixed(2) : '—';
    const tK9 = tIp > 0 ? (9*(teamP.K||0)/tIp).toFixed(1) : '—';
    const tPit = teamP.Pit||0;
    const tStrPct = tPit > 0 ? Math.round(100*(teamP.Str||0)/tPit) + '%' : '—';
    const totalsFont = '900 21px "Big Shoulders Display", Impact, sans-serif';
    const totalsRateFont = '700 19px "JetBrains Mono", "Courier New", monospace';
    drawRow([
      {text:'TEAM', w:nameW, align:'left', color:C.red, font:totalsFont},
      {text: tIp.toFixed(2), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(teamP.BF||0), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(teamP.H||0), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(teamP.ER||0), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(teamP.BB||0), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(teamP.K||0), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(teamP.HBP||0), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(tPit), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(teamP.Str||0), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: String(teamP.Bal||0), w:eachW, align:'center', color:C.cream, font:totalsFont},
      {text: tEra, w:tailW, align:'center', color:C.dirt, font:totalsRateFont},
      {text: tWhip, w:tailW, align:'center', color:C.dirt, font:totalsRateFont},
      {text: tK9, w:tailW, align:'center', color:C.dirt, font:totalsRateFont},
      {text: tStrPct, w:tailW, align:'center', color:C.dirt, font:totalsRateFont}
    ], {bg: C.bgAlt});
    y += SECTION_GAP;
  }

  // Empty state
  if (!showBatting && !showPitching){
    ctx.fillStyle = C.muted;
    ctx.font = 'italic 22px "Fraunces", Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('No stats entered yet for this round.', W/2, y + 80);
    ctx.textAlign = 'left';
  }

  // ---- Player of the Round hero card ----
  if (showPOR){
    drawHeroCard({
      ctx, C, W, PAD, y, HERO_H,
      name: porPlayer,
      isPitcher: !!por.isPitcher,
      caption: (por.caption || '').trim(),
      batting: (round.batting||{})[porPlayer],
      pitching: (round.pitching||{})[porPlayer]
    });
    y += HERO_H;
  }

  // ---- Footer ----
  ctx.fillStyle = C.line;
  ctx.fillRect(PAD, H - FOOTER_H + 12, W - PAD*2, 1);
  ctx.fillStyle = C.muted;
  ctx.font = '600 16px "Big Shoulders Display", Impact, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('★ Top performer · ', PAD, H - FOOTER_H/2 + 14);
  const star = ctx.measureText('★ Top performer · ').width;
  ctx.fillStyle = C.gold;
  ctx.fillText('Bold HR ', PAD + star, H - FOOTER_H/2 + 14);
  const boldHr = ctx.measureText('Bold HR ').width;
  ctx.fillStyle = C.muted;
  ctx.fillText('= homer', PAD + star + boldHr, H - FOOTER_H/2 + 14);
  ctx.textAlign = 'right';
  ctx.fillText('thedugout · ' + tm, W - PAD, H - FOOTER_H/2 + 14);

  // ---- Export ----
  // Always download as a file. (Was previously trying Web Share first, but the share sheet adds
  // friction and inconsistent behaviour across browsers — direct download is more predictable.)
  const teamSlug = (state.teamName || 'team').replace(/[^a-z0-9]/gi,'-').toLowerCase();
  const filename = `${teamSlug}-round-${round.num}.png`;
  canvas.toBlob((blob) => {
    if (!blob){ alert('Could not generate image. Your browser may not support canvas export.'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    // Slight delay before revoke — some browsers need a moment to start the download
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

// Hero card section — gold-bordered circular photo on the left, "PLAYER OF THE ROUND" + name + stats on the right.
// Caption (if any) flows below as a single full-width paragraph block, no awkward column-jump.
function drawHeroCard({ctx, C, W, PAD, y, HERO_H, name, isPitcher, caption, batting, pitching}){
  // Gold separator above
  ctx.fillStyle = C.dirt;
  ctx.fillRect(PAD, y + 12, W - PAD*2, 2);
  
  // Subtle radial highlight behind the card
  const grad = ctx.createRadialGradient(W*0.32, y + HERO_H/2, 0, W*0.32, y + HERO_H/2, W*0.5);
  grad.addColorStop(0, 'rgba(194,165,114,0.08)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(PAD, y + 14, W - PAD*2, HERO_H - 14);

  // ---- Top row: photo on left, label/name/stats on right ----
  const TOP_H = 240; // height of the photo+stats area
  const photoR = 90;
  const photoX = PAD + 32 + photoR;
  const photoY = y + 32 + photoR;
  const photo = getPlayerPhoto(name);
  // Drop shadow + body
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 22;
  ctx.shadowOffsetY = 6;
  ctx.fillStyle = C.bgAlt;
  ctx.beginPath(); ctx.arc(photoX, photoY, photoR, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Gold ring
  ctx.strokeStyle = C.dirt;
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(photoX, photoY, photoR, 0, Math.PI*2); ctx.stroke();
  // Photo or initials
  if (photo){
    const cached = drawHeroCard._imgCache = drawHeroCard._imgCache || {};
    const cachedImg = cached[name];
    if (cachedImg && cachedImg.complete && cachedImg.naturalWidth > 0){
      ctx.save();
      ctx.beginPath(); ctx.arc(photoX, photoY, photoR - 4, 0, Math.PI*2); ctx.clip();
      const im = cachedImg;
      const aspect = im.naturalWidth / im.naturalHeight;
      let dw = (photoR-4)*2, dh = (photoR-4)*2, dx = photoX - (photoR-4), dy = photoY - (photoR-4);
      if (aspect > 1){ dw = dh * aspect; dx = photoX - dw/2; }
      else { dh = dw / aspect; dy = photoY - dh/2; }
      ctx.drawImage(im, dx, dy, dw, dh);
      ctx.restore();
    } else {
      const im = new Image();
      im.src = photo;
      cached[name] = im;
      drawHeroInitials(ctx, C, name, photoX, photoY, photoR);
    }
  } else {
    drawHeroInitials(ctx, C, name, photoX, photoY, photoR);
  }

  // Right side — text block
  const textX = photoX + photoR + 28;
  const textRight = W - PAD - 8;
  const textW = textRight - textX;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Award label
  ctx.fillStyle = C.dirt;
  ctx.font = '900 17px "Big Shoulders Display", Impact, sans-serif';
  ctx.fillText('★ PLAYER OF THE ROUND', textX, y + 56);

  // Player name (big)
  ctx.fillStyle = C.cream;
  ctx.font = '900 50px "Big Shoulders Display", Impact, sans-serif';
  let displayLine = displayName(name).toUpperCase();
  if (ctx.measureText(displayLine).width > textW){
    const {last} = splitName(name);
    displayLine = last.toUpperCase();
    while (ctx.measureText(displayLine).width > textW && displayLine.length > 4){
      displayLine = displayLine.slice(0, -1);
    }
  }
  ctx.fillText(displayLine, textX, y + 108);

  // Stat line (bold key numbers)
  ctx.font = '700 22px "JetBrains Mono", "Courier New", monospace';
  ctx.fillStyle = C.creamDim;
  if (isPitcher && pitching && (pitching.IP||0) > 0){
    const s = pitching;
    const ip = s.IP || 0;
    const era = ip > 0 ? (9*(s.ER||0)/ip).toFixed(2) : '—';
    const whip = ip > 0 ? (((s.H||0)+(s.BB||0))/ip).toFixed(2) : '—';
    const parts = [`${ip.toFixed(2)} IP`];
    if ((s.H||0) > 0) parts.push(`${s.H}H`);
    parts.push(`${s.ER||0}ER`);
    if ((s.BB||0) > 0) parts.push(`${s.BB}BB`);
    if ((s.K||0) > 0) parts.push(`${s.K}K`);
    ctx.fillText(parts.join('  ·  '), textX, y + 152);
    ctx.font = '600 18px "JetBrains Mono", "Courier New", monospace';
    ctx.fillStyle = C.dirt;
    let d2 = `ERA ${era}  ·  WHIP ${whip}`;
    if ((s.Pit||0) > 0){
      const strPct = Math.round(100 * (s.Str||0) / s.Pit);
      d2 += `  ·  ${s.Pit} pitches (${strPct}% strikes)`;
    }
    ctx.fillText(d2, textX, y + 184);
  } else if (batting && (batting.PA||0) > 0){
    const s = batting;
    const ab = s.AB || 0;
    const h = batHits(s);
    const lineParts = [`${h}-${ab}`];
    if ((s['2B']||0) > 0) lineParts.push(`${s['2B']} 2B`);
    if ((s['3B']||0) > 0) lineParts.push(`${s['3B']} 3B`);
    if ((s.HR||0) > 0) lineParts.push(`${s.HR} HR`);
    if ((s.R||0) > 0) lineParts.push(`${s.R} R`);
    if ((s.RBI||0) > 0) lineParts.push(`${s.RBI} RBI`);
    if ((s.BB||0) > 0) lineParts.push(`${s.BB} BB`);
    if ((s.SB||0) > 0) lineParts.push(`${s.SB} SB`);
    ctx.fillText(lineParts.join('  ·  '), textX, y + 152);
    const denom = ab + (s.BB||0) + (s.HBP||0);
    const obpVal = denom > 0 ? (h + (s.BB||0) + (s.HBP||0))/denom : 0;
    const tb = (s['1B']||0) + 2*(s['2B']||0) + 3*(s['3B']||0) + 4*(s.HR||0);
    const slg = ab > 0 ? tb/ab : 0;
    const avg = ab > 0 ? h/ab : 0;
    const ops = obpVal + slg;
    ctx.font = '600 18px "JetBrains Mono", "Courier New", monospace';
    ctx.fillStyle = C.dirt;
    ctx.fillText(`AVG ${fmtRate(avg)}  ·  OBP ${fmtRate(obpVal)}  ·  SLG ${fmtRate(slg)}  ·  OPS ${fmtOps(ops)}`, textX, y + 184);
  }

  // ---- Caption block — full-width, single column, sits below the top row ----
  if (caption){
    ctx.fillStyle = C.cream;
    ctx.font = 'italic 22px "Fraunces", Georgia, serif';
    const captionX = PAD + 8;
    const captionW = (W - PAD*2) - 16;
    const captionStart = y + TOP_H + 24;  // ~24px gap below the photo+stats row
    const lineH = 32;
    const lines = wrapText(ctx, caption, captionW);
    lines.forEach((line, i) => {
      ctx.fillText(line, captionX, captionStart + i*lineH);
    });
  }
}

// Big initials inside the hero photo circle (used as photo fallback).
function drawHeroInitials(ctx, C, name, cx, cy, r){
  const {last, first} = splitName(name);
  const init = ((first||'').charAt(0) + (last||'').charAt(0)).toUpperCase() || '?';
  ctx.fillStyle = C.dirt;
  ctx.font = '900 90px "Big Shoulders Display", Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(init, cx, cy + 4);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

// Helper: rounded rect path
function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Helper: word-wrap text into lines that fit within maxWidth
function wrapText(ctx, text, maxWidth){
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';
  for (const w of words){
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width <= maxWidth) line = test;
    else { if (line) lines.push(line); line = w; }
  }
  if (line) lines.push(line);
  return lines;
}

// ============================================================================
// SEASON VIEW
// ============================================================================
function renderSeasonView(root){
  // Aggregate batting across rounds
  const allPlayers = new Set();
  state.rounds.forEach(r => {
    Object.keys(r.batting||{}).forEach(n => { if ((r.batting[n].PA||0) > 0) allPlayers.add(n); });
    Object.keys(r.pitching||{}).forEach(n => { if ((r.pitching[n].IP||0) > 0) allPlayers.add(n); });
    Object.keys(r.fielding||{}).forEach(n => allPlayers.add(n));
  });
  state.roster.forEach(n => allPlayers.add(n));
  
  // Record
  let wins = 0, losses = 0, ties = 0;
  state.rounds.forEach(r => {
    if (r.ourScore != null && r.theirScore != null){
      if (+r.ourScore > +r.theirScore) wins++;
      else if (+r.ourScore < +r.theirScore) losses++;
      else ties++;
    }
  });
  const rc = completedRounds();
  
  // Leader lookups
  const playerList = [...allPlayers];
  let topHitter = null, topPitcher = null;
  playerList.forEach(n => {
    const s = getSeasonStats(n);
    if (s.PA >= 5 && (!topHitter || s.OPS > topHitter.OPS)) topHitter = { name:n, ...s };
  });
  playerList.forEach(n => {
    const p = seasonPitchingFor(n);
    if (p.IP >= 1){
      const era = 9 * (p.ER||0) / p.IP;
      if (!topPitcher || era < topPitcher.era) topPitcher = { name:n, era, ...p };
    }
  });
  
  // Sort batters by OPS, pitchers by ERA
  const batRows = playerList.map(n => ({ name:n, s: getSeasonStats(n) })).filter(x => x.s.PA > 0).sort((a,b) => b.s.OPS - a.s.OPS);
  const pitchRows = playerList.map(n => ({ name:n, p: seasonPitchingFor(n) })).filter(x => x.p.IP > 0).sort((a,b) => {
    const eraA = a.p.IP > 0 ? 9*(a.p.ER||0)/a.p.IP : 999;
    const eraB = b.p.IP > 0 ? 9*(b.p.ER||0)/b.p.IP : 999;
    return eraA - eraB;
  });
  
  // Position matrix
  const posRows = playerList.map(n => ({ name:n, pos: seasonPositionsFor(n) })).filter(x => Object.values(x.pos).some(v => v > 0));
  posRows.sort((a,b) => Object.values(b.pos).reduce((x,y)=>x+y,0) - Object.values(a.pos).reduce((x,y)=>x+y,0));
  
  // Run differential
  let runsFor = 0, runsAgainst = 0;
  state.rounds.forEach(r => {
    if (r.ourScore != null) runsFor += +r.ourScore || 0;
    if (r.theirScore != null) runsAgainst += +r.theirScore || 0;
  });
  const runDiff = runsFor - runsAgainst;
  const diffSign = runDiff > 0 ? '+' : '';
  
  const recTxt = wins + '-' + losses + (ties ? '-'+ties : '');
  const recordColor = wins > losses ? 'var(--up)' : (wins < losses ? 'var(--down)' : 'var(--cream)');

  let html = `
    <div class="season-snap">
      <div class="snap-box"><div class="lbl">Record</div><div class="val" style="color:${recordColor}">${recTxt}</div><div class="sub">${rc} round${rc===1?'':'s'} played</div></div>
      <div class="snap-box"><div class="lbl">Runs for / against</div><div class="val" style="font-size:22px">${runsFor} <span style="color:var(--muted);font-weight:400">/</span> ${runsAgainst}</div><div class="sub" style="color:${runDiff>=0?'var(--up)':'var(--down)'}">Diff: ${diffSign}${runDiff}</div></div>
      <div class="snap-box"><div class="lbl">Top hitter</div><div class="val" style="font-size:17px">${topHitter?displayName(topHitter.name):'—'}</div><div class="sub">${topHitter?`OPS ${fmtOps(topHitter.OPS)} · ${topHitter.PA} PA`:'no data yet'}</div></div>
      <div class="snap-box"><div class="lbl">Top pitcher</div><div class="val" style="font-size:17px">${topPitcher?displayName(topPitcher.name):'—'}</div><div class="sub">${topPitcher?`ERA ${topPitcher.era.toFixed(2)} · ${topPitcher.IP} IP`:'no data yet'}</div></div>
    </div>
    
    ${renderFixturesPanel()}
    
    <div class="panel" style="text-align:center;padding:22px">
      <div style="font-family:'Big Shoulders Display',sans-serif;font-size:13px;color:var(--dirt);letter-spacing:0.18em;text-transform:uppercase;font-weight:700;margin-bottom:6px">Full stats tables</div>
      <div style="color:var(--cream-dim);font-size:14px;margin-bottom:14px">Batting · Pitching · Fielding — sortable, all on one tab.</div>
      <button class="btn primary" id="btnGoStats">Open Stats →</button>
    </div>
  `;
  root.innerHTML = html;
  // Wire fixture row clicks to jump to that round's tab
  root.querySelectorAll('[data-goto-round]').forEach(el => {
    el.onclick = () => { state.activeTab = 'round:' + el.dataset.gotoRound; render(); };
  });
  const goStats = document.getElementById('btnGoStats');
  if (goStats) goStats.onclick = () => { state.activeTab = 'stats'; render(); };
}

// ============================================================================
// STATS VIEW — sortable Batting / Pitching / Fielding tables
// ============================================================================
function renderStatsView(root){
  // Determine the active sub-tab. Stored on state so it survives tab switches.
  if (!state.statsTab) state.statsTab = 'batting';
  // Allow activeTab="stats:pitching" style deep-links too
  if (state.activeTab.startsWith('stats:')){
    const sub = state.activeTab.slice(6);
    if (['batting','pitching','fielding'].includes(sub)) state.statsTab = sub;
  }
  const sub = state.statsTab;

  // Build the set of all players who've appeared
  const allPlayers = new Set();
  state.rounds.forEach(r => {
    Object.keys(r.batting||{}).forEach(n => { if ((r.batting[n].PA||0) > 0) allPlayers.add(n); });
    Object.keys(r.pitching||{}).forEach(n => { if ((r.pitching[n].IP||0) > 0) allPlayers.add(n); });
  });
  state.roster.forEach(n => allPlayers.add(n));
  const playerList = [...allPlayers];

  // Remember per-sub-tab sort state (column + asc/desc)
  if (!state.statsSort) state.statsSort = { batting:{col:'OPS',asc:false}, pitching:{col:'ERA',asc:true}, fielding:{col:'Total',asc:false} };
  const sortState = state.statsSort[sub];

  const subTabBtn = (key, label) => `<button class="subtab ${sub===key?'active':''}" data-substat="${key}">${label}</button>`;
  let html = `
    <div class="subtabs">
      ${subTabBtn('batting','Batting')}
      ${subTabBtn('pitching','Pitching')}
      ${subTabBtn('fielding','Fielding')}
    </div>
  `;

  if (sub === 'batting'){
    const rows = playerList.map(n => ({ name:n, s: getSeasonStats(n) })).filter(x => x.s.PA > 0);
    // Sort
    const col = sortState.col, asc = sortState.asc;
    rows.sort((a,b) => {
      const av = a.s[col] ?? 0, bv = b.s[col] ?? 0;
      if (typeof av === 'string' || typeof bv === 'string') return asc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
      return asc ? av - bv : bv - av;
    });
    const leaderName = rows.length ? rows[0].name : null;
    // Column headers (sortable). Every column sorts; click same column to toggle asc/desc.
    const cols = [
      {key:'G', label:'G'},
      {key:'PA', label:'PA'},
      {key:'AB', label:'AB'},
      {key:'H', label:'H'},
      {key:'1B', label:'1B'},
      {key:'2B', label:'2B'},
      {key:'3B', label:'3B'},
      {key:'HR', label:'HR'},
      {key:'R', label:'R'},
      {key:'RBI', label:'RBI'},
      {key:'BB', label:'BB'},
      {key:'K', label:'K'},
      {key:'HBP', label:'HBP'},
      {key:'SB', label:'SB'},
      {key:'CS', label:'CS'},
      {key:'Ave', label:'AVG', rate:true},
      {key:'OBP', label:'OBP', rate:true},
      {key:'SLG', label:'SLG', rate:true},
      {key:'OPS', label:'OPS', ops:true}
    ];
    const th = (c) => {
      const active = c.key === col;
      const cls = 'sortable' + (active ? ' sort-active ' + (asc ? 'asc' : 'desc') : '');
      return `<th class="${cls}" data-sort="${c.key}">${c.label}</th>`;
    };
    html += `<div class="panel"><h2><span>Season Batting</span><span class="count">${rows.length} player${rows.length===1?'':'s'}</span></h2>
      <div class="table-wrap">
        <table class="stat-table">
          <thead><tr>
            <th class="first-col sortable ${col==='name'?'sort-active '+(asc?'asc':'desc'):''}" data-sort="name">Player</th>
            ${cols.map(th).join('')}
          </tr></thead>
          <tbody>
            ${rows.length ? rows.map(({name, s}) => {
              const {last, first} = splitName(name);
              const isLeader = name === leaderName;
              const hasHr = (s.HR||0) > 0;
              const cls = [isLeader?'stat-leader':'', hasHr?'has-hr':''].filter(Boolean).join(' ');
              return `<tr${cls?' class="'+cls+'"':''}>
                <td class="first-col">${last} <span class="first">${first}</span>${hasHr?' <span style="color:var(--gold)" title="'+s.HR+' HR this season">⚡</span>':''}</td>
                ${cols.map(c => {
                  let v = s[c.key];
                  if (c.rate) v = fmtRate(v);
                  else if (c.ops) v = fmtOps(v);
                  else v = v || 0;
                  return `<td class="${c.rate||c.ops?'derived':''}">${v}</td>`;
                }).join('')}
              </tr>`;
            }).join('') : `<tr><td colspan="${cols.length+1}" class="empty-state">No batting data yet — enter round stats to populate.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  if (sub === 'pitching'){
    const rows = playerList.map(n => {
      const p = seasonPitchingFor(n);
      const ip = p.IP || 0;
      const era = ip > 0 ? (9 * (p.ER||0) / ip) : null;
      const whip = ip > 0 ? ((p.H + p.BB) / ip) : null;
      const k9 = ip > 0 ? (9 * p.K / ip) : null;
      const strPct = (p.Pit||0) > 0 ? (100 * (p.Str||0) / p.Pit) : null;
      const ppBF = (p.BF||0) > 0 ? ((p.Pit||0) / p.BF) : null;
      return { name:n, p: {...p, ERA:era, WHIP:whip, K9:k9, StrPct:strPct, PpBF:ppBF} };
    }).filter(x => x.p.IP > 0);
    const col = sortState.col, asc = sortState.asc;
    rows.sort((a,b) => {
      const av = a.p[col] ?? 0, bv = b.p[col] ?? 0;
      if (av == null && bv == null) return 0;
      if (av == null) return 1; if (bv == null) return -1;
      return asc ? av - bv : bv - av;
    });
    const leaderName = rows.length ? rows[0].name : null;
    const cols = [
      {key:'G', label:'G'},
      {key:'IP', label:'IP', fixed:2},
      {key:'BF', label:'BF'},
      {key:'H', label:'H'},
      {key:'R', label:'R'},
      {key:'ER', label:'ER'},
      {key:'BB', label:'BB'},
      {key:'K', label:'K'},
      {key:'HBP', label:'HBP'},
      {key:'Pit', label:'Pit'},
      {key:'Str', label:'Str'},
      {key:'Bal', label:'Bal'},
      {key:'ERA', label:'ERA', fixed:2, isRate:true},
      {key:'WHIP', label:'WHIP', fixed:2, isRate:true},
      {key:'K9', label:'K/9', fixed:1, isRate:true},
      {key:'StrPct', label:'Str%', fixed:0, isRate:true, suffix:'%'},
      {key:'PpBF', label:'Pit/BF', fixed:1, isRate:true}
    ];
    const th = (c) => {
      const active = c.key === col;
      const cls = 'sortable' + (active ? ' sort-active ' + (asc ? 'asc' : 'desc') : '');
      return `<th class="${cls}" data-sort="${c.key}">${c.label}</th>`;
    };
    html += `<div class="panel"><h2><span>Season Pitching</span><span class="count">${rows.length} pitcher${rows.length===1?'':'s'}</span></h2>
      <div class="table-wrap">
        <table class="stat-table">
          <thead><tr>
            <th class="first-col sortable ${col==='name'?'sort-active '+(asc?'asc':'desc'):''}" data-sort="name">Player</th>
            ${cols.map(th).join('')}
          </tr></thead>
          <tbody>
            ${rows.length ? rows.map(({name, p}) => {
              const {last, first} = splitName(name);
              const isLeader = name === leaderName;
              return `<tr${isLeader?' class="stat-leader"':''}>
                <td class="first-col">${last} <span class="first">${first}</span></td>
                ${cols.map(c => {
                  let v = p[c.key];
                  if (v == null) return `<td class="${c.isRate?'derived':''}">-</td>`;
                  if (c.fixed != null) v = v.toFixed(c.fixed);
                  if (c.suffix) v = v + c.suffix;
                  return `<td class="${c.isRate?'derived':''}">${v}</td>`;
                }).join('')}
              </tr>`;
            }).join('') : `<tr><td colspan="${cols.length+1}" class="empty-state">No pitching data yet.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  if (sub === 'fielding'){
    const rows = playerList.map(n => {
      const pos = seasonPositionsFor(n);
      const total = Object.values(pos).reduce((a,b)=>a+b,0);
      return { name:n, pos, Total:total };
    }).filter(x => x.Total > 0);
    const col = sortState.col, asc = sortState.asc;
    rows.sort((a,b) => {
      const av = col === 'Total' ? a.Total : (col === 'name' ? a.name : (a.pos[col] || 0));
      const bv = col === 'Total' ? b.Total : (col === 'name' ? b.name : (b.pos[col] || 0));
      if (col === 'name') return asc ? av.localeCompare(bv) : bv.localeCompare(av);
      return asc ? av - bv : bv - av;
    });
    const leaderName = rows.length ? rows[0].name : null;
    const th = (key, label) => {
      const active = key === col;
      const cls = 'sortable' + (active ? ' sort-active ' + (asc ? 'asc' : 'desc') : '');
      return `<th class="${cls}" data-sort="${key}">${label}</th>`;
    };
    html += `<div class="panel"><h2><span>Games by Position</span><span class="count">${rows.length} player${rows.length===1?'':'s'}</span></h2>
      <div class="table-wrap">
        <table class="stat-table">
          <thead><tr>
            <th class="first-col sortable ${col==='name'?'sort-active '+(asc?'asc':'desc'):''}" data-sort="name">Player</th>
            ${POSITIONS.map(p => th(p, p)).join('')}
            ${th('Total', 'Total')}
          </tr></thead>
          <tbody>
            ${rows.length ? rows.map(({name, pos, Total}) => {
              const {last, first} = splitName(name);
              const isLeader = name === leaderName;
              return `<tr${isLeader?' class="stat-leader"':''}>
                <td class="first-col">${last} <span class="first">${first}</span></td>
                ${POSITIONS.map(p => `<td>${pos[p]||0}</td>`).join('')}
                <td class="derived">${Total}</td>
              </tr>`;
            }).join('') : `<tr><td colspan="${POSITIONS.length+2}" class="empty-state">No fielding data yet. Assign positions in each round to populate.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  root.innerHTML = html;

  // Wire sub-tab clicks
  root.querySelectorAll('[data-substat]').forEach(el => {
    el.onclick = () => { state.statsTab = el.dataset.substat; render(); };
  });
  // Wire column header sorts — toggle asc/desc if same column, otherwise switch to that column
  root.querySelectorAll('th.sortable').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.sort;
      const curr = state.statsSort[state.statsTab];
      if (curr.col === key) curr.asc = !curr.asc;
      else { curr.col = key; curr.asc = (key === 'name' || key === 'ERA' || key === 'WHIP'); } // name/ERA/WHIP default asc
      render();
    };
  });
}


// Build the Fixtures panel — all rounds as compact rows, upcoming ones highlighted,
// past ones showing final score. Click any row to jump to that round.
function renderFixturesPanel(){
  const rounds = [...state.rounds].sort((a,b) => a.num - b.num);
  if (rounds.length === 0){
    return `<div class="panel">
      <h2><span>Fixtures</span></h2>
      <div class="empty-state" style="padding:24px">No rounds yet. Click ＋ on the tab bar to add your first round.</div>
    </div>`;
  }
  
  // Split into past (has score or stats) vs upcoming
  const isPlayed = (r) => r.ourScore != null && r.theirScore != null;
  const past = rounds.filter(isPlayed);
  const upcoming = rounds.filter(r => !isPlayed(r));
  
  const fmtDate = (d) => {
    if (!d) return '—';
    try { return new Date(d + 'T00:00:00').toLocaleDateString(undefined, {weekday:'short', day:'numeric', month:'short'}); }
    catch(e){ return d; }
  };
  
  const fixtureRow = (r, style) => {
    const played = isPlayed(r);
    const us = +r.ourScore, them = +r.theirScore;
    const res = played ? (us > them ? 'W' : (us < them ? 'L' : 'T')) : '';
    const resCls = res === 'W' ? 'fx-w' : (res === 'L' ? 'fx-l' : (res === 'T' ? 'fx-t' : ''));
    const venueGlyph = r.venue === 'Away' ? '@' : 'vs';
    const opp = r.opponent || '—';
    const score = played ? `${us}–${them}` : '';
    return `<button class="fixture-row ${style} ${resCls}" data-goto-round="${r.id}">
      <div class="fx-num">R${r.num}</div>
      <div class="fx-meta">
        <div class="fx-opp">${venueGlyph} ${opp}</div>
        <div class="fx-date">${fmtDate(r.date)}</div>
      </div>
      <div class="fx-result">
        ${played ? `<span class="fx-res-letter">${res}</span><span class="fx-score">${score}</span>` : '<span class="fx-pending">upcoming</span>'}
      </div>
    </button>`;
  };
  
  // Find the "next" upcoming round — the one with the lowest num among upcoming
  const nextRound = upcoming[0];
  const laterUpcoming = upcoming.slice(1);
  
  let html = '<div class="panel"><h2><span>Fixtures</span><span class="count">' + rounds.length + ' round' + (rounds.length===1?'':'s') + '</span></h2>';
  
  if (nextRound){
    html += '<div class="fx-section-label">Next up</div>';
    html += `<button class="fixture-row fx-next" data-goto-round="${nextRound.id}">
      <div class="fx-num" style="font-size:26px">R${nextRound.num}</div>
      <div class="fx-meta">
        <div class="fx-opp" style="font-size:17px">${nextRound.venue==='Away'?'@':'vs'} ${nextRound.opponent || '— opponent not set —'}</div>
        <div class="fx-date">${fmtDate(nextRound.date)} · ${nextRound.venue || 'venue?'}</div>
      </div>
      <div class="fx-result"><span class="fx-pending">upcoming →</span></div>
    </button>`;
  }
  
  if (past.length > 0){
    html += '<div class="fx-section-label">Results</div>';
    // Show most recent first
    [...past].reverse().forEach(r => { html += fixtureRow(r, ''); });
  }
  
  if (laterUpcoming.length > 0){
    html += '<div class="fx-section-label">Further out</div>';
    laterUpcoming.forEach(r => { html += fixtureRow(r, ''); });
  }
  
  html += '</div>';
  return html;
}

// Theme: light/dark toggle persisted in localStorage.
// Icon shows what you'll switch TO: moon (☾) means "switch to dark", sun (☀) means "switch to light".
function applyTheme(mode){
  document.body.classList.toggle('light', mode === 'light');
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = mode === 'light' ? '☾' : '☀';
  // Also update the iOS/Android theme-color meta so the status bar matches
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', mode === 'light' ? '#faf5e6' : '#3d5f3f');
}
(function initTheme(){
  let saved = null;
  try { saved = localStorage.getItem('dugoutTheme'); } catch(e){}
  applyTheme(saved === 'light' ? 'light' : 'dark');
})();
document.getElementById('btnTheme').onclick = () => {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
  try { localStorage.setItem('dugoutTheme', next); } catch(e){}
};

document.getElementById('btnExport').onclick = () => {
  const snap = { ...state, _exportedAt: new Date().toISOString(), _app: 'rebels-dugout' };
  const blob = new Blob([JSON.stringify(snap, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  // Dated filename — makes it obvious which export is newer when you have several
  const d = new Date();
  const stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const team = (state.teamName||'team').replace(/[^a-z0-9]/gi,'-').toLowerCase();
  a.href = url;
  a.download = `rebels-dugout_${team}_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

// Email export: uses the native share sheet on mobile (Gmail/Mail/Outlook/etc) with the JSON attached.
// Falls back to a mailto: link + download so the user can attach the file manually on desktop.
document.getElementById('btnEmail').onclick = async () => {
  const snap = { ...state, _exportedAt: new Date().toISOString(), _app: 'rebels-dugout' };
  const json = JSON.stringify(snap, null, 2);
  const d = new Date();
  const stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const team = (state.teamName||'team').replace(/[^a-z0-9]/gi,'-').toLowerCase();
  const filename = `rebels-dugout_${team}_${stamp}.json`;
  const season = state.season || '';
  const subject = `${state.teamName || 'Team'} · ${season} — ${stamp}`;
  const roundCount = (state.rounds || []).length;
  const rosterCount = (state.roster || []).length;
  const bodyTxt = `Dugout data for ${state.teamName || 'team'} (${season}) — ${rosterCount} player${rosterCount===1?'':'s'}, ${roundCount} round${roundCount===1?'':'s'}.

Attached: ${filename}

To restore on another device: open The Rebels Dugout and tap Import, then pick this file.`;
  // Try Web Share API with file (works on iOS Safari, Android Chrome/Firefox, etc.)
  try {
    const file = new File([json], filename, {type:'application/json'});
    if (navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ files:[file], title:subject, text:bodyTxt });
      return;
    }
  } catch(err){
    // User cancelled share sheet, or share failed — fall through to fallback
    if (err && err.name === 'AbortError') return;
  }
  // Fallback: download the file + open the user's mail client with subject/body.
  // They can attach the downloaded file manually.
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  setTimeout(() => {
    const mailto = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(bodyTxt + '\n\n(Attach the file that just downloaded: ' + filename + ')');
    window.location.href = mailto;
  }, 300);
};
document.getElementById('btnImport').onclick = () => document.getElementById('fileImport').click();
document.getElementById('fileImport').onchange = async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const obj = JSON.parse(await f.text());
    if (obj.roster && obj.battingOrder !== undefined){
      // Warn if current state has more recent data
      const curSize = (state.rounds||[]).length;
      const inSize = (obj.rounds||[]).length;
      if (curSize > 0 && !confirm(`Import will replace your current data (${curSize} round${curSize===1?'':'s'}) with the file's data (${inSize} round${inSize===1?'':'s'}). Continue?`)){
        e.target.value = '';
        return;
      }
      state = hydrateState(obj);
      rebuildByName();
      render();
      autosave();
      const when = obj._exportedAt ? ' (exported ' + new Date(obj._exportedAt).toLocaleDateString() + ')' : '';
      alert('Imported successfully' + when + '.');
    } else alert('That doesn\'t look like a Rebels Dugout file.');
  } catch(err){ alert('Could not parse: ' + err.message); }
  e.target.value = '';  // Allow re-importing the same file
};
document.getElementById('btnSave').onclick = async () => {
  const name = prompt('Save as:', (state.teamName||'team').replace(/\s+/g,'-').toLowerCase());
  if (!name) return;
  const ok = await saveAll(name);
  alert(ok ? 'Saved to browser as "'+name+'"' : 'Save failed. Use Export to download a JSON backup instead.');
};
document.getElementById('btnLoad').onclick = async () => {
  const saves = await listSaves();
  if (!saves.length){ alert('No saved snapshots found in this browser. Use Import to load a JSON file.'); return; }
  const pick = prompt('Saved snapshots:\n'+saves.map((l,i)=>(i+1)+'. '+l).join('\n')+'\n\nEnter number or name:');
  if (!pick) return;
  const chosen = saves[parseInt(pick)-1] || (saves.includes(pick) ? pick : null);
  if (!chosen){ alert('Not found'); return; }
  const loaded = await loadAll(chosen);
  if (loaded){
    state = hydrateState(loaded);
    render(); autosave();
  }
};

// Shared hydration helper — reconciles a loaded snapshot with current state shape
function hydrateState(loaded){
  const positions = loaded.positions || {};
  const battingOrder = loaded.battingOrder || Array(9).fill(null);
  // Migrate legacy top-level DH: move player into batting order, drop the DH key
  if (positions['DH']){
    const dhName = positions['DH'];
    if (!battingOrder.includes(dhName)) battingOrder.push(dhName);
    delete positions['DH'];
  }
  const s = {
    teamName: loaded.teamName || 'Rebels Winter B4',
    season: loaded.season || 'Season',
    roster: loaded.roster || [...DEFAULT_ROSTER],
    battingOrder,
    positions,
    rounds: (loaded.rounds || []).map(r => ensureRoundShape({...r, id: r.id || uid()})),
    historicalOverrides: loaded.historicalOverrides || {},
    activeTab: loaded.activeTab || 'lineup'
  };
  return s;
}

// Startup: try to load the autosave first, otherwise render with defaults.
// Also pre-load all player photos into the in-memory cache so avatars render synchronously.
async function startup(){
  try {
    await loadAllPhotos();
  } catch(e){ console.warn('Photo load failed:', e); }
  try {
    const auto = await loadAutosave();
    if (auto && (auto.roster?.length > 0 || auto.rounds?.length > 0 || Object.keys(auto.historicalOverrides || {}).length > 0)){
      state = hydrateState(auto);
      rebuildByName();
    }
  } catch(e){ console.warn('Autosave restore failed:', e); }
  render();
}

// Register service worker for offline support (only if file is served over http/https)
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.protocol === 'http:')){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}

// Initial render
startup();
</script>
