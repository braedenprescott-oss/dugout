function suggestBattingOrder(){
  state.battingOrder = buildBattingOrder(state.roster, getBlendedStats);
  renderLineup();
}

function suggestFieldPositions(){
  const scores = {};
  FIELD_POSITIONS.forEach(pos => {
    scores[pos] = state.roster.map(name => {
      const p = getBlendedStats(name);
      const g = (p.pos && p.pos[pos]) || 0;
      return { name, score: g * 10 + p.OPS, g, ops: p.OPS };
    }).sort((a,b)=>b.score-a.score);
  });
  const posOrder = [...FIELD_POSITIONS].sort((a,b) => {
    const ta = scores[a][0]?.g || 0, tb = scores[b][0]?.g || 0;
    return tb - ta;
  });
  const newPositions = {};
  const used = new Set();
  for (const pos of posOrder){
    const pick = scores[pos].find(c => !used.has(c.name));
    if (pick){ newPositions[pos] = pick.name; used.add(pick.name); }
  }
  state.positions = newPositions;
  // Make sure every fielder is in the batting order somewhere
  Object.values(newPositions).forEach(name => {
    if (!state.battingOrder.includes(name)){
      const emptyIdx = state.battingOrder.findIndex(x => !x);
      if (emptyIdx >= 0) state.battingOrder[emptyIdx] = name;
      else state.battingOrder.push(name);
    }
  });
  renderField(); renderLineup();
}

// (Re-)builds the Player of the Round panel inputs from the round's current state.
// Called from renderRoundView and from any hooks that change which players are eligible.
function renderPlayerOfRoundPanel(round){
  const sel = document.getElementById('por-name');
  const pitcherCk = document.getElementById('por-pitcher');
  const cap = document.getElementById('por-caption');
  const av = document.getElementById('por-avatar');
  const status = document.getElementById('por-status');
  const clearBtn = document.getElementById('por-clear');
  if (!sel || !pitcherCk || !cap || !av) return;
  // Eligible players: anyone in the batting stats or pitching stats this round.
  const set = new Set();
  Object.keys(round.batting||{}).forEach(n => set.add(n));
  Object.keys(round.pitching||{}).forEach(n => set.add(n));
  // Sort: lineup order first, then alpha
  const lineupIdx = (n) => {
    const i = (round.battingOrder||[]).indexOf(n);
    return i === -1 ? Infinity : i;
  };
  const eligible = [...set].sort((a,b) => {
    const la = lineupIdx(a), lb = lineupIdx(b);
    if (la !== lb) return la - lb;
    return a.localeCompare(b);
  });
  const por = round.playerOfRound;
  // Build options
  let html = '<option value="">— No nomination —</option>';
  eligible.forEach(n => {
    const sel = (por && por.name === n) ? ' selected' : '';
    html += `<option value="${n.replace(/"/g,'&quot;')}"${sel}>${displayName(n)}</option>`;
  });
  sel.innerHTML = html;
  // Reflect current state
  pitcherCk.checked = !!(por && por.isPitcher);
  cap.value = (por && por.caption) || '';
  // Update avatar + status
  const refreshDisplay = () => {
    const p = round.playerOfRound;
    if (p && p.name){
      av.innerHTML = '';
      const photo = getPlayerPhoto(p.name);
      if (photo){
        const img = document.createElement('img');
        img.src = photo;
        av.appendChild(img);
      } else {
        const {last, first} = splitName(p.name);
        av.textContent = ((first||'').charAt(0) + (last||'').charAt(0)).toUpperCase() || '?';
      }
      status.textContent = displayName(p.name) + (p.isPitcher ? ' · pitching' : ' · batting');
    } else {
      av.innerHTML = '<span style="font-size:18px;color:var(--muted);font-style:italic">none</span>';
      status.textContent = '';
    }
  };
  refreshDisplay();
  // Auto-detect pitcher when name picked
  sel.onchange = () => {
    const name = sel.value;
    if (!name){
      round.playerOfRound = null;
      refreshDisplay(); autosave(); return;
    }
    // Auto: if they appear in pitching stats with IP > 0, default to pitcher
    const pitch = (round.pitching||{})[name];
    const isPitcher = pitch && (pitch.IP||0) > 0;
    pitcherCk.checked = !!isPitcher;
    round.playerOfRound = { name, isPitcher: !!isPitcher, caption: cap.value || '' };
    refreshDisplay(); autosave();
  };
  pitcherCk.onchange = () => {
    if (!round.playerOfRound) return;
    round.playerOfRound.isPitcher = pitcherCk.checked;
    refreshDisplay(); autosave();
  };
  cap.oninput = () => {
    if (!round.playerOfRound) return;
    round.playerOfRound.caption = cap.value;
    autosave();
  };
  clearBtn.onclick = () => {
    round.playerOfRound = null;
    sel.value = '';
    pitcherCk.checked = false;
    cap.value = '';
    refreshDisplay();
    autosave();
  };
}

function renderRoundLineup(round){
  const el = document.getElementById('r-lineup');
  if (!el) return;
  el.innerHTML = '';
  const len = Math.max(9, round.battingOrder.length);
  while (round.battingOrder.length < 9) round.battingOrder.push(null);
  for (let i = 0; i < len; i++){
    const name = round.battingOrder[i];
    const isExtra = i >= 9;
    const roleLbl = SLOT_ROLE_LABELS[i] ? `<span class="role">${SLOT_ROLE_LABELS[i]}</span>` : (isExtra ? '<span class="role">EH</span>' : '');
    const slot = document.createElement('div');
    slot.className = 'slot' + (name ? '' : ' empty') + (isExtra ? ' extra' : '');
    slot.onclick = () => openRoundBattingSlotModal(round, i);
    if (name){
      const p = getBlendedStatsForRound(name, round.num);
      const {last, first} = splitName(name);
      const assignedPos = Object.entries(round.positions).find(([k,v]) => v === name && FIELD_POSITIONS.includes(k))?.[0];
      const isEH = !assignedPos;
      slot.innerHTML = `
        <div class="num">${i+1}${roleLbl}</div>
        <div>
          <div class="who">${last}<span class="first"> ${first}</span></div>
          <div class="mini">AVG <b>${fmtRate(p.Ave)}</b> · OBP <b>${fmtRate(p.OBP)}</b> · OPS <b>${fmtOps(p.OPS)}</b> · PA <b>${p.PA}</b></div>
        </div>
        <div class="pos-chip ${isEH ? 'eh' : ''}">${assignedPos || 'EH'}</div>
      `;
    } else {
      slot.innerHTML = `<div class="num">${i+1}${roleLbl}</div><div class="who">click to assign…</div><div class="pos-chip unset">—</div>`;
    }
    el.appendChild(slot);
  }
  // Add-batter button for extra hitters
  const add = document.createElement('button');
  add.type = 'button';
  add.className = 'slot-add';
  add.innerHTML = '＋ Add extra hitter';
  add.onclick = () => {
    round.battingOrder.push(null);
    openRoundBattingSlotModal(round, round.battingOrder.length - 1);
  };
  el.appendChild(add);
  // Note
  const n = document.getElementById('r-batNote');
  const filled = round.battingOrder.filter(x => x).length;
  const extras = Math.max(0, filled - 9);
  const dups = round.battingOrder.filter(x => x).reduce((a,b)=>(a[b]=(a[b]||0)+1,a),{});
  const dupNames = Object.entries(dups).filter(([,v])=>v>1).map(([k])=>splitName(k).last);
  if (dupNames.length){ n.className='conflicts'; n.textContent='Duplicate: '+dupNames.join(', '); }
  else if (filled >= 9){
    n.className='conflicts ok';
    n.textContent = '✓ Batting order locked in (' + filled + ' batter' + (filled===1?'':'s') + (extras ? ' · ' + extras + ' EH' : '') + ')';
  }
  else { n.className='conflicts ok'; n.textContent = filled+'/9 slots filled'; }
}

function renderRoundField(round){
  const dots = document.querySelectorAll('#r-diamond .pos-dot');
  dots.forEach(dot => {
    const pos = dot.dataset.pos;
    const name = round.positions[pos];
    dot.classList.toggle('filled', !!name);
    const lastEl = dot.querySelector('[data-last]');
    if (name){
      lastEl.textContent = splitName(name).last.toUpperCase();
      lastEl.style.fontSize = name.length > 20 ? '10px' : '12px';
    } else lastEl.textContent = '';
    dot.onclick = () => openRoundFieldPosModal(round, pos);
  });
  // Render EH list: derived from round.battingOrder minus field assignments
  const ehEl = document.getElementById('r-ehList');
  if (ehEl){
    const fielders = new Set(Object.entries(round.positions)
      .filter(([k]) => FIELD_POSITIONS.includes(k))
      .map(([,v]) => v));
    const ehs = round.battingOrder.filter(n => n && !fielders.has(n));
    if (ehs.length === 0){
      ehEl.innerHTML = '<div class="eh-label">Extra Hitters</div><div class="eh-empty">No EHs — every batter is in the field</div>';
    } else {
      let html = `<div class="eh-label">Extra Hitter${ehs.length===1?'':'s'} · ${ehs.length}</div>`;
      ehs.forEach(name => {
        const {last, first} = splitName(name);
        const nameEsc = name.replace(/"/g,'&quot;');
        html += `<button type="button" class="eh-item" data-eh-name="${nameEsc}">
          <span class="pos-chip">EH</span>
          <span class="who">${last}<span class="first"> ${first}</span></span>
          <span class="swap-hint">tap to field →</span>
        </button>`;
      });
      ehEl.innerHTML = html;
      ehEl.querySelectorAll('[data-eh-name]').forEach(btn => {
        btn.onclick = () => openRoundEHSwapModal(round, btn.dataset.ehName);
      });
    }
  }
  // Field note
  const note = document.getElementById('r-fieldNote');
  if (note){
    const filled = FIELD_POSITIONS.filter(p => round.positions[p]).length;
    const fielders = new Set(Object.entries(round.positions)
      .filter(([k]) => FIELD_POSITIONS.includes(k))
      .map(([,v]) => v));
    const ehCount = round.battingOrder.filter(x => x && !fielders.has(x)).length;
    const ehSuffix = ehCount ? ' · ' + ehCount + ' EH' : '';
    let msg;
    if (filled === 9){ msg = '✓ All 9 positions locked in' + ehSuffix; }
    else { msg = filled + '/9 fielding positions assigned' + ehSuffix; }
    note.className = 'conflicts ok'; note.textContent = msg;
  }
}

// When an EH is tapped in a round's EH list, pick a field position to move them into
function openRoundEHSwapModal(round, ehName){
  const {last, first} = splitName(ehName);
  let body = `<div class="m-sub">Put <b>${last}, ${first}</b> in the field. Whoever's at that position becomes an EH.</div>`;
  body += '<div class="option-list">';
  FIELD_POSITIONS.forEach(pos => {
    const currentName = round.positions[pos];
    const currentTxt = currentName ? ('currently ' + splitName(currentName).last) : 'currently empty';
    body += `<div class="option" onclick="assignToRoundFieldPos('${round.id}','${pos}', ${JSON.stringify(ehName).replace(/"/g,'&quot;')})">
      <div class="nm"><b style="color:var(--red)">${pos}</b> <span class="first" style="font-weight:400">${currentTxt}</span></div>
      <div class="fit"></div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Swap EH → field', body);
}

function openRoundBattingSlotModal(round, slotIdx){
  // Build candidate pool: only players available for this round
  const poolSet = new Set(getRoundPool(round));
  Object.keys(round.batting || {}).forEach(n => poolSet.add(n));
  const pool = [...poolSet];
  const current = round.battingOrder[slotIdx];
  const cands = pool.map(name => {
    const p = getBlendedStatsForRound(name, round.num);
    const rel = Math.min(1, p.PA/20);
    const score = p.OPS * rel + (1-rel) * 0.6;
    return { name, p, score };
  }).sort((a,b)=>b.score-a.score);
  let body = `<div class="m-sub">Best fits by OPS (using pre-round stats) · Round ${round.num} Slot #${slotIdx+1}</div>`;
  body += current ? `<div style="margin-bottom:10px"><button class="btn ghost" onclick="clearRoundBattingSlot('${round.id}',${slotIdx})">Clear this slot</button></div>` : '';
  body += '<div class="option-list">';
  cands.forEach(({name, p}) => {
    const {last, first} = splitName(name);
    const isInOrder = round.battingOrder.includes(name);
    const fitClass = p.OPS >= 1.0 ? 'strong' : p.OPS >= 0.85 ? 'good' : '';
    const src = p._source === 'season' ? '<span style="color:var(--up)">●</span>' : '<span style="color:var(--dirt)">●</span>';
    body += `<div class="option" onclick="assignToRoundBattingSlot('${round.id}', ${slotIdx}, ${JSON.stringify(name).replace(/"/g,'&quot;')})">
      <div class="nm">${last} <span class="first">${first}</span>${isInOrder && name !== current ? ' <span style="font-size:10px;color:var(--red)">(already in order)</span>' : ''}</div>
      <div class="fit ${fitClass}">${src} AVG ${fmtRate(p.Ave)} · OBP ${fmtRate(p.OBP)} · <b>OPS ${fmtOps(p.OPS)}</b> <span style="color:var(--muted)">(${p.PA} PA)</span></div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Round ' + round.num + ' · Batting #' + (slotIdx+1), body);
}

function openRoundFieldPosModal(round, pos){
  // Primary candidates: the round's batting order.
  // Fallback: available players this round (bench) — picking one auto-adds them to the order.
  const inOrder = round.battingOrder.filter(Boolean);
  const inOrderSet = new Set(inOrder);
  const bench = getRoundPool(round).filter(n => !inOrderSet.has(n));
  Object.keys(round.batting || {}).forEach(n => { if (!inOrderSet.has(n) && !bench.includes(n)) bench.push(n); });
  const pool = [...inOrder, ...bench];
  const current = round.positions[pos];
  const cands = pool.map(name => {
    const p = getBlendedStatsForRound(name, round.num);
    const g = (p.pos && p.pos[pos]) || 0;
    const inBO = inOrderSet.has(name);
    return { name, p, g, inBO };
  }).sort((a,b)=> (b.inBO - a.inBO) || (b.g - a.g) || (b.p.OPS - a.p.OPS));
  let body = `<div class="m-sub">Assign ${pos} for Round ${round.num}. Whoever's there now becomes an EH.</div>`;
  body += current ? `<div style="margin-bottom:10px"><button class="btn ghost" onclick="clearRoundFieldPos('${round.id}','${pos}')">Clear this position</button></div>` : '';
  body += '<div class="option-list">';
  cands.forEach(({name, p, g, inBO}) => {
    const {last, first} = splitName(name);
    const usedElsewhere = Object.entries(round.positions).find(([k,v]) => v === name && k !== pos && FIELD_POSITIONS.includes(k))?.[0];
    const fitClass = g >= 10 ? 'strong' : g >= 3 ? 'good' : '';
    const tag = !inBO ? ' <span style="font-size:10px;color:var(--dirt)">(bench — tap to add to order)</span>' : (usedElsewhere ? ` <span style="font-size:10px;color:var(--red)">(currently ${usedElsewhere})</span>` : '');
    body += `<div class="option" onclick="assignToRoundFieldPos('${round.id}','${pos}', ${JSON.stringify(name).replace(/"/g,'&quot;')})">
      <div class="nm">${last} <span class="first">${first}</span>${tag}</div>
      <div class="fit ${fitClass}"><b>${g}g</b> at ${pos} · OPS ${fmtOps(p.OPS)}</div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Round ' + round.num + ' · ' + pos, body);
}

function assignToRoundBattingSlot(roundId, slotIdx, name){
  const r = getRound(roundId); if (!r) return;
  r.battingOrder[slotIdx] = name; closeModal(); renderRoundLineup(r); renderRoundField(r); renderBattingTable(r); autosave();
}
function clearRoundBattingSlot(roundId, slotIdx){
  const r = getRound(roundId); if (!r) return;
  // Slots 1-9 are always kept (may be empty). Slots 10+ are extras — clearing removes them entirely.
  if (slotIdx >= 9) r.battingOrder.splice(slotIdx, 1);
  else r.battingOrder[slotIdx] = null;
  closeModal(); renderRoundLineup(r); renderRoundField(r); renderBattingTable(r); autosave();
}
function assignToRoundFieldPos(roundId, pos, name){
  const r = getRound(roundId); if (!r) return;
  // Only clear the player's other FIELD positions (no longer have a DH slot)
  Object.keys(r.positions).forEach(k => {
    if (r.positions[k] === name && FIELD_POSITIONS.includes(k)) delete r.positions[k];
  });
  r.positions[pos] = name;
  // Auto-add to batting order if they were on the bench
  if (!r.battingOrder.includes(name)){
    const emptyIdx = r.battingOrder.findIndex(x => !x);
    if (emptyIdx >= 0) r.battingOrder[emptyIdx] = name;
    else r.battingOrder.push(name);
  }
  closeModal(); renderRoundField(r); renderRoundLineup(r); renderBattingTable(r); autosave();
}
function clearRoundFieldPos(roundId, pos){
  const r = getRound(roundId); if (!r) return;
  delete r.positions[pos]; closeModal(); renderRoundField(r); renderRoundLineup(r); autosave();
}

function suggestRoundBattingOrder(round){
  // Candidate pool: available players this round + anyone with batting already entered
  const poolSet = new Set(getRoundPool(round));
  Object.keys(round.batting || {}).forEach(n => poolSet.add(n));
  const pool = [...poolSet];
  round.battingOrder = buildBattingOrder(pool, name => getBlendedStatsForRound(name, round.num));
}

function suggestRoundField(round){
  const poolSet = new Set(getRoundPool(round));
  Object.keys(round.batting || {}).forEach(n => poolSet.add(n));
  const pool = [...poolSet];
  const scores = {};
  FIELD_POSITIONS.forEach(pos => {
    scores[pos] = pool.map(name => {
      const p = getBlendedStatsForRound(name, round.num);
      const g = (p.pos && p.pos[pos]) || 0;
      return { name, score: g * 10 + p.OPS, g, ops: p.OPS };
    }).sort((a,b)=>b.score-a.score);
  });
  const posOrder = [...FIELD_POSITIONS].sort((a,b) => {
    const ta = scores[a][0]?.g || 0, tb = scores[b][0]?.g || 0;
    return tb - ta;
  });
  const newPositions = {};
  const used = new Set();
  for (const pos of posOrder){
    const pick = scores[pos].find(c => !used.has(c.name));
    if (pick){ newPositions[pos] = pick.name; used.add(pick.name); }
  }
  round.positions = newPositions;
  // Ensure every fielder is in the batting order
  Object.values(newPositions).forEach(name => {
    if (!round.battingOrder.includes(name)){
      const emptyIdx = round.battingOrder.findIndex(x => !x);
      if (emptyIdx >= 0) round.battingOrder[emptyIdx] = name;
      else round.battingOrder.push(name);
    }
  });
}

function updateResultChip(round){
  // Just re-render meta panel to update chip
  const panel = document.querySelector('[data-round-id="'+round.id+'"]');
  if (panel){
    const existing = panel.querySelector('.result-chip');
    let result = '';
    if (round.ourScore != null && round.theirScore != null){
      if (+round.ourScore > +round.theirScore) result = 'W';
      else if (+round.ourScore < +round.theirScore) result = 'L';
      else result = 'T';
    }
    if (existing) existing.remove();
    if (result){
      const chip = document.createElement('div');
      chip.className = 'result-chip ' + result;
      chip.textContent = result==='W'?'WIN':result==='L'?'LOSS':'TIE';
      // Insert before the delete button wrapper (last child)
      const metaGrid = panel.querySelector('.round-meta');
      metaGrid.insertBefore(chip, metaGrid.lastElementChild);
    }
  }
}

function renderBattingTable(round){
  const body = document.getElementById('batting-body');
  const totalsRow = document.getElementById('batting-totals');
  if (!body) return;
  
  // Auto-sync: any player in the batting order gets a stats row (initialised to zeros).
  // This means filling out the lineup automatically populates the batting stats table — you don't have to
  // hit "Pre-fill roster" or add each batter individually. Lineup is the source of truth.
  (round.battingOrder || []).forEach(name => {
    if (name && !round.batting[name]) round.batting[name] = blankBat();
  });
  // Cleanup: if someone has been removed from the lineup AND has no stats entered (all zeros),
  // drop their empty row so the table doesn't fill with abandoned slots. Anyone with real stats
  // (PA > 0) stays — that data is real, even if they're no longer in the active lineup.
  const inLineup = new Set((round.battingOrder || []).filter(Boolean));
  Object.keys(round.batting).forEach(name => {
    const s = round.batting[name];
    if (!inLineup.has(name) && (s.PA||0) === 0 && (s.AB||0) === 0 && batHits(s) === 0 && (s.BB||0) === 0 && (s.R||0) === 0){
      delete round.batting[name];
    }
  });
  
  // Sort to match the lineup above — slot 1 first, slot 2 second, etc.
  // Anyone in the batting stats who's NOT in the batting order (pinch hitters, late adds, prefilled bench)
  // gets appended after, in roster order, so nothing disappears.
  const lineupIdx = (name) => {
    const i = (round.battingOrder || []).indexOf(name);
    return i === -1 ? Infinity : i;
  };
  const players = Object.keys(round.batting).sort((a,b) => {
    const la = lineupIdx(a), lb = lineupIdx(b);
    if (la !== lb) return la - lb;
    // Tie-breaker for anyone not in the order: use roster order, then alphabetical
    const rA = state.roster.indexOf(a), rB = state.roster.indexOf(b);
    if (rA !== -1 && rB !== -1) return rA - rB;
    if (rA !== -1) return -1;
    if (rB !== -1) return 1;
    return a.localeCompare(b);
  });
  
  body.innerHTML = '';
  players.forEach(name => {
    const b = round.batting[name];
    const {last, first} = splitName(name);
    const tr = document.createElement('tr');
    tr.dataset.name = name;
    if ((b.HR||0) > 0) tr.classList.add('has-hr');
    let h = `<td class="first-col">${last} <span class="first">${first}</span>${(b.HR||0) > 0 ? ' <span title="Home run!" style="color:var(--gold)">⚡</span>' : ''}</td>`;
    BAT_COLS.forEach(c => {
      h += `<td><input type="number" class="num bat-in" data-col="${c}" value="${b[c]||0}" min="0" step="1"></td>`;
    });
    h += `<td class="derived" data-d="Ave">.000</td><td class="derived" data-d="OBP">.000</td><td class="derived" data-d="SLG">.000</td><td class="derived" data-d="OPS">.000</td>`;
    h += `<td><button class="row-x" data-remove>×</button></td>`;
    tr.innerHTML = h;
    body.appendChild(tr);
    updateBattingRowDerived(tr, b);
    
    tr.querySelectorAll('input.bat-in').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const col = e.target.dataset.col;
        b[col] = parseInt(e.target.value) || 0;
        updateBattingRowDerived(tr, b);
        updateBattingTotals(round);
      });
    });
    tr.querySelector('[data-remove]').onclick = () => {
      if (!confirm('Remove '+name+' from this round\'s batting?')) return;
      delete round.batting[name];
      renderBattingTable(round);
    };
  });
  
  if (!players.length){
    body.innerHTML = '<tr><td colspan="'+(BAT_COLS.length+6)+'" class="empty-state">No batters yet. Click "Pre-fill roster" to add your lineup.</td></tr>';
  }
  updateBattingTotals(round);
  renderPlayerOfRoundPanel(round);
}

function updateBattingRowDerived(tr, b){
  const rates = computeRates(b);
  tr.querySelector('[data-d="Ave"]').textContent = fmtRate(rates.Ave);
  tr.querySelector('[data-d="OBP"]').textContent = fmtRate(rates.OBP);
  tr.querySelector('[data-d="SLG"]').textContent = fmtRate(rates.SLG);
  tr.querySelector('[data-d="OPS"]').textContent = fmtOps(rates.OPS);
}

function updateBattingTotals(round){
  const tr = document.getElementById('batting-totals');
  if (!tr) return;
  const tot = blankBat();
  Object.values(round.batting || {}).forEach(b => {
    BAT_COLS.forEach(c => tot[c] += (b[c]||0));
  });
  const rates = computeRates(tot);
  let h = `<td class="first-col">TEAM</td>`;
  BAT_COLS.forEach(c => h += `<td>${tot[c]||0}</td>`);
  h += `<td>${fmtRate(rates.Ave)}</td><td>${fmtRate(rates.OBP)}</td><td>${fmtRate(rates.SLG)}</td><td>${fmtOps(rates.OPS)}</td><td></td>`;
  tr.innerHTML = h;
}

function renderPitchingTable(round){
  const body = document.getElementById('pitching-body');
  if (!body) return;
  const players = Object.keys(round.pitching);
  body.innerHTML = '';
  players.forEach(name => {
    const p = round.pitching[name];
    const {last, first} = splitName(name);
    const tr = document.createElement('tr');
    tr.dataset.name = name;
    let h = `<td class="first-col">${last} <span class="first">${first}</span></td>`;
    PITCH_COLS.forEach(c => {
      const step = c === 'IP' ? '0.01' : '1';
      h += `<td><input type="number" class="num pitch-in" data-col="${c}" value="${p[c]||0}" min="0" step="${step}"></td>`;
    });
    h += `<td class="derived" data-d="ERA">-</td><td class="derived" data-d="WHIP">-</td><td class="derived" data-d="K9">-</td><td class="derived" data-d="StrPct">-</td>`;
    h += `<td><button class="row-x" data-remove>×</button></td>`;
    tr.innerHTML = h;
    body.appendChild(tr);
    updatePitchingRowDerived(tr, p);
    tr.querySelectorAll('input.pitch-in').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const col = e.target.dataset.col;
        p[col] = parseFloat(e.target.value) || 0;
        // Auto-fill: if user enters Strikes + Balls but leaves Pitches blank, sum them.
        // If user enters Pitches + one of (Str/Bal), auto-fill the other.
        // User-entered Pit always wins (we don't overwrite it).
        if (col === 'Str' || col === 'Bal'){
          const sum = (p.Str||0) + (p.Bal||0);
          if (sum > 0 && (p.Pit||0) === 0){
            p.Pit = sum;
            const pitInput = tr.querySelector('input[data-col="Pit"]');
            if (pitInput) pitInput.value = sum;
          }
        } else if (col === 'Pit'){
          // If only one of Str/Bal is set, fill the other
          const pit = p.Pit||0, str = p.Str||0, bal = p.Bal||0;
          if (pit > 0 && str > 0 && bal === 0 && pit >= str){
            p.Bal = pit - str;
            const balInput = tr.querySelector('input[data-col="Bal"]');
            if (balInput) balInput.value = p.Bal;
          } else if (pit > 0 && bal > 0 && str === 0 && pit >= bal){
            p.Str = pit - bal;
            const strInput = tr.querySelector('input[data-col="Str"]');
            if (strInput) strInput.value = p.Str;
          }
        }
        updatePitchingRowDerived(tr, p);
        updatePitchingTotals(round);
      });
    });
    tr.querySelector('[data-remove]').onclick = () => {
      if (!confirm('Remove '+name+' from this round\'s pitching?')) return;
      delete round.pitching[name];
      renderPitchingTable(round);
    };
  });
  if (!players.length){
    body.innerHTML = '<tr><td colspan="'+(PITCH_COLS.length+6)+'" class="empty-state">No pitchers yet. Click "＋ Add pitcher" to enter pitching stats.</td></tr>';
  }
  updatePitchingTotals(round);
  renderPlayerOfRoundPanel(round);
}

function updatePitchingRowDerived(tr, p){
  const ip = p.IP || 0;
  const era = ip > 0 ? (9 * (p.ER||0) / ip) : 0;
  const whip = ip > 0 ? ((p.H||0) + (p.BB||0)) / ip : 0;
  const k9 = ip > 0 ? 9 * (p.K||0) / ip : 0;
  const pit = p.Pit || 0;
  const strPct = pit > 0 ? (100 * (p.Str||0) / pit) : 0;
  tr.querySelector('[data-d="ERA"]').textContent = ip > 0 ? era.toFixed(2) : '-';
  tr.querySelector('[data-d="WHIP"]').textContent = ip > 0 ? whip.toFixed(2) : '-';
  tr.querySelector('[data-d="K9"]').textContent = ip > 0 ? k9.toFixed(1) : '-';
  const strEl = tr.querySelector('[data-d="StrPct"]');
  if (strEl) strEl.textContent = pit > 0 ? strPct.toFixed(0) + '%' : '-';
}

function updatePitchingTotals(round){
  const tr = document.getElementById('pitching-totals');
  if (!tr) return;
  const tot = blankPitch();
  Object.values(round.pitching || {}).forEach(p => {
    PITCH_COLS.forEach(c => tot[c] += (p[c]||0));
  });
  const ip = tot.IP||0;
  const era = ip > 0 ? (9 * tot.ER / ip).toFixed(2) : '-';
  const whip = ip > 0 ? ((tot.H + tot.BB) / ip).toFixed(2) : '-';
  const k9 = ip > 0 ? (9 * tot.K / ip).toFixed(1) : '-';
  const strPct = (tot.Pit||0) > 0 ? (100 * (tot.Str||0) / tot.Pit).toFixed(0) + '%' : '-';
  let h = `<td class="first-col">TEAM</td>`;
  PITCH_COLS.forEach(c => h += `<td>${c==='IP'?tot[c].toFixed(2):tot[c]}</td>`);
  h += `<td>${era}</td><td>${whip}</td><td>${k9}</td><td>${strPct}</td><td></td>`;
  tr.innerHTML = h;
}

function prefillBatting(round){
  let added = 0;
  state.roster.forEach(name => {
    if (!round.batting[name]){ round.batting[name] = blankBat(); added++; }
  });
  renderBattingTable(round);
}

function openAddToRoundModal(round, kind){
  // Show current roster + "custom name" option
  const taken = Object.keys(round[kind]);
  let body = `
    <div class="m-sub">Add to ${kind} · Round ${round.num}</div>
    <input class="option-add-input" id="addR" placeholder="Type a player name or pick below">
    <div class="option-list" id="addList" style="margin-top:10px;max-height:400px;overflow:auto"></div>
  `;
  openModal('Add ' + (kind==='batting'?'batter':'pitcher'), body, () => {
    const inp = document.getElementById('addR');
    const list = document.getElementById('addList');
    const all = [...state.roster, ...PLAYER_DB.map(p=>p.name).filter(n => !state.roster.includes(n))];
    const fill = (q) => {
      const qn = (q||'').toLowerCase();
      const cands = all.filter(n => !taken.includes(n) && n.toLowerCase().includes(qn)).slice(0, 50);
      let h = '';
      cands.forEach(name => {
        const {last, first} = splitName(name);
        const inRoster = state.roster.includes(name);
        h += `<div class="option" onclick="addToRound('${round.id}','${kind}',${JSON.stringify(name).replace(/"/g,'&quot;')})">
          <div class="nm">${last} <span class="first">${first}</span>${inRoster?' <span style="font-size:10px;color:var(--ok)">(roster)</span>':''}</div>
          <div class="fit"></div><div></div>
        </div>`;
      });
      if (q && q.trim()){
        h = `<div class="option" style="border-color:var(--red)" onclick="addToRound('${round.id}','${kind}',${JSON.stringify(q.trim()).replace(/"/g,'&quot;')})">
          <div class="nm" style="color:var(--red)">＋ Add "${q.trim()}" as new player</div>
          <div class="fit">format: Lastname,Firstname</div><div></div>
        </div>` + h;
      }
      list.innerHTML = h;
    };
    fill(''); inp.oninput = (e) => fill(e.target.value); inp.focus();
  });
}
function addToRound(roundId, kind, rawName){
  const round = getRound(roundId);
  if (!round) return;
  let name = rawName.trim();
  if (!name.includes(',')){ const parts = name.split(/\s+/); if (parts.length >= 2) name = parts[parts.length-1]+','+parts.slice(0,-1).join(' '); }
  if (kind === 'batting') round.batting[name] = round.batting[name] || blankBat();
  else round.pitching[name] = round.pitching[name] || blankPitch();
  closeModal();
  if (kind === 'batting') renderBattingTable(round);
  else renderPitchingTable(round);
}

    const setAll = (val) => document.querySelectorAll('[data-avail]').forEach(cb => cb.checked = val);
    document.getElementById('btn-avail-all').onclick = () => setAll(true);
    document.getElementById('btn-avail-none').onclick = () => setAll(false);
    document.getElementById('btn-avail-prev').onclick = () => {
      const prev = state.rounds.filter(r => r.num < round.num && Array.isArray(r.availablePlayers)).sort((a,b)=>b.num-a.num)[0];
      if (!prev){ alert('No previous round with an available-players selection.'); return; }
      const prevSet = new Set(prev.availablePlayers);

    };

      document.querySelectorAll('[data-avail]').forEach(cb => { if (cb.checked) picked.push(cb.dataset.avail); });

      // Pre-fill batting stats rows for any newly-available players so they show up in the table
      picked.forEach(name => { if (!round.batting[name]) round.batting[name] = blankBat(); });
      closeModal();
      render();
      autosave();
    };
  });
}

function deleteSub(roundId, idx){
  const r = getRound(roundId); if (!r || !r.substitutions) return;

  r.substitutions.splice(idx, 1);
  render(); autosave();
}

function openPrintableLineup(round){
  const dateStr = round.date || '';
  const posMap = {};
  Object.entries(round.positions || {}).forEach(([pos, name]) => { posMap[name] = pos; });
  
  const len = Math.max(9, round.battingOrder.length);
  let rows = '';
  for (let i = 0; i < len; i++){
    const name = round.battingOrder[i];
    const isExtra = i >= 9;
    const rowLabel = i + 1;
    if (name){
      const posCell = posMap[name] ? posMap[name] : 'EH';
      rows += `<tr${isExtra?' class="eh-row"':''}><td class="num">${rowLabel}</td><td class="nm">${displayName(name)}</td><td class="pos">${posCell}</td></tr>`;

  // Anyone in round.positions but NOT in the batting order (unusual now, but keep for safety)

  }).join('');
  
  const html = `<!DOCTYPE html>
