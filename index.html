<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Rebels Dugout</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#3d5f3f">
<meta name="author" content="Braeden Prescott">
<meta name="description" content="The Rebels Dugout — season tracker and lineup builder by Braeden Prescott.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rebels Dugout">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1419;--panel:#1a2330;--panel-2:#1e2938;--inset:#0f1620;--inset-2:#131c27;--inset-deep:#0c1018;--dot-hover:#1f2b3d;--dot-filled-bg:#1a2e20;--line:#334056;--cream:#f5ecd3;--cream-dim:#dccfac;--muted:#9fadc7;--red:#d4533b;--red-dim:#8a3024;--dirt:#c2a572;--field:#3d5f3f;--field-line:#e8e2cb;--ok:#6fb07f;--body-bg-stop:#0a0d12;--body-radial:#1a2332;--grain:rgba(255,255,255,0.015);--up:#7cb38a;--down:#e27664;--gold:#e6c76b;--gold-dim:#c8aa5c}
body.light{--bg:#faf5e6;--panel:#ffffff;--panel-2:#f5efda;--inset:#fbf6e2;--inset-2:#f0e8cf;--inset-deep:#f8f2dc;--dot-hover:#eae2c6;--dot-filled-bg:#dcebd6;--line:#d4ccb2;--cream:#1d2532;--cream-dim:#3d4a5f;--muted:#6a7388;--red:#b23823;--red-dim:#6a2818;--dirt:#8a6e40;--field:#2e4f32;--field-line:#ffffff;--ok:#3d8050;--body-bg-stop:#f0e8ce;--body-radial:#fbf7eb;--grain:rgba(0,0,0,0.018);--up:#2e8040;--down:#b23823;--gold:#a0781c;--gold-dim:#806018}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:radial-gradient(ellipse 80% 50% at 50% 0%,var(--body-radial) 0%,transparent 70%),linear-gradient(180deg,var(--bg) 0%,var(--body-bg-stop) 100%);min-height:100vh;color:var(--cream);font-family:'Fraunces',Georgia,serif;font-size:16px;line-height:1.55;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
.byline{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:10px;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;margin-top:4px;opacity:0.85}
.welcome{max-width:520px;margin:60px auto;text-align:center;padding:40px 30px;background:linear-gradient(180deg,rgba(61,95,63,0.12),transparent);border:1px solid var(--line);border-radius:14px}
.welcome-ball{font-size:52px;margin-bottom:12px}
.welcome h2{font-family:'Big Shoulders Display',sans-serif;font-size:32px;font-weight:900;letter-spacing:0.03em;color:var(--cream);margin:0 0 10px}
.welcome p{color:var(--cream-dim);font-size:15px;line-height:1.6;margin:0 0 24px}
.welcome-btn{font-size:16px;padding:14px 28px;margin-bottom:28px}
.welcome-steps{display:flex;flex-direction:column;gap:12px;text-align:left;padding-top:24px;border-top:1px solid var(--line)}
.welcome-step{display:flex;align-items:center;gap:14px;color:var(--cream-dim);font-size:14px}
.welcome-step .step-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--red);color:var(--cream);font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:14px;flex-shrink:0}
/* Fixtures panel */
.fx-section-label{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--dirt);margin:18px 0 8px;padding:0 2px}
.fx-section-label:first-child{margin-top:6px}
.fixture-row{display:flex;align-items:center;gap:14px;width:100%;padding:12px 14px;background:rgba(245,236,211,0.03);border:1px solid var(--line);border-radius:8px;cursor:pointer;text-align:left;color:var(--cream);font-family:inherit;margin-bottom:6px;transition:background 0.15s}
.fixture-row:hover{background:rgba(245,236,211,0.08)}
.fx-num{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:20px;color:var(--red);min-width:42px;text-align:center;letter-spacing:0.03em}
.fx-meta{flex:1;min-width:0}
.fx-opp{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fx-date{font-family:'Big Shoulders Display',sans-serif;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.fx-result{display:flex;align-items:center;gap:10px;flex-shrink:0}
.fx-res-letter{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:18px;width:26px;height:26px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center}
.fx-score{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--cream-dim)}
.fx-pending{font-family:'Big Shoulders Display',sans-serif;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--dirt);font-weight:700}
.fx-w .fx-res-letter{background:rgba(124,179,138,0.22);color:var(--up)}
.fx-l .fx-res-letter{background:rgba(226,118,100,0.22);color:var(--down)}
.fx-t .fx-res-letter{background:rgba(166,139,91,0.22);color:var(--dirt)}
.fx-w{border-left:3px solid var(--up)}
.fx-l{border-left:3px solid var(--down)}
.fx-t{border-left:3px solid var(--dirt)}
.fx-next{background:linear-gradient(90deg,rgba(200,67,44,0.14),rgba(245,236,211,0.03));border-color:rgba(200,67,44,0.4);padding:16px}
.fx-next:hover{background:linear-gradient(90deg,rgba(200,67,44,0.22),rgba(245,236,211,0.08))}
/* Tab accent colors when a round has a result */
.tab.tab-win{border-bottom:2px solid var(--up)}
.tab.tab-loss{border-bottom:2px solid var(--down)}
.tab.tab-tie{border-bottom:2px solid var(--dirt)}
.dropdown-item.tab-win{border-left:3px solid var(--up)}
.dropdown-item.tab-loss{border-left:3px solid var(--down)}
.dropdown-item.tab-tie{border-left:3px solid var(--dirt)}
.tab-dropdown{position:relative;display:inline-flex}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:220px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.5);flex-direction:column;gap:2px}
.dropdown-menu.open{display:flex}
.dropdown-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:transparent;border:none;border-radius:6px;color:var(--cream);cursor:pointer;text-align:left;font-family:'Big Shoulders Display',sans-serif}
.dropdown-item:hover{background:rgba(245,236,211,0.08)}
.dropdown-item.active{background:var(--red);color:var(--cream)}
.dropdown-item .di-num{font-weight:900;font-size:16px;letter-spacing:0.05em}
.dropdown-item .di-sub{font-family:'Fraunces',serif;font-size:12px;color:var(--cream-dim);font-weight:400}
.dropdown-item.active .di-sub{color:var(--cream);opacity:0.9}
/* Color accents for positive events */
tr.has-hr{background:linear-gradient(90deg,rgba(200,170,92,0.18),transparent 50%) !important}
tr.has-hr .first-col{font-weight:700}
tr.has-hr td:nth-child(7){color:var(--gold) !important;font-weight:800}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(var(--grain) 1px,transparent 1px);background-size:3px 3px}
.wrap{max-width:1400px;margin:0 auto;padding:22px 20px 80px;position:relative;z-index:1}
.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding-bottom:14px;border-bottom:2px solid var(--red);margin-bottom:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.ball{display:inline-block;width:34px;height:34px;border-radius:50%;background:var(--cream);position:relative;box-shadow:inset -4px -6px 10px rgba(0,0,0,0.2);flex-shrink:0}
.ball::before,.ball::after{content:"";position:absolute;top:4px;bottom:4px;width:2px;border-left:2px dashed var(--red)}
.ball::before{left:10px;transform:rotate(-25deg)}
.ball::after{right:10px;transform:rotate(25deg)}
.brand h1{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:38px;letter-spacing:0.02em;margin:0;text-transform:uppercase;line-height:0.9}
.brand h1 .accent{color:var(--red)}
.brand .meta{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.teamname,.seasonname{background:transparent;border:none;color:var(--cream-dim);font-family:'Fraunces',serif;font-style:italic;font-size:15px;border-bottom:1px dashed var(--line);padding:2px 4px;outline:none;min-width:140px}
.seasonname{font-size:12px;color:var(--dirt);font-family:'Big Shoulders Display',sans-serif;font-style:normal;letter-spacing:0.18em;text-transform:uppercase;font-weight:600}
.teamname:focus,.seasonname:focus{border-bottom-color:var(--dirt);color:var(--cream)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{font-family:'Big Shoulders Display',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.13em;text-transform:uppercase;background:transparent;color:var(--cream);border:1px solid var(--line);padding:10px 14px;border-radius:4px;cursor:pointer;transition:all 0.15s;white-space:nowrap;min-height:40px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{border-color:var(--dirt);color:var(--dirt)}
.btn.primary{background:var(--red);border-color:var(--red);color:var(--cream)}
.btn.primary:hover{background:var(--red-dim);border-color:var(--red-dim);color:var(--cream)}
.btn.ghost{border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--cream);border-color:var(--line)}
.btn.small{padding:4px 8px;font-size:10px}
.btn.danger{color:var(--down);border-color:var(--red-dim)}
.btn.danger:hover{background:var(--red);color:var(--cream)}
.btn-icon{width:40px;min-width:40px;padding:8px 0;font-size:18px;line-height:1;letter-spacing:0;display:inline-flex;align-items:center;justify-content:center}
.btn-icon #themeIcon{font-size:18px;line-height:1}
.tabbar{display:flex;gap:2px;margin-bottom:20px;flex-wrap:nowrap;align-items:stretch;padding-bottom:1px;border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.tab{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.14em;text-transform:uppercase;background:transparent;color:var(--muted);border:none;border-bottom:3px solid transparent;padding:12px 14px;cursor:pointer;transition:all 0.1s;margin-bottom:-1px;white-space:nowrap;min-height:48px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tab:hover{color:var(--cream-dim)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab .rd-num{font-size:17px;font-weight:900;display:block;line-height:1}
.tab .rd-sub{font-size:10px;color:var(--muted);letter-spacing:0.13em;margin-top:3px;font-weight:600}
.tab.active .rd-sub{color:var(--dirt)}
.tab.add{color:var(--dirt);font-size:20px;padding:12px 14px;letter-spacing:0}
.panel{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--line);border-radius:6px;padding:18px;margin-bottom:18px;position:relative}
.panel h2{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:19px;letter-spacing:0.14em;text-transform:uppercase;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.panel h2 .count{font-size:12px;color:var(--dirt);font-weight:600;letter-spacing:0.18em}
.panel h2 .actions{display:flex;gap:6px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:980px){.grid{grid-template-columns:1.05fr 0.95fr}}
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.card{background:var(--inset);border:1px solid var(--line);border-radius:3px;padding:12px 14px;cursor:pointer;position:relative;transition:all 0.15s;display:flex;gap:12px;align-items:flex-start}
.card:hover{border-color:var(--dirt);transform:translateY(-1px)}
.card .card-body{flex:1;min-width:0}
.card .name{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:18px;letter-spacing:0.04em;text-transform:uppercase;line-height:1.1}
.card .first{color:var(--cream-dim);font-weight:600;font-size:14px}
.card .stats,.card .season-stats{display:flex;gap:12px;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex-wrap:wrap}
.card .season-stats{margin-top:4px;color:var(--dirt)}
.card .stats b,.card .season-stats b{color:var(--cream);font-weight:600}
.card .pos-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.pos-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 6px;border-radius:2px;background:rgba(166,139,91,0.15);color:var(--dirt);border:1px solid rgba(166,139,91,0.25)}
.pos-tag.strong{background:rgba(200,67,44,0.15);color:var(--down);border-color:rgba(200,67,44,0.3)}
.pos-tag.season{background:rgba(90,155,107,0.15);color:var(--up);border-color:rgba(90,155,107,0.3)}
.card .remove{position:absolute;top:6px;right:8px;background:transparent;border:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:4px;z-index:2}
.card .remove:hover{color:var(--red)}
.card.ghost{border-style:dashed;color:var(--muted);display:flex;align-items:center;justify-content:center;min-height:80px}
.card.ghost:hover{color:var(--dirt)}

/* Player avatar — used on roster cards, lineup slots, and the hero card. */
.avatar{flex:0 0 auto;width:48px;height:48px;border-radius:50%;background:var(--inset-2);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:18px;color:var(--dirt);overflow:hidden;cursor:pointer;position:relative;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.avatar:hover{border-color:var(--dirt)}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.avatar.no-photo::after{content:"📷";position:absolute;bottom:-2px;right:-2px;background:var(--panel);border-radius:50%;font-size:10px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);opacity:0;transition:opacity .15s}
.avatar.no-photo:hover::after{opacity:1}
.avatar.has-photo:hover::after{content:"✎";position:absolute;bottom:-2px;right:-2px;background:var(--panel);color:var(--cream);border-radius:50%;font-size:10px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
.avatar.lg{width:64px;height:64px;font-size:22px}
.avatar.sm{width:32px;height:32px;font-size:13px;border-width:1px}
.lineup{display:flex;flex-direction:column;gap:8px}
.slot{display:grid;grid-template-columns:52px 1fr auto;gap:12px;align-items:center;padding:12px 14px;background:var(--inset);border:1px solid var(--line);border-radius:4px;cursor:pointer;transition:all 0.15s;min-height:62px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.slot:hover{border-color:var(--dirt)}
.slot .num{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:30px;color:var(--red);text-align:center;line-height:1}
.slot .num .role{display:block;font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:9px;color:var(--dirt);letter-spacing:0.12em;text-transform:uppercase;margin-top:3px;line-height:1}
.slot .who{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:18px;letter-spacing:0.03em;text-transform:uppercase;line-height:1.15}
.slot .who .first{color:var(--cream-dim);font-weight:600}
.slot .mini{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-top:4px;line-height:1.3}
.slot .mini b{color:var(--cream)}
.slot.empty .who{color:var(--muted);font-style:italic;font-family:'Fraunces',serif;text-transform:none;font-size:15px;letter-spacing:0}
.slot.extra{border-left:3px solid var(--dirt)}
.slot.extra .num{font-size:22px}
.slot.extra .num .role{font-size:9px;color:var(--dirt);margin-top:4px}
.slot .pos-chip{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:5px 10px;border-radius:3px;background:var(--field);color:var(--field-line);min-width:44px;text-align:center}
.slot .pos-chip.unset{background:transparent;border:1px dashed var(--line);color:var(--muted)}
.slot .pos-chip.eh{background:rgba(194,165,114,0.18);border:1px solid var(--dirt);color:var(--dirt)}
.slot-add{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:transparent;border:1px dashed var(--line);border-radius:4px;color:var(--dirt);font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;min-height:52px;width:100%}
.slot-add:hover{border-color:var(--dirt);background:rgba(194,165,114,0.06);color:var(--cream)}
.diamond-wrap{position:relative;width:100%;aspect-ratio:1/0.92;max-width:520px;margin:8px auto 0}
.diamond-wrap svg{width:100%;height:100%;display:block}
.pos-dot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.pos-dot .bubble{background:var(--panel-2);border:2px solid var(--dirt);border-radius:50%;width:64px;height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.15s;padding:4px}
.pos-dot:hover .bubble{border-color:var(--red);background:var(--dot-hover)}
.pos-dot .pos-label{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:var(--dirt);letter-spacing:0.1em;margin-top:2px}
.pos-dot .pos-last{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:12px;color:var(--cream);text-transform:uppercase;line-height:1.05;text-align:center;word-break:break-word}
.pos-dot.filled .bubble{border-color:var(--ok);background:var(--dot-filled-bg)}
.pos-dot.filled .pos-label{color:var(--ok)}
.eh-list{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.eh-list .eh-label{font-family:'Big Shoulders Display',sans-serif;font-size:11px;font-weight:700;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:2px}
.eh-item{padding:10px 14px;background:rgba(194,165,114,0.06);border:1px solid var(--line);border-left:3px solid var(--dirt);border-radius:4px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s;min-height:48px}
.eh-item:hover{background:rgba(194,165,114,0.12);border-color:var(--dirt)}
.eh-item .pos-chip{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:4px 9px;background:var(--dirt);color:var(--bg);letter-spacing:0.1em;border-radius:3px}
.eh-item .who{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:16px;letter-spacing:0.03em;text-transform:uppercase;flex:1;line-height:1.15}
.eh-item .who .first{color:var(--cream-dim);font-weight:600}
.eh-item .swap-hint{font-family:'Big Shoulders Display',sans-serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);font-weight:600}
.eh-empty{padding:14px;text-align:center;color:var(--muted);font-style:italic;font-size:14px;border:1px dashed var(--line);border-radius:4px}
.conflicts{margin-top:14px;font-size:13px;color:var(--red);font-style:italic}
.conflicts.ok{color:var(--ok);font-style:normal}
.source-pill{display:inline-block;font-family:'Big Shoulders Display',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:3px 8px;border-radius:2px;background:rgba(166,139,91,0.15);color:var(--dirt);border:1px solid rgba(166,139,91,0.3);margin-left:8px}
.source-pill.season{background:rgba(90,155,107,0.15);color:var(--up);border-color:rgba(90,155,107,0.3)}
.round-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;align-items:end}
.round-meta label{display:flex;flex-direction:column;gap:4px;font-family:'Big Shoulders Display',sans-serif;font-size:11px;color:var(--dirt);letter-spacing:0.18em;text-transform:uppercase;font-weight:700}
.round-meta input,.round-meta select{background:var(--inset);border:1px solid var(--line);color:var(--cream);font-family:'Fraunces',serif;font-size:15px;padding:10px 12px;border-radius:4px;outline:none;min-height:42px}

<body>
<div class="wrap">
<div class="top">
  <div class="brand">
    <span class="ball" aria-hidden="true"></span>
    <div>
      <h1>The Rebels <span class="accent">Dug</span>out</h1>
      <div class="meta">
        <input class="teamname" id="teamName" value="Rebels Winter B4" maxlength="40" title="Click to edit team name">
        <input class="seasonname" id="seasonName" value="Winter 2026" maxlength="30" title="Click to edit season">
      </div>
      <div class="byline">by Braeden Prescott</div>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn btn-icon" id="btnTheme" title="Toggle light/dark" aria-label="Toggle theme"><span id="themeIcon">☾</span></button>
    <button class="btn" id="btnExport" title="Download full season as JSON">Export</button>
    <button class="btn" id="btnEmail" title="Send the season file via email (for moving to another device)">Email</button>
    <button class="btn" id="btnImport" title="Load season from JSON">Import</button>
    <input type="file" id="fileImport" accept="application/json" style="display:none">
    <button class="btn" id="btnSave" title="Save to browser">Save</button>
    <button class="btn" id="btnLoad" title="Load saved season">Load</button>
  </div>
</div>

<div class="tabbar" id="tabbar"></div>

<div id="main"></div>

<footer>Click any card for full stats · Click any slot to assign · Stats blend historical + season for first 5 rounds, then switch to season-only<br><span style="opacity:0.5;font-size:11px;margin-top:6px;display:inline-block">The Rebels Dugout · built by Braeden Prescott · 2026</span></footer>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="m-head">
      <h3 id="modalTitle">Choose a player</h3>
      <button class="m-close" id="modalClose">×</button>
    </div>
    <div class="m-body" id="modalBody"></div>
  </div>
</div>

<script>
// ============================================================================
// DATA
// ============================================================================
const PLAYER_DB = [];
const POSITIONS = ['P','C','1B','2B','3B','SS','LF','CF','RF','EH'];
const FIELD_POSITIONS = ['P','C','1B','2B','3B','SS','LF','CF','RF'];
const DEFAULT_ROSTER = [];
const BAT_COLS = ['PA','AB','1B','2B','3B','HR','R','RBI','BB','K','HBP','SB','CS'];
const BAT_COL_LABELS = {'PA':'PA','AB':'AB','1B':'1B','2B':'2B','3B':'3B','HR':'HR','R':'R','RBI':'RBI','BB':'BB','K':'K','HBP':'HBP','SB':'SB','CS':'CS'};
const PITCH_COLS = ['IP','BF','H','R','ER','BB','K','HBP','Pit','Str','Bal'];
const BLEND_THRESHOLD = 5;
const RECENT_WINDOW = 3;  // Number of most-recent rounds used for "recent form"
// Labels shown under the slot number in the batting order
const SLOT_ROLE_LABELS = {0:'Leadoff', 3:'Cleanup', 8:'2nd Leadoff'};

// Build byName from PLAYER_DB, but later overlay with any historical edits from state
let byName = {};
function rebuildByName(){
  byName = {};
  PLAYER_DB.forEach(p => { byName[p.name] = p; });
  // Apply user overrides (edits to historical stats and custom players)
  if (state && state.historicalOverrides){
    Object.entries(state.historicalOverrides).forEach(([name, ovr]) => {
      if (ovr === null){
        // Tombstone — player deleted from DB
        delete byName[name];
      } else {
        byName[name] = { ...byName[name], ...ovr, name };
      }
    });
  }
  // Migrate legacy pos.DH -> pos.EH on any historical records
  Object.values(byName).forEach(p => {
    if (p && p.pos && p.pos.DH != null){
      p.pos.EH = (p.pos.EH || 0) + p.pos.DH;
      delete p.pos.DH;
    }
    // Migrate legacy batting H -> 1B (singles)
    if (p && p.H != null && p['1B'] == null){
      p['1B'] = Math.max(0, (p.H||0) - (p['2B']||0) - (p['3B']||0) - (p.HR||0));
      delete p.H;
    }
  });
}

function blankBat(){ const o = {}; BAT_COLS.forEach(c => o[c] = 0); return o; }
// Total hits is derived from 1B/2B/3B/HR — never stored. Used everywhere H was used previously.
// Keeps backwards compat: legacy records may still have a stored s.H, so prefer that if present (migration handles it).
function batHits(s){
  if (!s) return 0;
  return (s['1B']||0) + (s['2B']||0) + (s['3B']||0) + (s.HR||0);
}
function blankPitch(){ const o = {}; PITCH_COLS.forEach(c => o[c] = 0); return o; }
function blankPos(){ return {P:0,C:0,'1B':0,'2B':0,'3B':0,SS:0,LF:0,CF:0,RF:0,EH:0}; }
function splitName(n){ const [l,f] = (n||'').split(','); return {last:l||n||'',first:(f||'').trim()}; }
// Pretty-print a "Last,First" key as "First Last" for human-facing display.
// Keep internal keys as "Last,First" (used as unique IDs in batting/positions/substitutions objects).
function displayName(n){ const {last, first} = splitName(n); return first ? (first + ' ' + last) : last; }
// Compact form: "B. Prescott" for tight spaces like print cards, FB post
function displayNameShort(n){ const {last, first} = splitName(n); return first ? (first[0] + '. ' + last) : last; }
function fmtRate(x){ return x > 0 ? x.toFixed(3).replace(/^0/,'') : '.000'; }
function fmtOps(x){ return (x || 0).toFixed(3); }
function uid(){ return 'r' + Math.random().toString(36).slice(2,9); }
function cloneDeep(o){ return JSON.parse(JSON.stringify(o)); }

// ============================================================================
// STATE
// ============================================================================
let state = {
  teamName: 'Rebels Winter B4',
  season: 'Winter 2026',
  roster: [...DEFAULT_ROSTER],
  battingOrder: Array(9).fill(null),
  positions: {},
  rounds: [],
  historicalOverrides: {},  // { playerName: {fields...} | null }
  activeTab: 'season'
};
rebuildByName();

// ============================================================================
// STATS AGGREGATION
// ============================================================================
function completedRounds(){
  return state.rounds.filter(r =>
    Object.values(r.batting||{}).some(b => (b.PA||0) > 0) ||
    Object.values(r.pitching||{}).some(p => (p.IP||0) > 0)
  ).length;
}

// Get round.positions for a player, accounting for substitutions.
// substitutions is an array of { name, position, innings } — innings optional.
// If substitutions present, a player "plays" their starting position AND any sub positions
// (counted as full games at each — simpler than prorating, more generous to bench players).
// EH is DERIVED: any batter in the order (or with PA) who has no field position = EH.
function getPlayerPositionsInRound(round, name){
  const positions = [];
  // Starter — only FIELD positions are stored in round.positions (EH is derived, not stored)
  for (const [pos, nm] of Object.entries(round.positions || {})){
    if (nm === name && FIELD_POSITIONS.includes(pos)) positions.push(pos);
  }
  // Substitutions during game
  (round.substitutions || []).forEach(sub => {
    if (sub.name === name && sub.position && !positions.includes(sub.position)){
      positions.push(sub.position);
    }
  });
  // Legacy: old saves stored DH as a position — treat it as EH
  if ((round.positions || {}).DH === name && !positions.includes('EH')){
    positions.push('EH');
  }
  // Derive EH: if the player batted (in order or had PA) but has no field position, they're EH
  if (!positions.some(p => FIELD_POSITIONS.includes(p)) && !positions.includes('EH')){
    const inBO = (round.battingOrder || []).includes(name);
    const hadPA = ((round.batting || {})[name] || {}).PA > 0;
    if (inBO || hadPA) positions.push('EH');
  }
  return positions;
}

function seasonBattingFor(name){
  const agg = blankBat();
  let G = 0;
  for (const r of state.rounds){
    const b = (r.batting||{})[name];
    if (b && (b.PA||0) > 0){
      G++;
      for (const c of BAT_COLS) agg[c] = (agg[c]||0) + (Number(b[c])||0);
    }
  }
  return { G, ...agg };
}

function seasonPitchingFor(name){
  const agg = blankPitch();
  let G = 0;
  for (const r of state.rounds){
    const p = (r.pitching||{})[name];
    if (p && (p.IP||0) > 0){
      G++;
      for (const c of PITCH_COLS) agg[c] = (agg[c]||0) + (Number(p[c])||0);
    }
  }
  return { G, ...agg };
}

function seasonPositionsFor(name){
  const pos = blankPos();
  for (const r of state.rounds){
    for (const p of getPlayerPositionsInRound(r, name)){
      if (pos.hasOwnProperty(p)) pos[p]++;
    }
  }
  return pos;
}

// Recent-form stats: last N rounds where player had PA
function recentBattingFor(name, windowN = RECENT_WINDOW){
  const agg = blankBat();
  let G = 0;
  // Iterate rounds in reverse chronological order
  const rounds = [...state.rounds].filter(r => {
    const b = (r.batting||{})[name];
    return b && (b.PA||0) > 0;
  }).sort((a,b) => b.num - a.num).slice(0, windowN);
  for (const r of rounds){
    const b = r.batting[name];
    G++;
    for (const c of BAT_COLS) agg[c] = (agg[c]||0) + (Number(b[c])||0);
  }
  return { G, rounds: rounds.length, ...agg };
}

// "Before round N" variants — used when suggesting a lineup for an upcoming round
// so the suggestion uses only prior-round data (not the round itself).
function completedRoundsBefore(num){
  return state.rounds.filter(r =>
    r.num < num && (
      Object.values(r.batting||{}).some(b => (b.PA||0) > 0) ||
      Object.values(r.pitching||{}).some(p => (p.IP||0) > 0)
    )
  ).length;
}

function seasonBattingBefore(name, num){
  const agg = blankBat();
  let G = 0;
  for (const r of state.rounds){
    if (r.num >= num) continue;
    const b = (r.batting||{})[name];
    if (b && (b.PA||0) > 0){
      G++;
      for (const c of BAT_COLS) agg[c] = (agg[c]||0) + (Number(b[c])||0);
    }
  }
  return { G, ...agg };
}

function seasonPositionsBefore(name, num){
  const pos = blankPos();
  for (const r of state.rounds){
    if (r.num >= num) continue;
    for (const p of getPlayerPositionsInRound(r, name)){
      if (pos.hasOwnProperty(p)) pos[p]++;
    }
  }
  return pos;
}

// Blended stats scoped to a specific round (uses only prior rounds' data)
function getBlendedStatsForRound(name, roundNum){
  const hist = byName[name];
  const seasonBat = seasonBattingBefore(name, roundNum);
  const seasonPos = seasonPositionsBefore(name, roundNum);
  const rc = completedRoundsBefore(roundNum);
  const useSeasonOnly = rc >= BLEND_THRESHOLD;
  if (useSeasonOnly){
    const rates = computeRates(seasonBat);
    const seasonH = batHits(seasonBat);
    return {
      name, _source:'season', _rounds:rc,
      G: seasonBat.G, PA: seasonBat.PA, AB: seasonBat.AB, H: seasonH,
      '1B': seasonBat['1B']||0,
      '2B': seasonBat['2B']||0, '3B': seasonBat['3B']||0, HR: seasonBat.HR||0,
      R: seasonBat.R, RBI: seasonBat.RBI, BB: seasonBat.BB, K: seasonBat.K,
      HBP: seasonBat.HBP, SB: seasonBat.SB, CS: seasonBat.CS,
      ...rates, pos: seasonPos
    };
  }
  const h = hist || {};
  const histPos = (hist && hist.pos) || {};
  // For history records, batHits(h) handles both new (1B-based) and post-migration data uniformly.
  const merged = {
    G: (h.G||0) + seasonBat.G,
    PA: (h.PA||0) + seasonBat.PA,
    AB: (h.AB||0) + seasonBat.AB,
    '1B': (h['1B']||0) + (seasonBat['1B']||0),
    '2B': (h['2B']||0) + (seasonBat['2B']||0),
    '3B': (h['3B']||0) + (seasonBat['3B']||0),
    HR: (h.HR||0) + (seasonBat.HR||0),
    R: (h.R||0) + (seasonBat.R||0),
    RBI: (h.RBI||0) + (seasonBat.RBI||0),
    BB: (h.BB||0) + (seasonBat.BB||0),
    K: (h.K||0) + (seasonBat.K||0),
    HBP: (h.HPB||0) + (seasonBat.HBP||0),
    SB: (h.SB||0) + (seasonBat.SB||0),
    CS: (h.CS||0) + (seasonBat.CS||0)
  };
  merged.H = batHits(merged);
  const rates = computeRates(merged);
  const pos = {};
  for (const p of POSITIONS) pos[p] = (histPos[p]||0) + (seasonPos[p]||0);
  return { name, _source:'blend', _rounds:rc, ...merged, ...rates, pos };
}

function computeRates(s){
  // s.H may not be present on raw-storage records; compute it from 1B/2B/3B/HR if needed.
  const ab = s.AB||0, h = (s.H != null ? s.H : batHits(s)), bb = s.BB||0, hbp = s.HBP||s.HPB||0;
  const doubles = s['2B']||0, triples = s['3B']||0, hr = s.HR||0;
  const singles = (s['1B'] != null) ? s['1B'] : Math.max(0, h - doubles - triples - hr);
  const tb = singles + 2*doubles + 3*triples + 4*hr;
  const ave = ab > 0 ? h/ab : 0;
  const obp = (ab+bb+hbp) > 0 ? (h+bb+hbp)/(ab+bb+hbp) : 0;
  const slg = ab > 0 ? tb/ab : 0;
  return { Ave:ave, OBP:obp, SLG:slg, OPS:obp+slg, TB:tb };
}

// Blended stats: historical + season for first BLEND_THRESHOLD rounds, then season-only
function getBlendedStats(name){
  const hist = byName[name];
  const seasonBat = seasonBattingFor(name);
  const seasonPos = seasonPositionsFor(name);
  const rc = completedRounds();
  const useSeasonOnly = rc >= BLEND_THRESHOLD;
  
  if (useSeasonOnly){
    const rates = computeRates(seasonBat);
    return {
      name, _source:'season', _rounds:rc,
      G: seasonBat.G, PA: seasonBat.PA, AB: seasonBat.AB, H: batHits(seasonBat),
      '1B': seasonBat['1B']||0,
      '2B': seasonBat['2B']||0, '3B': seasonBat['3B']||0, HR: seasonBat.HR||0,
      R: seasonBat.R, RBI: seasonBat.RBI, BB: seasonBat.BB, K: seasonBat.K,
      HBP: seasonBat.HBP, SB: seasonBat.SB, CS: seasonBat.CS,
      ...rates, pos: seasonPos
    };
  }
  
  // Blend
  const h = hist || {};
  const histPos = (hist && hist.pos) || {};
  const merged = {
    G: (h.G||0) + seasonBat.G,
    PA: (h.PA||0) + seasonBat.PA,
    AB: (h.AB||0) + seasonBat.AB,
    '1B': (h['1B']||0) + (seasonBat['1B']||0),
    '2B': (h['2B']||0) + (seasonBat['2B']||0),
    '3B': (h['3B']||0) + (seasonBat['3B']||0),
    HR: (h.HR||0) + (seasonBat.HR||0),
    R: (h.R||0) + (seasonBat.R||0),
    RBI: (h.RBI||0) + (seasonBat.RBI||0),
    BB: (h.BB||0) + (seasonBat.BB||0),
    K: (h.K||0) + (seasonBat.K||0),
    HBP: (h.HPB||0) + (seasonBat.HBP||0),
    SB: (h.SB||0) + (seasonBat.SB||0),
    CS: (h.CS||0) + (seasonBat.CS||0)
  };
  merged.H = batHits(merged);
  const rates = computeRates(merged);
  const pos = {};
  for (const p of POSITIONS) pos[p] = (histPos[p]||0) + (seasonPos[p]||0);
  return { name, _source:'blend', _rounds:rc, ...merged, ...rates, pos };
}

// For player detail: show both historical and season separately
function getHistoricalStats(name){
  const h = byName[name];
  if (!h) return null;
  return { ...h, _source:'historical' };
}
function getSeasonStats(name){

  };
}

function topPositions(p, n=3){

}

// ============================================================================
// PERSISTENCE — IndexedDB (durable, works offline)
// ============================================================================
const IDB_NAME = 'dugout';
const IDB_STORE = 'saves';
const IDB_PHOTO_STORE = 'playerPhotos';
const IDB_VERSION = 2;  // Bumped to add photo store
const IDB_AUTOSAVE_KEY = '__autosave';

function idbOpen(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)){
        db.createObjectStore(IDB_STORE);
      }
      if (!db.objectStoreNames.contains(IDB_PHOTO_STORE)){
        db.createObjectStore(IDB_PHOTO_STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch(e){ return null; }
}
async function idbPut(key, value){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(value, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  } catch(e){ console.error('idb put failed', e); return false; }
}
async function idbDelete(key){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  } catch(e){ return false; }
}
async function idbKeys(){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAllKeys();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  } catch(e){ return []; }
}

// ---- Player photo helpers ----
// Photos are stored as data URLs (string) in their own object store, keyed by player name.
// We keep an in-memory cache (playerPhotoCache) populated on startup so the UI can render
// avatars synchronously. Updates write to IDB and update the cache simultaneously.
const playerPhotoCache = {};
async function idbPhotoGet(name){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_PHOTO_STORE, 'readonly');
      const req = tx.objectStore(IDB_PHOTO_STORE).get(name);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch(e){ return null; }
}
async function idbPhotoPut(name, dataUrl){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_PHOTO_STORE, 'readwrite');
      tx.objectStore(IDB_PHOTO_STORE).put(dataUrl, name);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  } catch(e){ console.error('photo put failed', e); return false; }
}
async function idbPhotoDelete(name){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_PHOTO_STORE, 'readwrite');
      tx.objectStore(IDB_PHOTO_STORE).delete(name);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  } catch(e){ return false; }
}
async function loadAllPhotos(){
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_PHOTO_STORE, 'readonly');
      const store = tx.objectStore(IDB_PHOTO_STORE);
      const req = store.openCursor();
      req.onsuccess = () => {
        const cursor = req.result;
        if (cursor){
          playerPhotoCache[cursor.key] = cursor.value;
          cursor.continue();
        } else resolve(true);
      };
      req.onerror = () => reject(req.error);
    });
  } catch(e){ return false; }
}
function getPlayerPhoto(name){
  return playerPhotoCache[name] || null;
}
async function setPlayerPhoto(name, dataUrl){
  playerPhotoCache[name] = dataUrl;
  return await idbPhotoPut(name, dataUrl);
}
async function clearPlayerPhoto(name){
  delete playerPhotoCache[name];
  return await idbPhotoDelete(name);
}

// Markup for an avatar circle — uses the photo if present, else falls back to initials.
// `size` ∈ '' | 'sm' | 'lg'. Pass extraClass to add modifier classes.
function avatarMarkup(name, size = '', extraClass = ''){
  const photo = getPlayerPhoto(name);
  const cls = ['avatar', size, extraClass, photo ? 'has-photo' : 'no-photo'].filter(Boolean).join(' ');
  if (photo){
    return `<div class="${cls}" data-pname="${(name||'').replace(/"/g,'&quot;')}"><img src="${photo}" alt=""></div>`;
  }
  const {last, first} = splitName(name);
  const init = ((first||'').charAt(0) + (last||'').charAt(0)).toUpperCase() || '?';
  return `<div class="${cls}" data-pname="${(name||'').replace(/"/g,'&quot;')}">${init}</div>`;
}

// Open the photo-upload flow for a player. If a photo already exists, prompt
// whether to replace or remove. Otherwise open the file picker directly.
function openPhotoUpload(name){
  const has = !!getPlayerPhoto(name);
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.style.display = 'none';
  input.onchange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (input.parentNode) document.body.removeChild(input);
    if (!file) return;
    try {
      const dataUrl = await processPhotoFile(file, 400);
      await setPlayerPhoto(name, dataUrl);
      render();
    } catch(err){
      alert('Could not process that image: ' + (err.message || err));
    }
  };
  document.body.appendChild(input);
  if (has){
    const body = `
      <div class="m-sub">${displayName(name)} already has a photo.</div>
      <div style="display:flex;gap:10px;flex-direction:column">
        <button class="btn primary" id="btn-photo-replace">Replace photo</button>
        <button class="btn danger" id="btn-photo-remove">Remove photo</button>
      </div>`;
    openModal('Player photo', body);
    document.getElementById('btn-photo-replace').onclick = () => { closeModal(); input.click(); };
    document.getElementById('btn-photo-remove').onclick = async () => {
      closeModal();
      if (input.parentNode) document.body.removeChild(input);
      await clearPlayerPhoto(name);
      render();
    };
  } else {
    input.click();
  }
}

// Process a File (from <input type="file">) into a square-cropped, resized JPEG data URL.
// Strategy: load into Image, crop center square, scale to maxSize, output JPEG at quality 0.82.
// 400x400 @ 0.82 produces ~30-60KB, plenty for avatars + hero card.
function processPhotoFile(file, maxSize = 400){
  return new Promise((resolve, reject) => {
    if (!file || !file.type || !file.type.startsWith('image/')){
      reject(new Error('Not an image file')); return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const minDim = Math.min(img.width, img.height);
        const sx = (img.width - minDim) / 2;
        const sy = (img.height - minDim) / 2;
        const c = document.createElement('canvas');
        c.width = maxSize; c.height = maxSize;
        const ctx = c.getContext('2d');
        // High-quality downscale
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, maxSize, maxSize);
        try {
          const out = c.toDataURL('image/jpeg', 0.82);
          resolve(out);
        } catch(e){ reject(e); }
      };
      img.onerror = () => reject(new Error('Could not load image'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

// ROUND HELPERS
// ============================================================================
function getRound(id){ return state.rounds.find(r => r.id === id); }
function ensureRoundShape(r){
  r.batting = r.batting || {};
  r.pitching = r.pitching || {};
  r.positions = r.positions || {};
  r.battingOrder = r.battingOrder || Array(9).fill(null);
  r.substitutions = r.substitutions || [];  // [{name, position, innings?, note?}]
  // availablePlayers: subset of roster actually playing this round. null = "not yet chosen" (treat as whole roster).
  if (r.availablePlayers === undefined) r.availablePlayers = null;
  // Migrate legacy round.fielding (name->position) to positions (position->name)
  if (r.fielding && Object.keys(r.fielding).length){
    Object.entries(r.fielding).forEach(([name, pos]) => {
      if (pos && !r.positions[pos]) r.positions[pos] = name;
    });
    delete r.fielding;
  }
  // Migrate legacy DH pseudo-position: DH becomes an Extra Hitter,
  // which means being in the batting order without a field position assignment.
  if (r.positions['DH']){
    const dhName = r.positions['DH'];
    if (!r.battingOrder.includes(dhName)){
      // Append to the end of the batting order as an extra hitter
      r.battingOrder.push(dhName);
    }
    delete r.positions['DH'];
  }
  // Also migrate substitutions that targeted DH -> EH
  (r.substitutions || []).forEach(sub => { if (sub.position === 'DH') sub.position = 'EH'; });
  // Migrate legacy batting stats: H field is now 1B (singles only). Existing records were "total hits"
  // including extra-base hits, so 1B = old H - 2B - 3B - HR. Skip if 1B already present (already migrated).
  Object.values(r.batting || {}).forEach(s => {
    if (s.H != null && s['1B'] == null){
      const singles = Math.max(0, (s.H||0) - (s['2B']||0) - (s['3B']||0) - (s.HR||0));
      s['1B'] = singles;
      delete s.H;
    }
  });
  r.notes = r.notes || '';
  r.fbPost = r.fbPost || '';
  // Player of the Round — { name: string, isPitcher: bool, caption: string } or null
  if (r.playerOfRound === undefined) r.playerOfRound = null;
  return r;
}

// Returns the effective pool of players for a round — either the availablePlayers
// list (if the user has chosen one) or the full roster (fallback).
function getRoundPool(round){
  if (Array.isArray(round.availablePlayers) && round.availablePlayers.length > 0){
    return round.availablePlayers.slice();
  }
  return state.roster.slice();
}

function addRound(num){
  const n = num || (state.rounds.length ? Math.max(...state.rounds.map(r=>r.num))+1 : 1);
  // Find previous round (highest num less than n) to copy lineup from
  const prev = state.rounds.filter(r => r.num < n).sort((a,b)=>b.num-a.num)[0];
  const r = {
    id: uid(), num: n, date: '', opponent: '',
    ourScore: null, theirScore: null, venue: 'Home',
    notes: '', fbPost: '',
    batting: {}, pitching: {},
    battingOrder: prev && prev.battingOrder ? [...prev.battingOrder] : Array(9).fill(null),
    positions: prev && prev.positions ? {...prev.positions} : {},
    substitutions: [],
    availablePlayers: prev && prev.availablePlayers ? [...prev.availablePlayers] : null
  };
  // Pre-seed batting with current roster
  state.roster.forEach(name => { r.batting[name] = blankBat(); });
  state.rounds.push(r);
  state.rounds.sort((a,b)=>a.num-b.num);
  return r;
}
function deleteRound(id){
  if (!confirm('Delete this round? All its stats will be lost.')) return;
  state.rounds = state.rounds.filter(r => r.id !== id);
  if (state.activeTab === 'round:'+id) state.activeTab = 'season';
  render();
}

// Compute a short label for a round based on state of play
function roundTabSub(r){
  const played = r.ourScore != null && r.theirScore != null;
  if (played){
    const us = +r.ourScore, them = +r.theirScore;
    const res = us > them ? 'W' : (us < them ? 'L' : 'T');
    return `${res} ${us}–${them}`;
  }
  return r.opponent ? ('vs ' + r.opponent.slice(0, 10)) : (r.date || '—');
}
function roundTabResultClass(r){
  if (r.ourScore == null || r.theirScore == null) return '';
  return +r.ourScore > +r.theirScore ? 'tab-win' : (+r.ourScore < +r.theirScore ? 'tab-loss' : 'tab-tie');
}

function renderTabBar(){
  const tb = document.getElementById('tabbar');
  let html = '';
  html += `<button class="tab ${state.activeTab==='season'?'active':''}" data-tab="season">Season<span class="rd-sub">Summary</span></button>`;
  html += `<button class="tab ${state.activeTab==='roster'?'active':''}" data-tab="roster">Roster<span class="rd-sub">${state.roster.length} player${state.roster.length===1?'':'s'}</span></button>`;
  html += `<button class="tab ${state.activeTab.startsWith('stats')?'active':''}" data-tab="stats">Stats<span class="rd-sub">Full tables</span></button>`;
  
  const rounds = [...state.rounds].sort((a,b) => a.num - b.num);
  const COLLAPSE_THRESHOLD = 5;
  const VISIBLE_TAIL = 3;
  const currentRoundId = state.activeTab.startsWith('round:') ? state.activeTab.slice(6) : null;
  
  if (rounds.length > COLLAPSE_THRESHOLD){
    const olderRounds = rounds.slice(0, rounds.length - VISIBLE_TAIL);
    const recentRounds = rounds.slice(rounds.length - VISIBLE_TAIL);
    const activeOlder = olderRounds.find(r => r.id === currentRoundId);
    const isActiveOlder = !!activeOlder;
    const dropdownLabel = activeOlder ? ('R' + activeOlder.num) : ('R1–R' + olderRounds[olderRounds.length-1].num);
    const dropdownSub = activeOlder ? roundTabSub(activeOlder) : (olderRounds.length + ' rounds');
    html += `<div class="tab-dropdown ${isActiveOlder?'active':''}" id="tabDropdown">
      <button class="tab ${isActiveOlder?'active':''} ${activeOlder?roundTabResultClass(activeOlder):''}" data-tab="dropdown-toggle">
        <span class="rd-num">${dropdownLabel}</span>
        <span class="rd-sub">${dropdownSub} ▾</span>
      </button>
      <div class="dropdown-menu" id="dropdownMenu">
        ${olderRounds.map(r => {
          return `<button class="dropdown-item ${r.id===currentRoundId?'active':''} ${roundTabResultClass(r)}" data-tab="round:${r.id}">
            <span class="di-num">R${r.num}</span><span class="di-sub">${roundTabSub(r)}</span>
          </button>`;
        }).join('')}
      </div>
    </div>`;
    recentRounds.forEach(r => {
      html += `<button class="tab ${state.activeTab==='round:'+r.id?'active':''} ${roundTabResultClass(r)}" data-tab="round:${r.id}"><span class="rd-num">R${r.num}</span><span class="rd-sub">${roundTabSub(r)}</span></button>`;
    });
  } else {
    rounds.forEach(r => {
      html += `<button class="tab ${state.activeTab==='round:'+r.id?'active':''} ${roundTabResultClass(r)}" data-tab="round:${r.id}"><span class="rd-num">R${r.num}</span><span class="rd-sub">${roundTabSub(r)}</span></button>`;
    });
  }
  
  html += `<button class="tab add" data-tab="add-round" title="Add a new round">＋</button>`;
  tb.innerHTML = html;
  
  tb.querySelectorAll('[data-tab]').forEach(t => {
    const target = t.dataset.tab;
    if (target === 'dropdown-toggle'){
      t.onclick = (e) => { e.stopPropagation(); document.getElementById('dropdownMenu')?.classList.toggle('open'); };
    } else if (target === 'add-round'){
      t.onclick = () => { const r = addRound(); state.activeTab = 'round:'+r.id; render(); autosave(); };
    } else {
      t.onclick = () => { state.activeTab = target; render(); };
    }
  });
  document.addEventListener('click', () => document.getElementById('dropdownMenu')?.classList.remove('open'), { once: true });
}

function renderMain(){
  const m = document.getElementById('main');
  if (state.activeTab === 'roster') renderRosterView(m);
  else if (state.activeTab === 'season') renderSeasonView(m);
  else if (state.activeTab === 'stats' || state.activeTab.startsWith('stats:')) renderStatsView(m);
  else if (state.activeTab.startsWith('round:')) renderRoundView(m, state.activeTab.slice(6));
  else m.innerHTML = '';
}

function renderRosterView(root){
  // First-time welcome when roster AND rounds are both empty
  if (state.roster.length === 0 && state.rounds.length === 0){
    root.innerHTML = `
      <div class="welcome">
        <div class="welcome-ball">⚾</div>
        <h2>Welcome to The Rebels Dugout</h2>
        <p>Get started by building your roster. You can add players one at a time, or paste a list of names all at once.</p>
        <button class="btn primary welcome-btn" id="btnWelcomeAdd">＋ Add your roster</button>
        <div class="welcome-steps">
          <div class="welcome-step"><span class="step-num">1</span><span>Add players to the roster</span></div>
          <div class="welcome-step"><span class="step-num">2</span><span>Create Round 1 from the tab bar ( ＋ )</span></div>
          <div class="welcome-step"><span class="step-num">3</span><span>Pick who's playing, set the lineup, enter stats after the game</span></div>
        </div>
      </div>
    `;
    document.getElementById('btnWelcomeAdd').onclick = openAddPlayerModal;
    return;
  }
  
  root.innerHTML = `
    <div class="panel">
      <h2>
        <span>Roster <span class="count" id="rosterCount"></span></span>
        <span class="actions">
          <button class="btn ghost" id="btnAddPlayer">＋ Add player</button>
        </span>
      </h2>
      <div class="roster" id="roster"></div>
      <div class="fb-hint" style="margin-top:14px">Tap any player card to view full stats, position history, or edit career totals. Each round's lineup and field positions live on that round's tab — come back here to manage who's on the team.</div>
    </div>
  `;
  renderRoster();
  document.getElementById('btnAddPlayer').onclick = openAddPlayerModal;
}

function renderRoster(){
  const el = document.getElementById('roster');
  if (!el) return;
  document.getElementById('rosterCount').textContent = '· ' + state.roster.length + ' players';
  const rc = completedRounds();
  el.innerHTML = '';
  state.roster.forEach(name => {
    const blended = getBlendedStats(name);
    const hist = byName[name];
    const season = getSeasonStats(name);
    const recent = recentBattingFor(name, RECENT_WINDOW);
    const recentRates = computeRates(recent);
    const {last, first} = splitName(name);
    const tops = topPositions(blended, 3);
    const posHtml = tops.length 
      ? tops.map((t,i) => `<span class="pos-tag ${i===0&&t[1]>=5?'strong':''}">${t[0]} · ${t[1]}g</span>`).join('')
      : '<span class="pos-tag" style="opacity:0.5">no fielding history</span>';
    const hasSeasonStats = season.G > 0;
    const hasRecent = recent.rounds >= 2 && recent.AB >= 3;
    
    // Trend arrow: compare recent AVG vs season AVG
    let trend = '';
    if (hasRecent && season.PA > recent.PA){
      const delta = recentRates.Ave - season.Ave;
      if (delta >= 0.050) trend = ' <span style="color:var(--up)" title="Heating up">▲</span>';
      else if (delta <= -0.050) trend = ' <span style="color:var(--down)" title="Cooling off">▼</span>';
    }
    
    const c = document.createElement('div');
    c.className = 'card';
    c.dataset.name = name;
    const hasCareer = hist && (hist.PA || 0) > 0;
    const avatarHtml = avatarMarkup(name);
    c.innerHTML = `
      <button class="remove" title="Remove from roster" data-remove>×</button>
      ${avatarHtml}
      <div class="card-body">
        <div class="name">${last}${trend}</div>
        <div class="first">${first}</div>
        ${hasCareer ? `
        <div class="stats">
          <span>CAREER <b>${fmtRate(hist.Ave)}</b> / <b>${fmtOps(hist.OPS)}</b> <span style="color:var(--muted)">(${hist.PA} PA)</span></span>
        </div>` : ''}
        ${hasSeasonStats ? `
        <div class="season-stats">
          <span style="color:var(--ok)">SEASON <b>${fmtRate(season.Ave)}</b> / <b>${fmtOps(season.OPS)}</b> <span style="color:var(--muted)">(${season.PA} PA)</span></span>
        </div>` : ''}
        ${hasRecent ? `
        <div class="season-stats">
          <span style="color:var(--gold-dim)">LAST ${recent.rounds} <b>${fmtRate(recentRates.Ave)}</b> / <b>${fmtOps(recentRates.OPS)}</b> <span style="color:var(--muted)">(${recent.PA} PA)</span></span>
        </div>` : ''}
        ${!hasCareer && !hasSeasonStats ? `<div class="stats"><span style="color:var(--muted);font-style:italic">no stats yet</span></div>` : ''}
        <div class="pos-tags">${posHtml}</div>
      </div>
    `;
    // Avatar tap → open photo picker (consume click so it doesn't bubble to the card detail)
    const av = c.querySelector('.avatar');
    if (av){
      av.onclick = (e) => {
        e.stopPropagation();
        openPhotoUpload(name);
      };
    }
    c.querySelector('[data-remove]').onclick = (e) => {
      e.stopPropagation();
      if (!confirm('Remove ' + name + ' from roster?')) return;
      state.roster = state.roster.filter(n => n !== name);
      state.battingOrder = state.battingOrder.map(n => n === name ? null : n);
      Object.keys(state.positions).forEach(k => { if (state.positions[k] === name) delete state.positions[k]; });
      // Photo cleanup is intentionally deferred — if the player re-joins later, it'd be nice to keep their photo.
      // If you want it gone, use the "Remove photo" option in the photo dialog explicitly.
      render(); autosave();
    };
    c.onclick = () => showPlayerDetail(name);
    el.appendChild(c);
  });
  const g = document.createElement('div');
  g.className = 'card ghost';
  g.innerHTML = '＋ Add player';
  g.onclick = openAddPlayerModal;
  el.appendChild(g);
}

function renderLineup(){
  const el = document.getElementById('lineup');
  if (!el) return;
  el.innerHTML = '';
  const len = Math.max(9, state.battingOrder.length);
  // Make sure the array has at least 9 entries
  while (state.battingOrder.length < 9) state.battingOrder.push(null);
  for (let i = 0; i < len; i++){
    const name = state.battingOrder[i];
    const isExtra = i >= 9;
    const roleLbl = SLOT_ROLE_LABELS[i] ? `<span class="role">${SLOT_ROLE_LABELS[i]}</span>` : (isExtra ? '<span class="role">EH</span>' : '');
    const slot = document.createElement('div');
    slot.className = 'slot' + (name ? '' : ' empty') + (isExtra ? ' extra' : '');
    slot.onclick = () => openBattingSlotModal(i);
    if (name){
      const p = getBlendedStats(name);
      const {last, first} = splitName(name);
      const assignedPos = Object.entries(state.positions).find(([k,v]) => v === name && FIELD_POSITIONS.includes(k))?.[0];
      const isEH = !assignedPos;
      slot.innerHTML = `
        <div class="num">${i+1}${roleLbl}</div>
        <div>
          <div class="who">${last}<span class="first"> ${first}</span></div>
          <div class="mini">AVG <b>${fmtRate(p.Ave)}</b> · OBP <b>${fmtRate(p.OBP)}</b> · OPS <b>${fmtOps(p.OPS)}</b> · PA <b>${p.PA}</b></div>
        </div>
        <div class="pos-chip ${isEH ? 'eh' : ''}">${assignedPos || 'EH'}</div>
      `;
    } else {
      slot.innerHTML = `<div class="num">${i+1}${roleLbl}</div><div class="who">click to assign…</div><div class="pos-chip unset">—</div>`;
    }
    el.appendChild(slot);
  }
  // Add-batter button for extra hitters
  const add = document.createElement('button');
  add.type = 'button';
  add.className = 'slot-add';
  add.innerHTML = '＋ Add extra hitter';
  add.onclick = () => {
    state.battingOrder.push(null);
    openBattingSlotModal(state.battingOrder.length - 1);
  };
  el.appendChild(add);
  updateBatNote();
}

function renderField(){
  const dots = document.querySelectorAll('.pos-dot');
  dots.forEach(dot => {
    const pos = dot.dataset.pos;
    const name = state.positions[pos];
    dot.classList.toggle('filled', !!name);
    const lastEl = dot.querySelector('[data-last]');
    if (name){
      lastEl.textContent = splitName(name).last.toUpperCase();
      lastEl.style.fontSize = name.length > 20 ? '10px' : '12px';
    } else lastEl.textContent = '';
    dot.onclick = () => openFieldPosModal(pos);
  });
  renderEHList();
  updateFieldNote();
}

function renderEHList(){
  const el = document.getElementById('ehList');
  if (!el) return;
  // EH = anyone in the batting order who isn't assigned a field position
  const fielders = new Set(Object.entries(state.positions)
    .filter(([k]) => FIELD_POSITIONS.includes(k))
    .map(([,v]) => v));
  const ehs = state.battingOrder.filter(n => n && !fielders.has(n));
  if (ehs.length === 0){
    el.innerHTML = '<div class="eh-label">Extra Hitters</div><div class="eh-empty">No EHs — every batter is in the field</div>';
    return;
  }
  let html = `<div class="eh-label">Extra Hitter${ehs.length===1?'':'s'} · ${ehs.length}</div>`;
  ehs.forEach(name => {
    const {last, first} = splitName(name);
    html += `<button type="button" class="eh-item" data-eh-name="${name.replace(/"/g,'&quot;')}">
      <span class="pos-chip">EH</span>
      <span class="who">${last}<span class="first"> ${first}</span></span>
      <span class="swap-hint">tap to field →</span>
    </button>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('[data-eh-name]').forEach(btn => {
    btn.onclick = () => openEHSwapModal(btn.dataset.ehName);
  });
}

function updateBatNote(){
  const n = document.getElementById('batNote');
  if (!n) return;
  const filled = state.battingOrder.filter(x => x).length;
  const extras = Math.max(0, filled - 9);
  const dups = state.battingOrder.filter(x => x).reduce((a,b)=>(a[b]=(a[b]||0)+1,a),{});
  const dupNames = Object.entries(dups).filter(([,v])=>v>1).map(([k])=>splitName(k).last);
  if (dupNames.length){ n.className='conflicts'; n.textContent='Duplicate in batting order: '+dupNames.join(', '); }
  else if (filled >= 9){
    n.className='conflicts ok';
    n.textContent = '✓ Batting order complete (' + filled + ' batter' + (filled===1?'':'s') + (extras ? ' · ' + extras + ' EH' : '') + ')';
  }
  else { n.className='conflicts ok'; n.textContent = filled+'/9 slots filled'; }
}

function updateFieldNote(){
  const n = document.getElementById('fieldNote');
  if (!n) return;
  const filled = FIELD_POSITIONS.filter(p => state.positions[p]).length;
  const fielders = new Set(Object.entries(state.positions)
    .filter(([k]) => FIELD_POSITIONS.includes(k))
    .map(([,v]) => v));
  const ehCount = state.battingOrder.filter(x => x && !fielders.has(x)).length;
  const ehSuffix = ehCount ? ' · ' + ehCount + ' EH' : '';
  let msg;
  if (filled === 9){ msg = '✓ All 9 fielding positions assigned' + ehSuffix; }
  else { msg = filled + '/9 fielding positions assigned' + ehSuffix; }
  n.className = 'conflicts ok'; n.textContent = msg;
}

const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
document.getElementById('modalClose').onclick = closeModal;
modal.onclick = (e) => { if (e.target === modal) closeModal(); };
function closeModal(){ modal.classList.remove('open'); }
function openModal(title, bodyHtml, afterRender){
  modalTitle.textContent = title;
  modalBody.innerHTML = bodyHtml;
  modal.classList.add('open');
  if (afterRender) afterRender();
}

function openBattingSlotModal(slotIdx){
  const current = state.battingOrder[slotIdx];
  const cands = state.roster.map(name => {
    const p = getBlendedStats(name);
    const rel = Math.min(1, p.PA/20);
    const score = p.OPS * rel + (1-rel) * 0.6;
    return { name, p, score };
  }).sort((a,b)=>b.score-a.score);
  let body = `<div class="m-sub">Best fits by OPS · Slot #${slotIdx+1}</div>`;
  body += current ? `<div style="margin-bottom:10px"><button class="btn ghost" onclick="clearBattingSlot(${slotIdx})">Clear this slot</button></div>` : '';
  body += '<div class="option-list">';
  cands.forEach(({name, p}) => {
    const {last, first} = splitName(name);
    const isInOrder = state.battingOrder.includes(name);
    const fitClass = p.OPS >= 1.0 ? 'strong' : p.OPS >= 0.85 ? 'good' : '';
    const src = p._source === 'season' ? '<span style="color:var(--up)">●</span>' : '<span style="color:var(--dirt)">●</span>';
    body += `<div class="option" onclick="assignToBattingSlot(${slotIdx}, ${JSON.stringify(name).replace(/"/g,'&quot;')})">
      <div class="nm">${last} <span class="first">${first}</span>${isInOrder && name !== current ? ' <span style="font-size:10px;color:var(--red)">(already in order)</span>' : ''}</div>
      <div class="fit ${fitClass}">${src} AVG ${fmtRate(p.Ave)} · OBP ${fmtRate(p.OBP)} · <b>OPS ${fmtOps(p.OPS)}</b> <span style="color:var(--muted)">(${p.PA} PA)</span></div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Batting Slot #' + (slotIdx+1), body);
}

function openFieldPosModal(pos){
  const current = state.positions[pos];
  // Candidates: players in the batting order (they're who can actually take the field)
  // + anyone in roster (so you can add someone from the bench if needed)
  const inOrder = state.battingOrder.filter(Boolean);
  const inOrderSet = new Set(inOrder);
  const poolOrdered = [...inOrder, ...state.roster.filter(n => !inOrderSet.has(n))];
  const cands = poolOrdered.map(name => {
    const p = getBlendedStats(name);
    const g = (p.pos && p.pos[pos]) || 0;
    const inBO = inOrderSet.has(name);
    return { name, p, g, inBO };
  }).sort((a,b)=> (b.inBO - a.inBO) || (b.g - a.g) || (b.p.OPS - a.p.OPS));
  let body = `<div class="m-sub">Assign ${pos} · tap a batter to put them in this spot. Whoever's there now becomes an EH.</div>`;
  body += current ? `<div style="margin-bottom:10px"><button class="btn ghost" onclick="clearFieldPos('${pos}')">Clear this position</button></div>` : '';
  body += '<div class="option-list">';
  cands.forEach(({name, p, g, inBO}) => {
    const {last, first} = splitName(name);
    const usedElsewhere = Object.entries(state.positions).find(([k,v]) => v === name && k !== pos && FIELD_POSITIONS.includes(k))?.[0];
    const fitClass = g >= 10 ? 'strong' : g >= 3 ? 'good' : '';
    const tag = !inBO ? ' <span style="font-size:10px;color:var(--dirt)">(bench — tap to add to order)</span>' : (usedElsewhere ? ` <span style="font-size:10px;color:var(--red)">(currently ${usedElsewhere})</span>` : '');
    body += `<div class="option" onclick="assignToFieldPos('${pos}', ${JSON.stringify(name).replace(/"/g,'&quot;')})">
      <div class="nm">${last} <span class="first">${first}</span>${tag}</div>
      <div class="fit ${fitClass}"><b>${g}g</b> at ${pos} · OPS ${fmtOps(p.OPS)}</div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Field Position: ' + pos, body);
}

// When an EH is tapped in the EH list, let them pick a field position to take over
function openEHSwapModal(ehName){
  const {last, first} = splitName(ehName);
  let body = `<div class="m-sub">Put <b>${last}, ${first}</b> in the field. Whoever's at that position becomes an EH.</div>`;
  body += '<div class="option-list">';
  FIELD_POSITIONS.forEach(pos => {
    const currentName = state.positions[pos];
    const currentTxt = currentName ? ('currently ' + splitName(currentName).last) : 'currently empty';
    body += `<div class="option" onclick="assignToFieldPos('${pos}', ${JSON.stringify(ehName).replace(/"/g,'&quot;')})">
      <div class="nm"><b style="color:var(--red)">${pos}</b> <span class="first" style="font-weight:400">${currentTxt}</span></div>
      <div class="fit"></div>
      <div></div>
    </div>`;
  });
  body += '</div>';
  openModal('Swap EH → field', body);
}

function assignToBattingSlot(slotIdx, name){ state.battingOrder[slotIdx] = name; closeModal(); renderLineup(); renderField(); }
function clearBattingSlot(slotIdx){
  // Slots 1-9 are always kept (may be empty). Slots 10+ are extras — clearing removes them entirely.
  if (slotIdx >= 9) state.battingOrder.splice(slotIdx, 1);
  else state.battingOrder[slotIdx] = null;
  closeModal(); renderLineup(); renderField();
}
function assignToFieldPos(pos, name){
  // Remove this player from any other FIELD position (they can only be in one spot)
  Object.keys(state.positions).forEach(k => {
    if (state.positions[k] === name && FIELD_POSITIONS.includes(k)) delete state.positions[k];
  });
  state.positions[pos] = name;
  // If the player isn't in the batting order, add them at the first empty slot
  // (or append as an extra hitter if all 9 base slots are full)
  if (!state.battingOrder.includes(name)){
    const emptyIdx = state.battingOrder.findIndex(x => !x);
    if (emptyIdx >= 0) state.battingOrder[emptyIdx] = name;
    else state.battingOrder.push(name);
  }
  closeModal(); renderField(); renderLineup();
}
function clearFieldPos(pos){ delete state.positions[pos]; closeModal(); renderField(); renderLineup(); }

function openAddPlayerModal(){
  const body = `
    <div class="m-sub">Add a player to the roster. Type a name like <b>Smith,John</b> (Lastname,Firstname), or <b>John Smith</b> and I'll format it.</div>
    <input class="option-add-input" id="addSearch" placeholder="Player name…" style="margin-bottom:10px">
    <button class="btn primary" id="btn-add-one" style="width:100%;margin-bottom:16px">＋ Add player</button>
    <div class="m-sub" style="margin-top:14px">Or paste a list — one name per line — to bulk-add:</div>
    <textarea id="addBulk" rows="6" placeholder="Lazenby,Jeremy&#10;Perry,Simon&#10;Barnes,Bruce…" style="width:100%;font-family:'JetBrains Mono',monospace;font-size:13px;background:rgba(245,236,211,0.05);color:var(--cream);border:1px solid var(--line);border-radius:6px;padding:10px;box-sizing:border-box"></textarea>
    <button class="btn" id="btn-add-bulk" style="margin-top:10px;width:100%">Add all from list</button>
  `;
  openModal('Add Player', body, () => {
    const inp = document.getElementById('addSearch');
    const addOne = () => {
      const v = inp.value.trim();
      if (v) addCustomPlayer(v);
    };
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') addOne(); });
    document.getElementById('btn-add-one').onclick = addOne;
    document.getElementById('btn-add-bulk').onclick = () => {
      const raw = document.getElementById('addBulk').value;
      const lines = raw.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      if (!lines.length){ alert('Paste one name per line.'); return; }
      let added = 0;
      lines.forEach(line => {
        let name = line;
        if (!name.includes(',')){
          const parts = name.split(/\s+/);
          if (parts.length >= 2) name = parts[parts.length-1] + ',' + parts.slice(0,-1).join(' ');
        }
        if (!state.roster.includes(name)){ state.roster.push(name); added++; }
      });
      closeModal(); renderRoster(); autosave();
      if (added > 0) setTimeout(() => alert('Added ' + added + ' player' + (added===1?'':'s') + '.'), 50);
    };
    inp.focus();
  });
}
function addRosterPlayer(name){ if (!state.roster.includes(name)) state.roster.push(name); closeModal(); renderRoster(); autosave(); }
function addCustomPlayer(raw){
  let name = raw.trim();
  if (!name.includes(',')){ const parts = name.split(/\s+/); if (parts.length >= 2) name = parts[parts.length-1]+','+parts.slice(0,-1).join(' '); }
  if (!state.roster.includes(name)) state.roster.push(name);
  closeModal(); renderRoster(); autosave();
}

  const blended = getBlendedStats(name);
  const {last, first} = splitName(name);
  const active = blended._source === 'season' ? season : blended;
  
  const posCells = POSITIONS.map(pos => {
    const g = (active.pos && active.pos[pos]) || 0;
    const top = topPositions(active, 1)[0];
    const isMain = top && top[0] === pos && g > 0;
    const cls = isMain ? 'main' : (g > 0 ? 'has' : '');
    return `<div class="pos-cell ${cls}"><div class="p">${pos}</div><div class="g">${g}</div><div class="gl">games</div></div>`;
  }).join('');
  
  const statBox = (lbl, val, sub) => `<div class="stat-box"><div class="lbl">${lbl}</div><div class="val">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
  
  let histHtml = '';
  if (hist){
    histHtml = `
      <div style="color:var(--dirt);font-family:'Big Shoulders Display',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;margin:18px 0 6px">Historical / Career</div>
      <div class="detail-grid">
        ${statBox('G', hist.G)}${statBox('PA', hist.PA)}${statBox('AB', hist.AB)}${statBox('H', hist.H)}
        ${statBox('2B', hist['2B']||0)}${statBox('3B', hist['3B']||0)}${statBox('HR', hist.HR||0)}${statBox('RBI', hist.RBI)}
        ${statBox('AVG', fmtRate(hist.Ave))}${statBox('OBP', fmtRate(hist.OBP))}${statBox('SLG', fmtRate(hist.SLG))}${statBox('OPS', fmtOps(hist.OPS))}
      </div>`;
  }
  
  let seasonHtml = '';
  if (season.G > 0){
    seasonHtml = `
      <div style="color:var(--up);font-family:'Big Shoulders Display',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;margin:18px 0 6px">This season</div>
      <div class="detail-grid">
        ${statBox('G', season.G)}${statBox('PA', season.PA)}${statBox('AB', season.AB)}${statBox('H', season.H)}
        ${statBox('2B', season['2B'])}${statBox('3B', season['3B'])}${statBox('HR', season.HR)}${statBox('RBI', season.RBI)}
        ${statBox('AVG', fmtRate(season.Ave))}${statBox('OBP', fmtRate(season.OBP))}${statBox('SLG', fmtRate(season.SLG))}${statBox('OPS', fmtOps(season.OPS))}
      </div>`;
  }
  
  const sourcePill = `<span class="source-pill ${blended._source==='season'?'season':''}">${blended._source==='season'?'Using season':'Using blend'}</span>`;
  
  const body = `
    <div class="detail-hero">

  const body = `
    <div class="m-sub">Edit career stats for ${last}, ${first}</div>
    <div style="color:var(--muted);font-size:12px;font-style:italic;margin-bottom:12px">
      These are the player's career totals used as the baseline. In-season round stats are added on top. Changes save immediately.
    </div>
    <div style="color:var(--up);font-family:'Big Shoulders Display',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-weight:600;margin-bottom:6px">Batting totals</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:16px">
      ${numField('G', 'G', current.G)}
      ${numField('AB', 'AB', current.AB)}
      ${numField('1B', '1B', current['1B'])}
      ${numField('2B', '2B', current['2B'])}
      ${numField('3B', '3B', current['3B'])}
      ${numField('HR', 'HR', current.HR)}
      ${numField('R', 'R', current.R)}
      ${numField('RBI', 'RBI', current.RBI)}
      ${numField('BB', 'BB', current.BB)}
      ${numField('K', 'K', current.K)}
      ${numField('HPB', 'HBP', current.HPB || 0)}
      ${numField('SB', 'SB', current.SB)}
      ${numField('CS', 'CS', current.CS)}
    </div>
    <div style="color:var(--up);font-family:'Big Shoulders Display',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-weight:600;margin-bottom:6px">Career games at position</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-bottom:16px">
      ${POSITIONS.map(p => posField(p, p, (current.pos||{})[p])).join('')}
    </div>
    <div style="display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--line)">
      <button class="btn danger small" id="btn-revert-hist">Revert to original</button>
      <div style="display:flex;gap:8px">
        <button class="btn small" id="btn-cancel-hist">Cancel</button>
        <button class="btn primary small" id="btn-save-hist">Save</button>
      </div>
    </div>
  `;
  openModal('Edit — ' + displayName(name), body, () => {
    document.getElementById('btn-cancel-hist').onclick = () => { closeModal(); showPlayerDetail(name); };
    document.getElementById('btn-revert-hist').onclick = () => {
      if (!confirm('Revert ' + name + ' to the original historical stats? This removes your edits.')) return;
      delete state.historicalOverrides[name];
      rebuildByName();
      closeModal();
      render();
      autosave();
      showPlayerDetail(name);
    };
    document.getElementById('btn-save-hist').onclick = () => {
      // Collect inputs
      const batting = {};
      document.querySelectorAll('[data-hk]').forEach(inp => {
        batting[inp.dataset.hk] = parseInt(inp.value) || 0;
      });
      const pos = blankPos();
      document.querySelectorAll('[data-hpos]').forEach(inp => {
        pos[inp.dataset.hpos] = parseInt(inp.value) || 0;
      });
      // Compute derived rate stats. Storage is now 1B-based; H is derived for display.
      const singles = batting['1B'] || 0;
      const AB = batting.AB || 0;
      const BB = batting.BB || 0;
      const HPB = batting.HPB || 0;
      const doubles = batting['2B'] || 0;
      const triples = batting['3B'] || 0;
      const hr = batting.HR || 0;
      const H = singles + doubles + triples + hr;
      const tb = singles + 2*doubles + 3*triples + 4*hr;
      const ave = AB > 0 ? H/AB : 0;
      const obpDen = AB + BB + HPB;
      const obp = obpDen > 0 ? (H + BB + HPB)/obpDen : 0;
      const slg = AB > 0 ? tb/AB : 0;
      const PA = AB + BB + HPB;
      
      state.historicalOverrides[name] = {
        ...batting,
        // Don't store H — it's derived from 1B/2B/3B/HR everywhere now.
        PA, TB: tb,
        Ave: Math.round(ave*1000)/1000,
        OBP: Math.round(obp*1000)/1000,
        SLG: Math.round(slg*1000)/1000,
        OPS: Math.round((obp+slg)*1000)/1000,
        pos
      };
      rebuildByName();
      closeModal();
      render();
      autosave();
      showPlayerDetail(name);
    };
  });
}

// Shared helper: builds a batting order using role-based scoring for slots 1–9,
// then appends any remaining players as extra hitters (by descending OPS).
// Follows a traditional approach:
//   #1 Leadoff  — high OBP + speed
//   #2          — OBP + contact (low K rate)
//   #3          — consistent contact hitter with power
//   #4 Cleanup  — best pure power (SLG + ISO)
//   #5          — run producer protecting cleanup
//   #6-#7       — descending ability (OPS)
//   #8-#9       — faster players as second leadoff, if meaningful speed exists
//   #10+        — remaining players (EHs) in descending OPS
function buildBattingOrder(pool, statsFor){
  const players = pool.map(name => {
    const p = statsFor(name);
    // Regress rate stats toward league-avg-ish when sample is small (<20 PA)
    const rel = Math.min(1, (p.PA||0) / 20);
    const obp = (p.OBP||0) * rel + (1-rel) * 0.30;
    const slg = (p.SLG||0) * rel + (1-rel) * 0.35;
    const ave = (p.Ave||0) * rel + (1-rel) * 0.25;
    const ops = obp + slg;
    const kRate = (p.PA||0) > 0 ? (p.K||0) / p.PA : 0.25;
    const contact = Math.max(0, 1 - kRate);
    const netSB = (p.SB||0) - (p.CS||0);
    const sbPerG = (p.G||0) > 0 ? Math.max(0, netSB) / p.G : 0;
    const speed = Math.min(1, sbPerG / 0.5);
    const iso = Math.max(0, slg - ave);
    return { name, obp, slg, ave, ops, contact, speed, iso };
  });

  const order = new Array(9).fill(null);
  const used = new Set();
  const pickBy = (scoreFn) => {
    const avail = players.filter(x => !used.has(x.name));
    if (!avail.length) return null;
    return avail.map(x => ({ x, s: scoreFn(x) })).sort((a,b) => b.s - a.s)[0].x;
  };
  const assign = (slot, p) => { if (p){ order[slot] = p.name; used.add(p.name); } };

  // High-leverage roles first
  assign(3, pickBy(x => x.slg*0.60 + x.iso*0.30 + x.ops*0.10));
  assign(2, pickBy(x => x.ave*0.35 + x.slg*0.35 + x.obp*0.30));
  assign(0, pickBy(x => x.obp*0.70 + x.speed*0.30));
  assign(1, pickBy(x => x.obp*0.55 + x.contact*0.25 + x.ave*0.20));
  assign(4, pickBy(x => x.ops*0.50 + x.slg*0.30 + x.ave*0.20));

  const remaining = players.filter(x => !used.has(x.name));
  const byOPS = [...remaining].sort((a,b) => b.ops - a.ops);
  if (byOPS[0]) assign(5, byOPS[0]);
  if (byOPS[1]) assign(6, byOPS[1]);
  const rest = players.filter(x => !used.has(x.name));
  const secondLeadoff = (x) => x.speed * 0.55 + x.obp * 0.45;
  const byRest = [...rest].sort((a,b) => secondLeadoff(b) - secondLeadoff(a));
  if (byRest[0]) assign(8, byRest[0]);
  if (byRest[1]) assign(7, byRest[1]);

  // Extras (slots 10+): append any leftover players in descending OPS as EHs.
  const leftovers = players.filter(x => !used.has(x.name)).sort((a,b) => b.ops - a.ops);
  leftovers.forEach(x => order.push(x.name));
  return order;
}
