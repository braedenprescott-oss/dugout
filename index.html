  @media print { .toolbar { display: none; } body { padding: 0; } }
</style>
</head><body>
<div class="toolbar">
  <button onclick="window.print()">🖨 Print</button>
  <button onclick="window.close()">✕ Close</button>
  <span style="font-size:12px;color:#666">Tip: from your phone, use the share menu → Print, or take a screenshot.</span>
</div>
<h1>Lineup Card — Round ${round.num}</h1>
<div class="meta">
  <div><b>Date</b>${dateStr || '—'}</div>
  <div><b>vs.</b>${(round.opponent||'—').replace(/</g,'&lt;')}</div>
  <div><b>Venue</b>${round.venue || '—'}</div>
  <div><b>Team</b>${(state.teamName||'—').replace(/</g,'&lt;')}</div>
</div>
<table>
  <thead><tr><th>#</th><th>Batter</th><th>Pos</th></tr></thead>
  <tbody>${rows}${extraRows}</tbody>
</table>
${subRows ? `<h2>Planned substitutions</h2><ul>${subRows}</ul>` : ''}
${round.notes ? `<h2>Notes</h2><div style="font-size:13px;white-space:pre-wrap">${round.notes.replace(/</g,'&lt;')}</div>` : ''}
</body></html>`;
  
  const w = window.open('', '_blank');
  if (!w){ alert('Popup blocked. Please allow popups for this site and try again.'); return; }
  w.document.write(html);
  w.document.close();
}

// ============================================================================
// QUICK STATS ENTRY MODE (single-player card, big inputs)
// ============================================================================
function openQuickEntryMode(round){
  // Build the ordered pool: batting order first (slot #1 through #9), then any extras with stats, then available players
  const order = [];
  const seen = new Set();
  round.battingOrder.forEach(n => { if (n && !seen.has(n)){ order.push(n); seen.add(n); } });
  const pool = getRoundPool(round);
  pool.forEach(n => { if (!seen.has(n)){ order.push(n); seen.add(n); } });
  Object.keys(round.batting || {}).forEach(n => { if (!seen.has(n) && round.batting[n] && (round.batting[n].PA||0) > 0){ order.push(n); seen.add(n); } });
  
  if (order.length === 0){
    alert('No players to enter stats for. Pick available players first.');
    return;
  }
  
  let idx = 0;
  
  const renderCard = () => {
    const name = order[idx];
    if (!round.batting[name]) round.batting[name] = blankBat();
    const b = round.batting[name];
    const {last, first} = splitName(name);
    const slotNum = round.battingOrder.indexOf(name) + 1;
    const slotLabel = slotNum > 0 ? '#' + slotNum : '—';
    
    const bigInput = (key, label) => `
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-family:'Big Shoulders Display',sans-serif;font-size:11px;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;font-weight:700">${label}</div>
        <input type="number" min="0" step="1" data-qk="${key}" value="${b[key]||0}"
          style="width:70px;height:54px;font-size:28px;font-family:'JetBrains Mono',monospace;font-weight:700;text-align:center;background:rgba(245,236,211,0.05);color:var(--cream);border:2px solid var(--line);border-radius:8px">
      </div>`;
    
    const body = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)">
        <div>
          <div style="font-family:'Big Shoulders Display',sans-serif;font-size:12px;color:var(--dirt);letter-spacing:0.2em;text-transform:uppercase;font-weight:700">Player ${idx+1} of ${order.length} · Slot ${slotLabel}</div>
          <div style="font-family:'Big Shoulders Display',sans-serif;font-size:28px;font-weight:900;color:var(--cream)">${last}<span style="color:var(--dirt);font-weight:600">, ${first}</span></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;margin-bottom:20px">
        ${bigInput('PA','PA')}${bigInput('AB','AB')}${bigInput('H','H')}${bigInput('2B','2B')}${bigInput('3B','3B')}${bigInput('HR','HR')}
        ${bigInput('R','R')}${bigInput('RBI','RBI')}${bigInput('BB','BB')}${bigInput('K','K')}${bigInput('HBP','HBP')}${bigInput('SB','SB')}${bigInput('CS','CS')}
      </div>
      <div style="display:flex;gap:8px;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--line)">
        <button class="btn ghost small" id="btn-qe-prev" ${idx===0?'disabled':''}>← Previous</button>
        <div style="font-size:12px;color:var(--muted)">Changes save as you type</div>
        <button class="btn primary small" id="btn-qe-next">${idx === order.length - 1 ? 'Done' : 'Next →'}</button>
      </div>
      <div style="display:flex;justify-content:center;margin-top:12px">
        <button class="btn ghost small" id="btn-qe-close">Close quick entry</button>
      </div>
    `;
    
    openModal('Quick Stats Entry', body, () => {
      // Save on every keystroke to the current player's batting record
      document.querySelectorAll('[data-qk]').forEach(inp => {
        inp.oninput = (e) => {
          b[e.target.dataset.qk] = parseInt(e.target.value) || 0;
          autosave();
        };
      });
      document.getElementById('btn-qe-prev').onclick = () => { if (idx > 0){ idx--; renderCard(); } };
      document.getElementById('btn-qe-next').onclick = () => {
        if (idx < order.length - 1){ idx++; renderCard(); }
        else { closeModal(); render(); }
      };
      document.getElementById('btn-qe-close').onclick = () => { closeModal(); render(); };
    });
  };
  
  renderCard();
}

// ============================================================================
// FACEBOOK POST GENERATOR
// ============================================================================
function generateFBPost(round){
  const lines = [];
  const tm = state.teamName || 'Our Team';
  const se = state.season || '';
  
  lines.push(`⚾ ${tm} · ${se} · Round ${round.num}`);
  
  // Opponent & score line
  let meta = '';
  if (round.opponent){
    meta = (round.venue === 'Away' ? '@ ' : 'vs ') + round.opponent;
    if (round.ourScore != null && round.theirScore != null){
      const us = +round.ourScore, them = +round.theirScore;
      const res = us > them ? 'W' : (us < them ? 'L' : 'T');
      meta += `  ·  ${us}–${them} (${res})`;
    }
  } else if (round.date){ meta = round.date; }
  if (meta) lines.push(meta);
  lines.push('');
  
  // Game notes
  if (round.notes && round.notes.trim()){
    lines.push(round.notes.trim());
    lines.push('');
  }
  
  // Batting highlights
  const batters = Object.entries(round.batting || {})
    .map(([name, s]) => ({ name, s, rates: computeRates(s) }))
    .filter(({s}) => (s.PA||0) > 0);
  
  const hiBat = batters.filter(({s}) => (s.H||0) >= 2 || (s.HR||0) >= 1 || (s.RBI||0) >= 2 || (s.BB||0) >= 2)
    .sort((a,b) => {
      const scoreA = (a.s.HR||0)*10 + (a.s.H||0)*2 + (a.s.RBI||0);
      const scoreB = (b.s.HR||0)*10 + (b.s.H||0)*2 + (b.s.RBI||0);
      return scoreB - scoreA;
    });
  
  if (hiBat.length){
    lines.push('🏏 With the bat:');
    hiBat.forEach(({name, s}) => {
      const parts = [];
      if (s.AB > 0) parts.push(`${s.H}-for-${s.AB}`);
      if (s['2B']) parts.push(`${s['2B']} 2B`);
      if (s['3B']) parts.push(`${s['3B']} 3B`);
      if (s.HR) parts.push(`${s.HR} HR`);
      if (s.RBI) parts.push(`${s.RBI} RBI`);
      if (s.R) parts.push(`${s.R} R`);
      if (s.BB >= 2) parts.push(`${s.BB} BB`);
      if (s.SB) parts.push(`${s.SB} SB`);
      lines.push(`• ${splitName(name).last} — ${parts.join(', ')}`);
    });
    lines.push('');
  }
  
  // Pitching highlights (anyone with IP > 0)
  const pitchers = Object.entries(round.pitching || {})
    .filter(([, s]) => (s.IP||0) > 0)
    .sort((a,b) => (b[1].IP||0) - (a[1].IP||0));
  
  if (pitchers.length){
    lines.push('⚾ On the mound:');
    pitchers.forEach(([name, s]) => {
      const parts = [`${(s.IP||0)} IP`];
      if (s.H != null && s.H !== '') parts.push(`${s.H||0} H`);
      if (s.ER != null && s.ER !== '') parts.push(`${s.ER||0} ER`);
      if (s.K) parts.push(`${s.K} K`);
      if (s.BB >= 3) parts.push(`${s.BB} BB`);
      lines.push(`• ${splitName(name).last} — ${parts.join(', ')}`);
    });
    lines.push('');
  }
  
  // Team totals summary if no individual highlights
  if (!hiBat.length && !pitchers.length && batters.length){
    const team = blankBat();
    batters.forEach(({s}) => BAT_COLS.forEach(c => team[c] += (s[c]||0)));
    if (team.H || team.R) lines.push(`Team: ${team.H} H, ${team.R} R, ${team.RBI} RBI, ${team.BB} BB`);
    lines.push('');
  }
  
  lines.push(`#${(tm.replace(/[^a-zA-Z0-9]/g,'')||'baseball')} #${(se.replace(/\s+/g,'')||'winterball')}`);
  return lines.join('\n').trim();
}

// ============================================================================
// SEASON VIEW
// ============================================================================
function renderSeasonView(root){
  // Aggregate batting across rounds
  const allPlayers = new Set();
  state.rounds.forEach(r => {
    Object.keys(r.batting||{}).forEach(n => { if ((r.batting[n].PA||0) > 0) allPlayers.add(n); });
    Object.keys(r.pitching||{}).forEach(n => { if ((r.pitching[n].IP||0) > 0) allPlayers.add(n); });
    Object.keys(r.fielding||{}).forEach(n => allPlayers.add(n));
  });
  state.roster.forEach(n => allPlayers.add(n));
  
  // Record
  let wins = 0, losses = 0, ties = 0;
  state.rounds.forEach(r => {
    if (r.ourScore != null && r.theirScore != null){
      if (+r.ourScore > +r.theirScore) wins++;
      else if (+r.ourScore < +r.theirScore) losses++;
      else ties++;
    }
  });
  const rc = completedRounds();
  
  // Leader lookups
  const playerList = [...allPlayers];
  let topHitter = null, topPitcher = null;
  playerList.forEach(n => {
    const s = getSeasonStats(n);
    if (s.PA >= 5 && (!topHitter || s.OPS > topHitter.OPS)) topHitter = { name:n, ...s };
  });
  playerList.forEach(n => {
    const p = seasonPitchingFor(n);
    if (p.IP >= 1){
      const era = 9 * (p.ER||0) / p.IP;
      if (!topPitcher || era < topPitcher.era) topPitcher = { name:n, era, ...p };
    }
  });
  
  // Sort batters by OPS, pitchers by ERA
  const batRows = playerList.map(n => ({ name:n, s: getSeasonStats(n) })).filter(x => x.s.PA > 0).sort((a,b) => b.s.OPS - a.s.OPS);
  const pitchRows = playerList.map(n => ({ name:n, p: seasonPitchingFor(n) })).filter(x => x.p.IP > 0).sort((a,b) => {
    const eraA = a.p.IP > 0 ? 9*(a.p.ER||0)/a.p.IP : 999;
    const eraB = b.p.IP > 0 ? 9*(b.p.ER||0)/b.p.IP : 999;
    return eraA - eraB;
  });
  
  // Position matrix
  const posRows = playerList.map(n => ({ name:n, pos: seasonPositionsFor(n) })).filter(x => Object.values(x.pos).some(v => v > 0));
  posRows.sort((a,b) => Object.values(b.pos).reduce((x,y)=>x+y,0) - Object.values(a.pos).reduce((x,y)=>x+y,0));
  
  const recTxt = wins + '-' + losses + (ties ? '-'+ties : '');
  
  let html = `
    <div class="season-snap">
      <div class="snap-box"><div class="lbl">Record</div><div class="val">${recTxt}</div><div class="sub">${rc} round${rc===1?'':'s'} completed</div></div>
      <div class="snap-box"><div class="lbl">Top hitter</div><div class="val" style="font-size:17px">${topHitter?splitName(topHitter.name).last:'—'}</div><div class="sub">${topHitter?`OPS ${fmtOps(topHitter.OPS)} (${topHitter.PA} PA)`:'no data yet'}</div></div>
      <div class="snap-box"><div class="lbl">Top pitcher</div><div class="val" style="font-size:17px">${topPitcher?splitName(topPitcher.name).last:'—'}</div><div class="sub">${topPitcher?`ERA ${topPitcher.era.toFixed(2)} (${topPitcher.IP} IP)`:'no data yet'}</div></div>
      <div class="snap-box"><div class="lbl">Suggester mode</div><div class="val" style="font-size:16px;color:${rc>=BLEND_THRESHOLD?'#7cb38a':'var(--dirt)'}">${rc>=BLEND_THRESHOLD?'SEASON':'BLEND'}</div><div class="sub">${rc>=BLEND_THRESHOLD?'using current form only':`blends career + season (${BLEND_THRESHOLD-rc} round${BLEND_THRESHOLD-rc===1?'':'s'} until switch)`}</div></div>
    </div>
    
    <div class="panel">
      <h2><span>Season Batting</span><span class="count">${batRows.length} player${batRows.length===1?'':'s'}</span></h2>
      <div class="table-wrap">
        <table class="stat-table">
          <thead><tr>
            <th class="first-col">Player</th>
            <th>G</th>${BAT_COLS.map(c=>`<th>${c}</th>`).join('')}
            <th>AVG</th><th>OBP</th><th>SLG</th><th>OPS</th>
          </tr></thead>
          <tbody>
            ${batRows.length ? batRows.map(({name, s}) => {
              const {last, first} = splitName(name);
              return `<tr>
                <td class="first-col">${last} <span class="first">${first}</span></td>
                <td>${s.G}</td>
                ${BAT_COLS.map(c => `<td>${s[c]||0}</td>`).join('')}
                <td class="derived">${fmtRate(s.Ave)}</td>
                <td class="derived">${fmtRate(s.OBP)}</td>
                <td class="derived">${fmtRate(s.SLG)}</td>
                <td class="derived">${fmtOps(s.OPS)}</td>
              </tr>`;
            }).join('') : `<tr><td colspan="${BAT_COLS.length+6}" class="empty-state">No batting data yet. Enter round stats to populate.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
    
    <div class="panel">
      <h2><span>Season Pitching</span><span class="count">${pitchRows.length} pitcher${pitchRows.length===1?'':'s'}</span></h2>
      <div class="table-wrap">
        <table class="stat-table">
          <thead><tr>
            <th class="first-col">Player</th>
            <th>G</th>${PITCH_COLS.map(c=>`<th>${c}</th>`).join('')}
            <th>ERA</th><th>WHIP</th><th>K/9</th>
          </tr></thead>
          <tbody>
            ${pitchRows.length ? pitchRows.map(({name, p}) => {
              const {last, first} = splitName(name);
              const ip = p.IP||0;
              const era = ip > 0 ? (9*(p.ER||0)/ip).toFixed(2) : '-';
              const whip = ip > 0 ? ((p.H+p.BB)/ip).toFixed(2) : '-';
              const k9 = ip > 0 ? (9*p.K/ip).toFixed(1) : '-';
              return `<tr>
                <td class="first-col">${last} <span class="first">${first}</span></td>
                <td>${p.G}</td>
                ${PITCH_COLS.map(c => `<td>${c==='IP'?(p[c]||0).toFixed(2):(p[c]||0)}</td>`).join('')}
                <td class="derived">${era}</td>
                <td class="derived">${whip}</td>
                <td class="derived">${k9}</td>
              </tr>`;
            }).join('') : `<tr><td colspan="${PITCH_COLS.length+5}" class="empty-state">No pitching data yet.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
    
    <div class="panel">
      <h2><span>Games Started by Position</span><span class="count">This season</span></h2>
      <div class="table-wrap">
        <table class="stat-table">
          <thead><tr>
            <th class="first-col">Player</th>
            ${POSITIONS.map(p=>`<th>${p}</th>`).join('')}
            <th>Total</th>
          </tr></thead>
          <tbody>
            ${posRows.length ? posRows.map(({name, pos}) => {
              const {last, first} = splitName(name);
              const total = Object.values(pos).reduce((a,b)=>a+b,0);
              return `<tr>
                <td class="first-col">${last} <span class="first">${first}</span></td>
                ${POSITIONS.map(p => `<td>${pos[p]||0}</td>`).join('')}
                <td class="derived">${total}</td>
              </tr>`;
            }).join('') : `<tr><td colspan="${POSITIONS.length+2}" class="empty-state">No fielding data yet. Assign positions in each round's "Fielding Positions Played" section.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
  root.innerHTML = html;
}

// ============================================================================
// TOP-LEVEL EVENT HANDLERS
// ============================================================================
document.getElementById('teamName').oninput = (e) => { state.teamName = e.target.value; };
document.getElementById('seasonName').oninput = (e) => { state.season = e.target.value; };

document.getElementById('btnExport').onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.teamName||'team').replace(/[^a-z0-9]/gi,'_') + '_' + (state.season||'season').replace(/[^a-z0-9]/gi,'_') + '.json';
  a.click();
  URL.revokeObjectURL(url);
};
document.getElementById('btnImport').onclick = () => document.getElementById('fileImport').click();
document.getElementById('fileImport').onchange = async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const obj = JSON.parse(await f.text());
    if (obj.roster && obj.battingOrder !== undefined){
      state = {
        teamName: obj.teamName || 'My Team',
        season: obj.season || 'Season',
        roster: obj.roster || [...DEFAULT_ROSTER],
        battingOrder: obj.battingOrder || Array(9).fill(null),
        positions: obj.positions || {},
        rounds: (obj.rounds || []).map(r => ensureRoundShape({...r, id: r.id || uid()})),
        activeTab: 'lineup'
      };
      render();
    } else alert('That doesn\'t look like a Dugout file.');
  } catch(err){ alert('Could not parse: ' + err.message); }
};
document.getElementById('btnSave').onclick = async () => {
  const name = prompt('Save as:', (state.teamName||'team').replace(/\s+/g,'-').toLowerCase());
  if (!name) return;
  const ok = await saveAll(name);
  alert(ok ? 'Saved to browser as "'+name+'"' : 'Save failed. Use Export to download a JSON backup instead.');
};
document.getElementById('btnLoad').onclick = async () => {
  const saves = await listSaves();
  if (!saves.length){ alert('No saved snapshots found in this browser. Use Import to load a JSON file.'); return; }
  const pick = prompt('Saved snapshots:\n'+saves.map((l,i)=>(i+1)+'. '+l).join('\n')+'\n\nEnter number or name:');
  if (!pick) return;
  const chosen = saves[parseInt(pick)-1] || (saves.includes(pick) ? pick : null);
  if (!chosen){ alert('Not found'); return; }
  const loaded = await loadAll(chosen);
  if (loaded){
    state = hydrateState(loaded);
    render(); autosave();
  }
};

// Shared hydration helper — reconciles a loaded snapshot with current state shape
function hydrateState(loaded){
  const s = {
    teamName: loaded.teamName || 'My Team',
    season: loaded.season || 'Season',
    roster: loaded.roster || [...DEFAULT_ROSTER],
    battingOrder: loaded.battingOrder || Array(9).fill(null),
    positions: loaded.positions || {},
    rounds: (loaded.rounds || []).map(r => ensureRoundShape({...r, id: r.id || uid()})),
    historicalOverrides: loaded.historicalOverrides || {},
    activeTab: loaded.activeTab || 'lineup'
  };
  return s;
}

// Startup: try to load the autosave first, otherwise render with defaults
async function startup(){
  try {
    const auto = await loadAutosave();
    if (auto && (auto.roster?.length > 0 || auto.rounds?.length > 0 || Object.keys(auto.historicalOverrides || {}).length > 0)){
      state = hydrateState(auto);
      rebuildByName();
    }
  } catch(e){ console.warn('Autosave restore failed:', e); }
  render();
}

// Register service worker for offline support (only if file is served over http/https)
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.protocol === 'http:')){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}

// Initial render
startup();
</script>
